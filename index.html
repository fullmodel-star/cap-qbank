  display:flex;padding-bottom:env(safe-area-inset-bottom)}

.setrow .l{flex:1}.setrow .l small{display:block;font-size:.72rem;color:var(--sub)}

<script>
const QB = {"meta": {"title": "國中教育會考 英語科 官方題庫", "source": "教育部 心測中心 官方公開試題（110–115）", "years": [115, 114, 113, 112, 111, 110], "audioYears": [115, 114, 113, 112, 111, 110], "readingTotal": 256, "readingUsable": 226, "listeningTotal": 126, "listeningUsable": 99, "listeningWithAudio": 99}, "passages": {"115-P1": {"id": "P1", "year": 115, "genre": "說明文/食譜", "topic": "自製水果茶做法", "text": "The Best Fruit Tea You Can Make at Home\n(A recipe brochure showing how to make fruit tea at home using fruit such as apples, bananas, oranges, papayas, pears, and strawberries; boil water, add teabags, add fruit and lemon juice, stir, and let steep before removing the fruit.)\n※ stir 攪拌"}, "115-P2": {"id": "P2", "year": 115, "genre": "對話/漫畫", "topic": "Hawkins 屢次失敗卻總是過度自信", "text": "In 6th grade, I tried to get the students to pick me as student leader.\n\"I'll make class hours shorter. And we'll have only three days of school a week…\"\nI totally bombed it.\n\"What? That's not what a student leader can decide. He doesn't know anything.\"\nI was the best choice, but why didn't people know that?\n\nI became a salesperson when I was 23, and I believed I could be Number 1.\n\"You said you would sell 50 cars a month. But you sold only 1 car in two months.\"\n\"Don't worry. I'll sell 149 cars next month.\"\n\"You said that a year ago.\"\nI bombed it again.\n\"Hawkins, we don't need your service anymore. Go pack your things…\"\n\"Why?\""}, "115-P3": {"id": "P3", "year": 115, "genre": "廣告DM/公告通知", "topic": "The Marigolds' Home 參觀宣傳手冊", "text": "The Marigolds' Home\nOpening times: March to October 10:00-17:00, November to February 10:00-16:00. Closed on Mondays.\nTo make sure you enjoy your visit to The Marigolds' Home, we'd like to ask you to follow the rules below:\n1. Pets are not allowed in any areas of the Marigolds' Home.\n2. Eating and drinking are not allowed inside the buildings, except in the café.\n3. Picture-taking is not allowed inside Sir Archie's House.\n4. Please take off your shoes before entering the Rabbit's Temple.\nBecome a member and save 10% on tickets and 30% on all items in the gift shops. To join, visit www.themarigoldshome.com.\n※ brochure 宣傳手冊"}, "115-P4": {"id": "P4", "year": 115, "genre": "記敘文/新聞報導", "topic": "大提琴家 Beatrice Harrison 與夜鶯共演的故事", "text": "One summer evening when English cello player Beatrice Harrison was practicing in her garden, she was joined by a visitor she did not expect.\nThe visitor was a nightingale. The small brown bird sang together with Harrison's cello music, and the birdsong sounded like the piece she was playing. For the next few evenings, her visitor kept coming back, sometimes with several of its friends. Harrison decided that more people should hear the little singers.\nSo, on May 19, 1924, Harrison worked with the BBC, the UK's national TV and radio station, and played in her garden. At first, the artist was playing alone. Fifteen minutes before the end of her playing, the nightingales began to sing with the cello.\nThe nightingale show was popular with radio listeners. It was repeated the next week, and for the next twelve years Harrison played on the radio with her garden friends. During this time, she got 50,000 fan letters. People called her \"the Nightingale Lady.\""}, "115-P5": {"id": "P5", "year": 115, "genre": "記敘文/悼詞", "topic": "悼念電影文章作家 Rose Lacey", "text": "With heavy hearts, we are here to say goodbye to Rose Lacey, a wonderful writer who will be sadly missed.\nRose and I first met in 2010. I was at a party to pick up my wife when I heard Rose explaining to her and her friends why Get Across was a great movie. Her ideas were so interesting that I invited her to write some articles about movies for Action! US. Rose was very excited and agreed right away.\nOver the next ten years, Rose wrote more than 150 articles. Rose could always bring out something new from movies that we thought we knew so well. People often told me that Rose never failed to surprise them. Her articles often made them think whether they actually saw the same movie, but if they went to see it again, they experienced the movie in a whole new way.\nIn her short life of 40 years, Rose has made her mark on the world of movies with her articles for Action! US. We are lucky to have had her in our lives. She was a very special person.\nAlex Jackson\nHead of Action! US\n※ article 文章"}, "115-P6": {"id": "P6", "year": 115, "genre": "說明文/圖表(流程圖)", "topic": "海玻璃的形成過程", "text": "SEA GLASS: GLASS BOTTLES' SECOND LIFE\nSea glass is made from the magic of the sea. It usually comes from glass bottles that are thrown into the water. Each piece of sea glass looks different, and sea glass is often seen on art pieces. The pictures below explain how sea glass is born.\n1. Glass bottles are thrown as garbage into the sea.\n2. When these bottles ride the waves of the sea, they hit each other or other garbage in the sea and break into small pieces of glass.\n3. Pieces of glass are pushed by sea water and move along the sea floor. The sharp pieces slowly become rounder and rounder.\n4. After tens or hundreds of years in the sea, the pieces of glass grow an ice-like white color on the outside and become sea glass.\n5. Sea glass is finally pushed up to the beach.\n6. Artists collect pieces of sea glass and put them into their works.\nHowever, people now seldom use glass to make bottles and bowls—paper bowls and cups have become more popular these days. This means there are fewer glass items in the sea, so less and less sea glass will be found in the future.\n※ title 標題"}, "115-P7": {"id": "P7", "year": 115, "genre": "說明文/新聞評論(對照兩篇)", "topic": "冰島語的未來（兩篇對立觀點文章）", "text": "The Future of Icelandic — Scandinavian News, by Anna Adams\nIcelandic is a language that is spoken only in Iceland. It has a long history. But many Icelanders are worried that they're losing Icelandic.\nThe reason for their worry is the prevalence of English in Iceland. \"I use English when I talk to my housework robot, use my phone, and watch movies,\" said Helgi Atlason, an engineer. There is a reason for that. Most of these products use English, and few companies care to change the language into Icelandic because there are only a small number of Icelandic speakers (314,000 people). Actually, you see English everywhere in Iceland.\nIcelanders also speak and hear more English than Icelandic these days because many foreigners who come to live and work in Iceland speak only English. \"We can't use Icelandic abroad, and we're not using it much in Iceland, either. How do you expect our kids will want to learn it?\" said Eirikur Wilson, a teacher.\nWill Iceland one day give up Icelandic for English? It may happen soon.\n\nOur Future with Icelandic — Scandinavian News, by Gunnar Eggertsson\nMany people think Icelandic is a language in its sickbed and that it needs to be saved. I understand their worries, but does the future of our language really look that bad?\nAccording to Dr. David Clingingsmith, a language needs at least 35,000 speakers to be \"safe\" from becoming a dying language. There are now 314,000 Icelandic speakers. Also, every year Iceland spends 51.3 million Icelandic crowns (3.7 million US dollars) teaching Icelandic to machines: phones, computers, and robots. Icelandic is appearing more often in products. Most importantly, schools still teach Icelandic to children. Clearly, we are not giving up our first language.\nHowever, I'm not saying that Iceland has done enough for Icelandic. Our country can do a better job at getting more people to speak this beautiful language. One way to do so is to give more language courses to foreigners. With much more work, I'm sure Icelandic can grow and even reach farther into the world.\n※ Icelander 冰島人　product 商品"}, "115-P8": {"id": "P8", "year": 115, "genre": "記敘文/故事", "topic": "老國王以種子考驗孩子選出誠實繼承人", "text": "A long time ago, there was an old king who had no child of his own. The king was worried that his land would fall into the wrong hands after his death, so he decided to pick a child in his land to take the high seat. One day, he called all the children to his castle and gave each of them a seed. \"Come back on New Year's Day and show me what you have grown,\" he said to them, \"and I will 40 .\" Every child brought their seeds home carefully. One of the children, Wong, planted his seed in a pot. He gave it water every day and made sure there was sun to help it grow. 41 . Then, Sung, the child of the richest family in the land, told people that a small plant was growing from his seed. He was 42 . Everyone excitedly said that he would be king. Soon, one after another, more and more children were also saying that they had something in their pots. But Wong still didn't find anything in his. On the big day, when Wong brought his pot to the castle, he saw all the other children carrying interesting plants. Some had flowers in the shape of a bird, and some had grasses of different colors. Everyone proudly showed their plants to the king, but the king looked unhappy until he saw Wong's pot. \"I boiled the seeds before I gave them out, so no plants could grow from them.\" The king looked seriously at the children. \"There is only one child who is 43 enough to be king.\" Ten years later, the king died. On his deathbed, he was not worried because he knew Wong would be a good king."}, "114-P1": {"id": "P1", "year": 114, "genre": "記敘文", "topic": "學校旁麵包店的狗 Rex 被車撞傷後，大家陪伴牠復原的故事", "text": "Rex is a dog that lives at the bakery next to our school. He is cute and friendly. Every morning, he stands in front of the school to welcome everybody. We all see Rex as one of us. But one Monday morning, I was surprised that Rex was not there to say hello to us. “Rex is in the hospital. He was hit by a car last night,” my classmate told me. We went to see Rex in the hospital that day after school. Two weeks later, Rex was much better, and we decided to take him for a walk every evening. Because of the exercise, Rex became healthier and stronger. Soon he could happily run and jump again. He is now as handsome and strong as before!"}, "114-P2": {"id": "P2", "year": 114, "genre": "對話", "topic": "關於 Mark、Linda 與 Jenny 之間狀況的對話（原文為對話框圖像，PDF文字擷取時對話內容遺失，僅保留題目）", "text": "[說明：此篇為對話框（圖像）形式的題組，pdftotext 轉檔時僅擷取到題號與題目，未能擷取對話框內的實際對白文字，原始對話內容缺失。]"}, "114-P3": {"id": "P3", "year": 114, "genre": "廣告DM/圖表(票券/地圖)", "topic": "White Lake City 交通票卡（White Lake City Card）的種類、票價與使用規則", "text": "Buy a White Lake City Card When You’re in the City\nWith any of the Cards, you can\n- visit the city by metro, bus, or train as many times as you want. *\n- take one child under 12 with you for free.\n- save 20% on tickets to public museums.\nThe 1-day, 3-day, and 5-day Cards are for trips from Monday to Friday, and the Weekend Card is for trips on weekends and holidays.\nCheck the map and buy the right Card for the zones you’ll be entering.\n\nCard / Zone 1 / Zones 1-2 / Zones 1-3\n1-day: $20 / $40 / $60\n3-day: $40 / $60 / $80\n5-day: $50 / $80 / $110\nWeekend: $30 / $50 / $80\n\n* The Cards are only for trips inside the three zones.\n\nⓐ White Lake Main Station ⓑ Museum of White Lake City History ⓒ Museum of Modern Art ⓓ White Lake ⓔ White Lake Castle ⓕ White Lake Airport"}, "114-P4": {"id": "P4", "year": 114, "genre": "記敘文", "topic": "16歲少女 Libby Larson 在家族經營的 Rolling Acres 度假農場工作的故事", "text": "At 5 o’clock every morning, while most people are sleeping, 16-year-old Libby Larson is already up. She mops the floor, gets the mail and the newspapers, and gets ready for visitors to Rolling Acres. Libby’s grandparents started Rolling Acres in 1970, and since then all of the Larson family have been working there. Rolling Acres used to be just a sheep farm, but now, with its fruit trees, vegetable gardens, and many other kinds of animals, it has become a popular place for families to go on vacation. Visitors can pick fruits, collect eggs, and feed the animals. It is one of Libby’s jobs to show kids how to feed the baby sheep.\nFor her work, Libby is paid $10 an hour. This summer, she expects to make about $1,200 and plans to buy a cell phone. Her friends think it’s great to make that much money in a summer. However, for Libby, working at a family business also means making sacrifices. “I’d love to sleep until noon or go to summer camp like other kids. My friends stopped inviting me on trips because I’m always busy in the summer.” However, Libby also said, “But it’s better to see both sides. Working with your family is great. You feel closer to each other.”"}, "114-P5": {"id": "P5", "year": 114, "genre": "漫畫", "topic": "以復活節島（Easter Island）為喻，說明過度砍伐樹木導致文明衰亡，藉此呼籲珍惜地球資源", "text": "Around the year 400, people came to Easter Island. So many trees here!\nThey used trees to make fire and build houses. Because of the trees, people had a great life on the island.\nIn their free time, they loved making statues with big rocks. With the trees they cut down, they could move the statues around easily.\nTrees were needed and used in every part of their life. Years passed, and there were fewer and fewer trees on Easter Island.\nWithout enough trees to keep water under the ground, the land became dry, and plants didn’t grow.\nAnd I’m hungry. I’m thirsty.\nPeople began to fight for water and food. The statues were moved to fighting grounds to show their power. The last trees were probably cut down at this time.\nThose who cut down the last trees surely understood how important trees were to them—but still, they did it. When the last trees fell to the ground, people on the island fell, too.\nLet’s not make Earth, our only home, another Easter Island."}, "114-P6": {"id": "P6", "year": 114, "genre": "說明文", "topic": "行為經濟學家 Dan Ariely 以 IKEA 家具和摺紙實驗，說明人們對親手製作之物會產生更高評價的「IKEA效應」", "text": "Many years ago, Dan Ariely bought a cabinet from IKEA. IKEA is a famous furniture store that sells boxes of furniture parts. People who buy them have to put all the parts together themselves. It took Ariely hours to build his cabinet. Ariely didn’t really enjoy himself when he was trying to put all the parts together. However, after he finished, he felt quite good about himself and his cabinet. Later, he found that he loved his cabinet more than any of his other furniture.\nAriely wanted to know if anyone shared his feelings, so he did a fun origami study. He invited two groups of people to join his study. He called one group “builders” and the other group “buyers.” Builders were told to make origami, like paper frogs or paper birds. When they finished, they were asked how much they would spend on their works. Ariely then showed the origami to buyers and asked them how much they would pay for them. The two groups gave very different answers. Though buyers would pay only five cents for builders’ origami, builders would spend 25 cents! Interestingly, builders believed others would think their works were good enough to cost that much money! Ariely’s study showed that he was not alone in his IKEA experience — we just love things more, sometimes blindly, when we make them ourselves. Ariely called it “the IKEA effect.”"}, "114-P7": {"id": "P7", "year": 114, "genre": "說明文", "topic": "1970年代英國電力工人兩度罷工要求加薪、政府因應限電，以及當時社會大眾對此事件觀感的歷史故事", "text": "In the picture is a UK electricity worker in the 1970s. Pictures like this appeared in many newspapers at the time. In 1972, electricity workers in the UK asked to be paid more, and they decided to stop working until their wish was answered. The government worried that there wouldn’t be enough electricity for the country if these workers didn’t go to work, so it agreed to give them the pay rise. However, the story didn’t end there.\nA year later, the electricity workers asked for another pay rise. To get what they wanted, they worked shorter hours and acted like they would walk away from their job anytime. But this time, the government decided to fight. To save electricity, it made new rules for people to follow. For example, each family could turn on the heat in only one room; TV stations had to stop their shows at 10:30 p.m.; businesses could open only three days a week.\nPeople’s lives were greatly changed. Without enough heat to keep the house warm, people covered themselves in blankets all the time. Hospitals had to use candles because they couldn’t keep all the lights on. Factories couldn’t keep their machines working. Many people lost their jobs. For months, people were paying the price while the electricity workers were fighting for their wish. In the end, the government agreed to the second pay rise. This picture shows what many people thought of the electricity workers during the “dark” time."}, "114-P8": {"id": "P8", "year": 114, "genre": "記敘文", "topic": "少年 Cameron 每年生日反而親手做禮物感謝媽媽生養之恩的故事（綜合填空）", "text": "Most kids want gifts from their parents on their birthdays, but Cameron doesn’t. On his birthday, he gives his mom a gift. He ___38___ doing this in his first year of junior high school. That year, during one class, he watched a video about how a baby is pushed from its mother’s body. After class, ___39___ . How brave a woman is to have a baby! Thank God I’ll never have to do that!\nWhen Cameron came home that day, he held his mom in his arms for a long time. He decided that his birthday ___40___ . During those nine months inside his mom, he just ate and slept while his mom was doing all the hard work. So why should he get a birthday gift for doing nothing? If anyone should get a gift on his birthday, it should be his mom.\nThe ___41___ “birthday gift” Cameron prepared was a bag of cookies he baked. The cookies tasted so bad, but his mom said they were the best thing she ever got. Hearing that ___42___ . It was so much better than getting a gift. Now, on his birthday every year, Cameron makes a gift for his mother to thank her for giving him life.\nThis year, Cameron ___43___ his mom a nice dress. A few months ago, he learned to make dresses at school and decided to make one for his mom. Now the dress is finished and hanging behind Cameron’s bedroom door. He believes the gift will tell his mother how much he loves her."}, "113-P1": {"id": "P1", "year": 113, "genre": "記敘文", "topic": "男孩帶弟弟外出買食物，返家時父親被誤認為闖空門", "text": "It was around eight o'clock on Saturday night. Philip was at home with his little brother, Jason. Jason was hungry and kept crying. But Philip couldn't cook and their father was not home yet because he was working late in the office. So Philip decided to take Jason out for some food.\nHalf an hour later, when they came back home, Philip was surprised to find that their father was talking to the police and a woman outside their house. He didn't know who the woman was. She looked scared and stood behind the police. Philip's father was very angry and kept shouting, \"I didn't do anything wrong! I forgot my keys and was just trying to get into MY OWN HOUSE!\" But the police didn't believe him until Philip ran to them and explained everything.\nThe police told Philip that the woman called 110 when she saw Philip's father trying to get into a house through a window. That was how it all happened."}, "113-P2": {"id": "P2", "year": 113, "genre": "圖表(時刻表/菜單)", "topic": "Baker's Kitchen 麵包店的販售時間表", "text": "[圖表題：Baker's Kitchen 麵包店的營業與各式麵包（白麵包、農場麵包、貝果、猶太辮子麵包）供應時刻表，原文為圖片，PDF文字擷取僅保留註解 oven 烤爐]"}, "113-P3": {"id": "P3", "year": 113, "genre": "圖表(地圖)", "topic": "音樂季/市集會場地圖與交通資訊", "text": "[圖表題：音樂季會場地圖，標示 Satyr's Park、Fox Street、Garden Square、農夫市集、花卉市集、公車路線 No.157、Puppy Street、Koala Street 捷運站等地點與交通建議，原文為地圖圖片，PDF文字擷取僅保留註解 recommend 推薦]"}, "113-P4": {"id": "P4", "year": 113, "genre": "記敘文", "topic": "兩則關於待客小氣的幽默故事（Yan與Chang）", "text": "Yan lived a good life in a big house. One day he invited a friend to dinner at his house. However, on the dinner table there was only one small dish of one small fish.\nThe friend looked quietly at the fish. It was no bigger than a finger. Then he asked Yan if he could borrow a lamp.\n\"What for?\" Yan asked. \"Well, it's so dark in here,\" the friend said with a dry smile, \"I can't see the other delicious dishes you've prepared for me.\"\n\nChang kept a lot of ducks and chickens on his farm. One day, his best friend came to visit him. At noon, Chang told his friend that he couldn't let him stay for lunch because there wasn't much food to eat. The friend looked out at Chang's farm animals for a moment. Then he asked Chang if he had a big knife.\n\"Yes, but what for?\" Chang asked. \"I'm thinking about killing the horse I rode here so we'll have something for lunch,\" the friend said. \"But how are you going to go home without it?\" \"Well, you wouldn't mind lending me one of your many ducks or chickens so I can ride it home, would you?\""}, "113-P5": {"id": "P5", "year": 113, "genre": "說明文", "topic": "修書師傅陳彥宏(Chen Bing-Hong)與書店Cotoha的故事", "text": "Usually, people visit bookstores to buy books. But those who walk into Cotoha come to see its owner, Chen Bing-Hong. They bring him books with different problems. Some have lost their covers, some are missing a few pages, and some have pages that are falling out. Chen can always fix the books and make them whole again.\nChen sees himself as a doctor. He says that books, like people, get sick and need help. In Taiwan, there are not many \"doctors\" like him, and most of them work for big libraries and museums. If big libraries and museums are hospitals, Chen's bookstore is a health center. Big libraries and museums fix important old books with serious problems, and Chen helps people with books that have smaller problems. However, the smaller size of the problems doesn't mean Chen's job is less important.\nChen gave an example of a science book he once worked on. It was very old and half of its cover was lost. Its owner still wanted to keep it because it was a gift from a teacher who helped him follow his dream of studying science. When he got his book back, he was very surprised at the new-old book. He felt he was brought back to the days with his teacher. Seeing the owner's smile made Chen happy, because smiles like that are what his magic is for."}, "113-P6": {"id": "P6", "year": 113, "genre": "說明文", "topic": "奧地利敘利亞難民合開的餐廳 Habibi & Hawara", "text": "A Delicious Surprise and Welcome Change\nBy Karl Falk, June 1, 2016\nIn Austria, there are not many restaurants like Habibi & Hawara. Here you can enjoy Austrian and Syrian food together. Two Austrians, Martin Rohla and David Kreytenberg, started this yummy plan from their experience of working with refugees. Every year, thousands of people have to leave their homes and families because of war in their countries. So many of them go to Austria that some people in the country think they have become a problem. They are afraid refugees may take away their jobs and they don't feel safe around them, either. But Rohla and Kreytenberg would beg to differ: The refugees don't have to be a problem. They want to help them start a new life. They invited refugees to meetings and found that some of them were cooks back in Syria. So the idea of Habibi & Hawara was born—a restaurant that brings together Austrian and Syrian food. \"The two worlds far away from each other meet together,\" Kreytenberg said. But Rohla and Kreytenberg want to do more than just give the refugees work. They want their best workers to buy the restaurant in the end. They hope that Habibi & Hawara is not just a one-time plan and that other Austrians will join them and help more refugees."}, "113-P7": {"id": "P7", "year": 113, "genre": "書信/網頁貼文", "topic": "讀者對 John Smith 復活絕種動物一書的評論", "text": "VOICES OF PEOPLE\nEllen Zimmer\nIf you want to learn about bringing back extinct animals, reading John Smith's Back from the Dead is a good start. But I have to say I can't agree with everything he says.\nFrom his book, I can see Smith is an advocate of bringing extinct animals back. He says we have lost many animals because we made their living spaces too dirty. He also thinks we must do everything we can to bring them back. However, I don't know how much time and money we would need to make the world a better place for them, and honestly no one knows if they could actually come back.\nSmith also says that bringing back extinct animals may be good for us. He talks about an extinct frog that grew tadpoles in its stomach. Some women's babies die before they are born, and Smith believes bringing back the frog may be an answer to the problem. According to him, by studying how the tadpoles grow inside the frog's stomach, we might be able to find new ways to help these women successfully keep their babies. But I don't think things are as easy as Smith thinks. We have spent ten years and millions of dollars on this kind of frog, but all we have got are only a few dead frog eggs. If we can't see a real frog, how can we be sure women will get the help they need?\nDr. Solomon Wang from the Animal Saving Office says the study of bringing back extinct animals is \"throwing good money after bad.\" And he's right. A lot of hard work has been put into this expensive dream, but we haven't seen anything come out of it. So should we still keep going down this road?"}, "113-P8": {"id": "P8", "year": 113, "genre": "說明文/圖表", "topic": "1918流感大流行中社交距離措施的成效(附城市死亡率圖表)", "text": "A HISTORY LESSON ON THE PANDEMIC 2020.10.29\nSince the Covid-19 pandemic started, people have begun \"social distancing\"— keeping a safe space between you and anyone you don't live with. Though it has been a very popular topic this year, social distancing 40 . In fact, it was widely used in the U.S. in the flu pandemic in 1918. But how well did it work? The Americans' experience can tell us whether it really saved lives.\nFrom the picture, we can see that 41 started social distancing earlier than the other three cities. This helped the city keep the number of deaths down. Besides taking early action, keeping the action long enough was also important in fighting the pandemic. The picture shows that Portland and Denver did well in the first few weeks. However, both cities 42 , and the numbers of deaths climbed again.\nBut there was one thing Portland did right. The city used several ways of social distancing at the same time to deal with the pandemic. 43 , sick people were kept away from healthy ones; schools were closed; public activities were not allowed. All these were useful in keeping people safe.\nThe lessons of the 1918 pandemic bring us hope. While we are still learning to fight Covid-19, social distancing may be the best way to get us through the dark days, at least for now.\n[附有各城市死亡率隨時間變化的統計圖表，原文為圖片]"}, "112-P1": {"id": "P1", "year": 112, "genre": "圖表(菜單/優惠訊息)", "topic": "Four Seasons' Kitchen 餐廳菜單、集點兌換與營業月曆", "text": "[原始題本為菜單價目表與八月營業月曆之圖表，pdftotext僅擷取到詞彙註解「calendar 月曆」，價目與月曆表格內容因圖片排版未能完整擷取為文字。] 題目敘述：Amy went to Four Seasons' Kitchen with her mother after she collected 15 stars. They ordered two Garden Sandwiches, an Autumn Wind, and a Winter Snow. Amy wants to bring her friends to Four Seasons' Kitchen in August. She looks at her calendar to pick a time to go there."}, "112-P2": {"id": "P2", "year": 112, "genre": "公告notice/說明文", "topic": "如何協助落巢的幼鳥", "text": "[原始題本為一則提醒民眾如何處理離巢幼鳥的圖文告示，pdftotext僅擷取到詞彙註解「nest 鳥巢」「feather 羽毛」，告示本文因圖片排版未能完整擷取為文字。] 題目線索：告示內容涉及幼鳥受傷與否、羽毛多寡時應如何處理（送醫、放回巢中、聯絡動物中心等），以及親鳥對沾有人類氣味幼鳥的反應。"}, "112-P3": {"id": "P3", "year": 112, "genre": "圖表(統計圖表)", "topic": "全球食物生產各階段的浪費比例", "text": "[原始題本為比較歐洲、北美與大洋洲、南亞與東南亞三地區在食物生產五個階段(Stage 1-5)食物浪費百分比的統計圖表，pdftotext僅擷取到詞彙註解「stage 階段」「waste 浪費」「percentage 百分比」，圖表數據因圖片排版未能完整擷取為文字。]"}, "112-P4": {"id": "P4", "year": 112, "genre": "說明文", "topic": "蚊子如何在下雨時存活", "text": "Sometimes when the rain falls hard and fast on you, it might hurt a little. But what happens when it hits a mosquito? A 2012 study says when a raindrop falls on a mosquito, it's like when a bus hits a person. Besides, the little insect is hit by a raindrop about once every 20 seconds. So why don't we see many dead mosquitoes after it rains?\nA mosquito is as big as a raindrop, but it is much lighter — 0.002 g only. This saves its life in raindrop attacks. Because the mosquito is so light, when it is hit by a raindrop, it won't experience a force that is strong enough to kill it.\nThe study also found that when a mosquito is hit by a raindrop, the insect is pushed by the raindrop and falls together with it. But the mosquito doesn't get wet easily because it is covered with hairs which keep off water. After dropping about 6 cm, it will roll off the raindrop and fly away.\nHowever, this trick isn't always successful. If the mosquito flies too low when it is hit by the raindrop, it won't have time to fly off. Then it will hit the ground and meet its death.\n(force 力量)"}, "112-P5": {"id": "P5", "year": 112, "genre": "說明文/人物介紹", "topic": "貝多芬鋼琴曲《給愛麗絲》中「愛麗絲」身分之謎", "text": "You probably have heard Beethoven's famous piano piece \"For Elise,\" but do you know who \"Elise\" was?\nOne story is that Elise was Elisabeth Röckel. She once sang in Beethoven's opera Fidelio, and the two became very good friends. Beethoven called her \"Elise.\" When Röckel was leaving the city of Vienna, Beethoven wrote \"For Elise\" to say goodbye to her. Another story is that Elise was Therese Malfatti. Beethoven was in love with her. He wrote a piece for her and put \"For Therese\" on the manuscript. Malfatti kept the manuscript and left it to her family when she died. Later, a man copied the manuscript and wrote \"For Elise\" by mistake. There is another possible Elise: Elise Barensfeld. She learned the piano from Malfatti, the same Malfatti in the second story. To help Malfatti, Beethoven wrote the piece for her to use to teach Barensfeld.\nThese are just some guesses about who Elise was. We may never know the right answer.\nNo one knew about the piece until 1867, when the manuscript was found. This was 40 years after Beethoven's death, so he wasn't around to tell us who Elise was. Only one thing is for sure: \"For Elise\" will always be enjoyed.\n(opera 歌劇 manuscript 手稿)"}, "112-P6": {"id": "P6", "year": 112, "genre": "說明文", "topic": "玩具選擇與性別刻板印象", "text": "Which would you give a boy for his birthday, a toy truck or a doll? If you choose the truck, well, you're not alone. Most people think that some toys are for boys and some are for girls. We might pick building toys for boys and kitchen toys for girls. But why do we do this? Are boys and girls really born with different interests in toys?\nNo, they are not. Children start to show different interests in toys at age three, but only because at this time, they begin to learn about gender and to follow what others of their gender do. If you give a girl kitchen toys, she will think they are girls' toys because she sees other girls playing with them. But if you give a girl a toy car and show her a group of girls who are playing with cars, she'll play with the toy car and think it is a girls' toy. This \"watch and follow\" habit often becomes a rule for both boys and girls in choosing the \"right\" toys.\nHowever, this rule can be bad for children. Different toys teach children different things. Dolls help with their early language use, and building toys are good for learning math and science. By playing with different toys, children can find out what they are interested in or what they are good at. If they only play one kind of toy, they may lose this important chance. They may also get a wrong idea about what boys or girls are able to do. Some doctors worry that children may use the same kind of thinking when they look for jobs in the future. If they do, they may miss something more important than just getting a chance to play with different toys. They may miss many, perhaps better, chances in life.\n(gender 性別)"}, "112-P7": {"id": "P7", "year": 112, "genre": "記敘文/人物傳記", "topic": "戰地記者Marie Colvin的生平", "text": "Marie Colvin was a world-famous war reporter. She was born in New York, USA, in 1956 and died in Homs, Syria, in 2012. When she was a student at Yale University, Colvin decided that she wanted to be a reporter in the future. She joined the Sunday Times, a UK newspaper, in 1985 and soon became its Middle East reporter. Besides the Middle East, she also reported from other parts of the world: Chechnya, Kosovo and Sri Lanka, for example. When she was reporting on the war in Sri Lanka, she lost her left eye. But that never stopped her. She still went to dangerous places that few reporters wanted to visit and stayed when others left.\nColvin showed great empathy in her stories. For her, war reporting was not just some quick interviews and a few photos. She wrote about real people and their real lives. Her writing made you feel so strongly about these people's stories, just like they were your own. She hoped that through her work the world would understand what really happened in war, and would take action to stop the fighting.\nOn February 22, 2012, the day after she gave her report on the war in Homs, Colvin was killed when the house she was staying in was attacked. She always knew what price a war reporter might have to pay. She already lost an eye before. This time, she gave her life to the work she could not give up — telling the true stories to the world.\n(war 戰爭)"}, "112-P8": {"id": "P8", "year": 112, "genre": "網頁貼文/書評", "topic": "《Speaking American》一書談美式英語各地用詞差異", "text": "Speaking American is a great book! Lucia Leisure ★★★★★\nI just love Josh Katz's new book! It's about ___(42)___ in different parts of the US. The information in the book was collected from the quiz that Katz built on the website in 2013. The quiz asked what words people use for something, and their answers showed interesting facts. For example, there are different names for sports shoes. In most parts of the US, people say \"tennis shoes.\" In the northeast of the country, people wear \"sneakers.\" In some towns, \"tennis shoes\" and \"sneakers\" become \"gym shoes.\"\nThe use of words tells us where people are from, like Katz's book says. But in my experience, it also shows ___(43)___. My family has lived in New York since my grandparents. It's not surprising that I say \"sneakers.\" But my grandfather says \"plimsolls,\" and my daughter says \"kicks\" or \"vans.\" Maybe Katz can study this difference for his next book.\n(website 網站)"}, "111-P1": {"id": "P1", "year": 111, "genre": "廣告DM", "topic": "Tea-Rock 20週年紀念明信片", "text": "(此篇為圖像式明信片廣告，原始PDF文字抽取僅保留註解 \"address 地址\"，明信片圖片內容未能以純文字擷取。內容大意：Tea-Rock茶飲品牌慶祝其20週年，並附上一張要寄給Tea-Rock 20的明信片圖樣，圖上有杯子圖案及待填寫的個人資料欄位。)"}, "111-P2": {"id": "P2", "year": 111, "genre": "圖表(統計圖)", "topic": "糖分攝取資訊圖表 (infographic)", "text": "Below is an infographic. (此篇為資訊圖表(infographic)，內容以圖像呈現各種食物/飲料中隱藏的糖分含量比較，原始PDF文字抽取僅保留說明文字 \"Below is an infographic.\" 及註解 \"infographic 資訊圖表\"，圖表數據本身未能以純文字擷取。)"}, "111-P3": {"id": "P3", "year": 111, "genre": "對話", "topic": "Darrell建議Marina使用Pinterest尋找靈感", "text": "Darrell: Marina…Marina…MARINA!\nMarina: Oh, sorry. I didn't hear you. I was thinking about my homework.\nDarrell: What's it about?\nMarina: Well, I need to draw a future house for my art class, but I haven't got any ideas. Maybe I should go to the library and look for something useful.\nDarrell: Or you can try Pinterest.\nMarina: Isn't it a shopping app?\nDarrell: Not really. Many people share their works on Pinterest and tell you how they made them. I'm sure you can get some ideas there.\nMarina: Sounds like you use it often.\nDarrell: Yeah. Just last week I went there and found the A to Z of making chocolate cake—from choosing good chocolate to baking the cake to making sugar flowers on top.\nMarina: Really? I'll check it out later. Thanks a lot."}, "111-P4": {"id": "P4", "year": 111, "genre": "說明文", "topic": "Tabata訓練法介紹", "text": "Tabata training is a very popular way of exercising these days. It doesn't take much time or space, and it burns calories faster than other ways of exercising. The idea of Tabata training is simple: exercise for 20 seconds, rest for 10 seconds, and then repeat (at least eight times). The moves for the 20-second exercise are not difficult to learn. Jumping jacks, high knees, squats, and planks are some of the most common moves. You can decide yourself what moves to do in your Tabata training. For example, you can do more leg exercises if you want strong legs.\n\nOne great thing about Tabata training is that your body will keep burning calories for at least an hour after 4 minutes of Tabata training. But to have this wonderful \"afterburn,\" you need to exercise really hard during each 20 seconds. If you seldom exercise or have heart problems, this exercise may not be good for you. But for people who enjoy exercising but are too busy to go to the gym, Tabata training might just be the answer.\n\n(calorie 卡路里(熱量單位); paragraph 段落)"}, "111-P5": {"id": "P5", "year": 111, "genre": "說明文", "topic": "無加班日(No Overtime Day)與長工時問題報導", "text": "The problem of long working hours is a real headache in our country. It kills many people every year (see Figure 1), and many companies are trying to change that. They have at least one \"No Overtime Day\" in a week, and it is often Wednesday. On \"No Overtime Day,\" workers are asked to leave their offices before 8 p.m. At 8 p.m., companies play the song \"There's Always Tomorrow\" and turn off all the lights.\n\nHowever, after the workers walk out of their offices, they don't go home. Some go back later, turn on their table lamps, and keep working, and others find somewhere else to work until very late at night. Restaurants and coffee shops are busier on Wednesday evenings, and they have started selling drinks and meals for these workers.\n\nBut why do these people keep working? A study shows that workers who work more hours often have a bigger chance to get paid more and rise higher in their companies. This is true for both men and women (see Figure 2). Working long hours has become a way to show that people are hard-working. Clearly, this must be changed before the problem gets any worse.\n\n(Figure 1, Figure 2 為圖表，原始資料未能以純文字擷取; average 平均)"}, "111-P6": {"id": "P6", "year": 111, "genre": "說明文(網頁新聞報導)", "topic": "喀麥隆(Cameroon)的語言與權力問題", "text": "http://www.aab.com/news/language-and-power-756315\nLanguage and Power: Cameroon's Story\nBy Elisa Grant, 2 Oct 2017\n\nIn the modern world, being able to speak English is often a way to get power. However, this is not true for English speakers in Cameroon. To know why things are different in this African country, we need to go back one hundred years.\n\nIn 1919, Kamerun (the name of Cameroon at the time) was cut into two parts: one belonged to France, and the other belonged to the UK. In 1960, the French Cameroon became the Republic of Cameroun, and the UK's part joined it in 1961. The new country changed its name to the Federal Republic of Cameroon. Although both French and English are Cameroon's official languages, only around 20% of its people speak English. Also, the government has been in French speakers' hands since the two parts became one country.\n\nFor a long time, Cameroon's English speakers have felt they are not welcome in their own country. For example, it is very difficult for them to find jobs in the government, and they are often asked to speak French in business and at official events. They have become more resentful at the government and decided to fight for themselves. Since last year, the English speakers have tried to build their own country. Yesterday, they said in a public meeting that they were not part of Cameroon anymore. They are now a new country, \"Ambazonia.\" When the police tried to stop the meeting, at least eight people were killed.\n\nRead more\n\n(official 官方的; government 政府)"}, "111-P7": {"id": "P7", "year": 111, "genre": "說明文(旅遊步道介紹)", "topic": "Southend步道健行旅遊介紹", "text": "THE SOUTHEND TRAIL has been popular with nature lovers for years. The 120-km trail passes beautiful lakes, crosses rivers, and goes through mountains and hills. This gives bird lovers some of the best places for birdwatching. The trail also takes you to the Southend Museum and to two famous castles, Edward Castle and Sloan Castle.\n\nIt's best to plan one day for one part of the trail and start your hike early in the morning, because each part takes at least seven hours. If you don't want to walk, you can bike, but make sure you stay on the main trail, because the side trails are not wide enough for biking.\n\nThere are two types of lodging for visitors. Camping is popular in summer, but it is only allowed on a few campgrounds (see the map). A more comfortable one is to stay at a hotel in one of the towns. You can find some very nice ones that also have breakfast.\n\n(trail 步道; recommend 推薦)\n(附有步道地圖，標示Parts 1, 2, 2a, 3, 4, 4a及Cove等地點，原始地圖圖像未能以純文字擷取。)"}, "111-P8": {"id": "P8", "year": 111, "genre": "說明文", "topic": "回文(palindromes)與變位詞(anagrams)", "text": "English words are made of 26 letters, and palindromes and anagrams are two kinds of word games about spelling. A palindrome is a word or a sentence that reads the same from left to right or from right to left, 40 , \"eye,\" \"Bob,\" \"my gym,\" and \"Was it a car or a cat I saw?\" An anagram of a word or words is made by putting the letters of the word or words in a different way. Look at the words and their anagrams below. Can you think of other possible anagrams of these words?\n\nAnagrams are often longer words that don't really mean anything but are fun to say. Sometimes they can even mean something 42 , like when a common word, \"restaurant,\" becomes \"Eat rats, run!\"\n\nActually, palindromes and anagrams are 43 . Palindromes can be used to learn mathematics and make music. Anagrams are also a good way to hide something. In history, people often hid their important studies in anagrams. Can you think of any other way to use them?"}, "110-P1": {"id": "P1", "year": 110, "genre": "廣告DM", "topic": "e-BeautiMed 線上商店集點優惠活動", "text": "We've prepared many wonderful surprises for you at e-BeautiMed, BeautiMed's online store!\n\nSurprise 1\nJoin \"BeautiMed Friend\" online for free and get 2000 BeautiMed points!\n\nSurprise 2\nAlready a \"BeautiMed Friend\"? Come collect your free gift by entering your \"BeautiMed Friend\" card number at e-BeautiMed before 8/31.\n\nSurprise 3\nGet 500 BeautiMed points by shopping at e-BeautiMed and you'll get 500 more points if you spend more than $1,000.\n\nSurprise 4\nShop at e-BeautiMed during 7/1-8/31 and you may win $5,000 or free movie tickets!\n\nSurprise 5\nInvite a friend to join \"BeautiMed Friend\" and you both can get 1000 points each!"}, "110-P2": {"id": "P2", "year": 110, "genre": "對話", "topic": "Joey 與 Lynn 討論 Caldron 餐廳的火鍋用餐經驗", "text": "Joey: Lynn, have you tried Caldron? I've heard that restaurant is good.\nLynn: I have. I went there once for Tom's party.\nJoey: And?\nLynn: Well, I never thought I would have to cook for myself when eating out.\nJoey: But it's fun to cook your own food.\nLynn: I don't see any fun in that. Besides, I want nice food.\nJoey: So you didn't like the food there?\nLynn: Everything tasted the same. I mean, they were all cooked in the same boiling pot. How could they taste different? I just kept throwing strange things into the pot. I didn't even know what half the things were made of.\nJoey: Don't worry. Everything should be safe to eat after a hot bath in the pot. And you didn't get sick after that, right? Besides, you tried something different there. Still a good experience, I think?\nLynn: I don't think we share the same idea of good experiences."}, "110-P3": {"id": "P3", "year": 110, "genre": "記敘文", "topic": "Katie 的日記：關於綿羊 Woollie 的故事", "text": "Dear Diary, June 7, 2011\nI was very sad to hear what happened to Woollie yesterday. Woollie was my favorite sheep. I have a storybook about Woollie. It says when Woollie was four, he ran away from Mr. Armstrong's farm, and it took Mr. Armstrong six years to find Woollie. But Woollie had grown so much fleece that he didn't even look like a sheep. Mr. Armstrong decided to cut his fleece on TV so everyone could see. Daddy said this happened on the day I was born. Woollie's fleece weighed 27 kg, and could make clothes for 20 large men. I asked Daddy if his favorite vest was made from Woollie's fleece. Daddy said no, because Woollie's fleece was sold to collect money for sick kids. In the storybook, Woollie was taken to see Ms. Stella Clark, the leader of our city then. They even had tea together. Daddy said Woollie did meet Ms. Clark, but he wasn't sure if they had tea. Daddy said Woollie was put down because he was too sick and there was no way to help him. I cried. I hope Woollie will be happy up there in the sky.\n(fleece 羊毛 weigh 重達)"}, "110-P4": {"id": "P4", "year": 110, "genre": "說明文", "topic": "介紹馬諦斯的名畫《鋼琴課》", "text": "Here's The Piano Lesson, one of Henri Matisse's most famous paintings. The boy in the picture is the painter's son, Pierre. In the picture, Pierre looks quite serious. Why? Well, look at the yellow candle on the red piano. It's almost burned down. So maybe Pierre has already practiced for hours. And Matisse uses a lot of gray, not a very fun color, right? It shows how the poor kid feels, don't you think?\nOn the top right corner, you can see a woman sitting straight on a seat. Is she Pierre's piano teacher? Or his mother? Well, if you're a Matisse fan, you'll know this is in fact another painting by him, Woman on a High Stool. Interesting, right? Matisse likes to do that a lot. In fact, there's another work by Matisse in the picture. Did you find it? Right! The sculpture on the bottom left corner!\nMatisse painted this picture in 1916. Pierre was already 16 then, but the artist painted his son much younger than he really was. Pierre had gone away to be a soldier, and Matisse didn't know whether he would come back. Maybe this is a worried father's way to remember the good old days.\n(sculpture 雕像)"}, "110-P5": {"id": "P5", "year": 110, "genre": "說明文", "topic": "教師節的由來與歷史演變", "text": "On Teachers' Day, we thank our teachers for their hard work. We also celebrate this day to remember Confucius, the great Chinese teacher from 2,500 years ago. Well, that's everything we're taught about Teachers' Day. But, the first Teachers' Day was not on Confucius's birthday, and it was not about thanking our teachers.\nIn 1930, Mr. Tai Shuang-qiu and other teachers celebrated the first Teachers' Day in Nanjing. But there was nothing to celebrate. Teachers were paid very little and not respected. These teachers took this chance to shout out their problems. They had Teachers' Day on June 6 because the date was easy to remember and near the end of the school year. This action by Mr. Tai and the other teachers was welcomed and followed by teachers from other cities. In 1939, the government made Teachers' Day a national holiday. However, it was on August 27, the day when Confucius's birthday was celebrated. Not everyone hailed this decision: Teachers' Day was never about Confucius, and Confucius couldn't speak for all the teachers either.\nOne funny thing was that the government was wrong about the date of Confucius's birthday. In 1952, people found out he was in fact born on September 28. That was when we started to celebrate Teachers' Day on Confucius's real birthday.\n(respect 尊敬 government 政府)"}, "110-P6": {"id": "P6", "year": 110, "genre": "公告通知", "topic": "國家寶島鐵路因颱風改道公告信件", "text": "Dear Traveler,\nYou have bought an NFR ticket online for a train that runs between White Water City and Cloud City. We are sorry to tell you that, because of the typhoon last month, the Sand Town – Spring Town line will be closed between August 14 and 28 2016. During this time, some trains will change lines and will not stop at a few stations. There will be free buses to take travelers to these stations. Please check below for the changes. Visit http://www.nfr.gov/ for more information.\nWe wish you a nice summer.\nLena Muller\nNational Formosa Railway\n\n1. Trains that run between Green City and Cloud City will take the Smoke Town – Spring Town line, and will stop at every station. Below are the trains that will change lines:\nGoing South: RL101 White Water City -> Cloud City; RL102 White Water City -> Spring Town; RL103 Green City -> Cloud City\nGoing North: RL201 Spring Town -> Green City; RL202 Cloud City -> Green City\n2. The free buses for the Sand Town – Spring Town line will wait at Green City (going south) and Spring Town (going north) stations. No stop at Gray Village.\n(Stations on the Sand Town - Spring Town line, north to south: Spring Town, Hill Town, Black Town, Gray Village, Sand Town; other stations: White Water City, Green City, Smoke Town, Cloud City)\n(line 路線)"}, "110-P7": {"id": "P7", "year": 110, "genre": "說明文", "topic": "敘利亞 Darayya 地下祕密圖書館", "text": "SYRIA - Darayya\nIn Darayya, a city in Syria, there's a library, and it has 15,000 books on almost every subject you can think of. However, it is different from any libraries you know: It is a secret underground library, and only people in Darayya know where it is.\nOver the years, war has shaken Darayya badly. Every day, houses are bombed and people are killed. Stores are closed one after another, and so are schools. To help the kids in Darayya with their learning, Anas Ahmad, a 19-year-old student, and his friends decided to build a library. They built the library under the ground to keep it safe from bombing. But it is dangerous to collect books for the library. Often, Ahmad and his friends look for books in houses that were bombed. They need to be careful because they may be killed in another bombing.\nYou may ask, \"In a place like Darayya, would people be interested in books?\" \"Just like the body needs food, the mind needs books,\" says one library user. In the library, people enjoy their time of reading and forget about the terrible world above, so their life doesn't seem so hard. Through reading, they are able to dream of a better life after war.\n(war 戰爭 bomb 轟炸 seem 彷彿)"}, "110-P8": {"id": "P8", "year": 110, "genre": "書信email", "topic": "Mia Loren 寄給 Dave Doddo 關於兒子生日派對的邀請信", "text": "From: Mia Loren <mloren@qmail.com>\nTo: Dave Doddo <dd1225@qmail.com>\nDate: Tue, Oct 24, 2017 at 10:01 AM\nSubject: Daniel's 5th Birthday Party – This Saturday!\n\nHello Dave,\nWe're happy to invite you and your family to Daniel's fifth birthday party this Saturday.\nWe know we told you that the party would be in  35 . However, we just moved to Carlton City last month, so the party won't be in Pattersons Town. It'll be at Mosman Garden right next to Victor Zoo, just across from our new apartment. Please don't go to Northbank Park next to our old house.\nThe weather report said that it may be rainy this weekend, but  36 . If it rains, we'll move the party inside our home. However, if we're  37  and it is fine, we'll still have the party at the garden.\nAgain, we're all very happy and excited to welcome you to join us for some fun this weekend!\nBest, Mia, Sam & Daniel"}, "110-P9": {"id": "P9", "year": 110, "genre": "記敘文", "topic": "夜晚穿越公園時因誤會而受到驚嚇的故事", "text": "Usually I wouldn't cross the park at this time of night. But walking around the park would take more time, and it was raining so hard that I couldn't even see clearly what was right before me. So I entered the park. And that was the first stupid thing I did tonight. Soon after I walked into the park, I saw a man under a tree up ahead. My heart fell. The stories I'd heard about the park  38  into my head at this moment. Anyone with a clear mind would just turn back. But me? No. I did  39  stupid thing: I decided to hurry past him. Just when I was passing the man, he raised his head and gave me the strangest smile ever. I got scared and started running. \"Hey!\" the man shouted from behind. \"Wait!\" He was running after me! I ran like crazy. I had hoped the trees would keep some rain off. And they  40 . But they also made the park look even darker. I couldn't see what was ahead of me. Then, I ran into something. It was the man! \"Don't kill me!\" I cried. \"What? I  41  to give back your bag! You dropped it,\" the man gave me my bag. Now, I felt saying that to the man was the stupidest thing I did tonight.\n(ahead 在前面)"}}, "reading": [{"id": "R115-1", "year": 115, "no": 1, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "Look at the picture. All of the students who are exercising are wearing ___.", "options": {"A": "caps", "B": "glasses", "C": "jackets", "D": "pants"}, "answer": "B", "img": true}, {"id": "R115-2", "year": 115, "no": 2, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Rita ___ her dogs many times a day. That's why they're too fat.", "options": {"A": "feeds", "B": "kisses", "C": "walks", "D": "washes"}, "answer": "A", "img": false, "expl": "由後句「That's why they're too fat.（難怪牠們太胖）」可知空格動作與變胖有關，故選 (A) feeds（餵食）。一天餵狗好幾次才會導致肥胖。誘答 (C) walks（遛狗）反而會消耗熱量、使狗變瘦，與語意矛盾。"}, {"id": "R115-3", "year": 115, "no": 3, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "You can ask Sophia anything about butterflies and bees. She has great ___ of insects.", "options": {"A": "chances", "B": "knowledge", "C": "news", "D": "power"}, "answer": "B", "img": false, "expl": "空格前有形容詞 great 修飾，且句意為「關於蝴蝶與蜜蜂什麼都能問她」，表示她對昆蟲很有『了解、知識』，故選 (B) knowledge（知識）。have knowledge of...為固定搭配。誘答 (A) chances（機會）、(D) power（力量）皆與「懂得很多」的語意不合。"}, {"id": "R115-4", "year": 115, "no": 4, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Adam slept ___ last night because he kept waking up from bad dreams.", "options": {"A": "deeply", "B": "early", "C": "terribly", "D": "quickly"}, "answer": "C", "img": false, "expl": "空格為修飾 slept 的副詞，且後句說明他因惡夢一直醒來，可知他睡得『很糟』，故選 (C) terribly（糟糕地）。誘答 (A) deeply（沉沉地）意思剛好相反，與「一直醒來」矛盾。"}, {"id": "R115-5", "year": 115, "no": 5, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "Tara enjoys being with all kinds of animals; she even ___ a snake as a pet.", "options": {"A": "drops", "B": "gives", "C": "keeps", "D": "makes"}, "answer": "C", "img": false, "expl": "句意為「她甚至把蛇當寵物『養』」，keep a ... as a pet 是「養寵物」的慣用說法，故選 (C) keeps。誘答 (D) makes 無「飼養」之意，不能與 as a pet 這樣搭配表示豢養。"}, {"id": "R115-6", "year": 115, "no": 6, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Little Eric chose the doll ___ big brown eyes because it was the cutest in the store.", "options": {"A": "at", "B": "in", "C": "on", "D": "with"}, "answer": "D", "img": false, "expl": "描述娃娃「有一雙大棕色眼睛」的特徵，表『具有／帶有』某特徵須用介系詞 with（the doll with big brown eyes），故選 (D)。誘答 (B) in 用於顏色多指穿著（a girl in red），不用於描述五官特徵。"}, {"id": "R115-7", "year": 115, "no": 7, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "After four hours of mountain climbing, Rosa's legs got ___, so she took a rest on the top of the mountain.", "options": {"A": "dirty", "B": "sick", "C": "sore", "D": "strong"}, "answer": "C", "img": false, "expl": "爬山四小時後雙腿的狀態，加上後面因此要休息，可知腿變得『痠痛』，故選 (C) sore（痠痛的）。誘答 (B) sick（生病的）多指身體不適或噁心，不用來形容運動後的肌肉痠痛。"}, {"id": "R115-8", "year": 115, "no": 8, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Having three cups of coffee a day can't be bad for our health, ___?", "options": {"A": "can it", "B": "can they", "C": "is it", "D": "are they"}, "answer": "A", "img": false, "expl": "本題考附加問句。主詞 Having three cups of coffee a day 為動名詞片語，視為單數，用代名詞 it；前句含否定 can't，附加問句須改為肯定 can it，故選 (A)。誘答 (B) can they 代名詞誤用複數 they。"}, {"id": "R115-9", "year": 115, "no": 9, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "You can't push that door open with only one hand. It's too heavy. You have to use ___!", "options": {"A": "all", "B": "another", "C": "both", "D": "one"}, "answer": "C", "img": false, "expl": "推門需要「兩隻手一起用」，前文 with only one hand（只用一隻手）對比，故用 (C) both（兩者都）指兩隻手都用上。誘答 (A) all 用於三者以上，手只有兩隻，語意不合。"}, {"id": "R115-10", "year": 115, "no": 10, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Alan works hard in his new job, and he wants to know ___ his boss feels about him.", "options": {"A": "how", "B": "that", "C": "whether", "D": "why"}, "answer": "A", "img": false, "expl": "空格引導名詞子句作 know 的受詞，表達「他想知道老闆對他的『感覺如何』」，問感受的方式/程度用 (A) how（feel about 後接 how 表『覺得怎麼樣』）。誘答 (D) why 問原因，與「想知道感受」不合。"}, {"id": "R115-11", "year": 115, "no": 11, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "I thought the girl ___ was Kate, but it was her sister, Candy. They sounded almost the same.", "options": {"A": "answered the phone", "B": "she answered the phone", "C": "who answered the phone", "D": "and answered the phone"}, "answer": "C", "img": false, "expl": "空格引導修飾先行詞 the girl（人）的關係子句，且關係代名詞在子句中作主詞，故用 (C) who answered the phone。誘答 (B) she answered the phone 多了主詞 she，形成無連接詞的贅字錯誤。"}, {"id": "R115-12", "year": 115, "no": 12, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Ken is going abroad with a woman he met online, though he doesn't know ___ well.", "options": {"A": "her", "B": "each other", "C": "any", "D": "another"}, "answer": "A", "img": false, "expl": "although 子句意為「雖然他不太了解『她』」，受詞指那位女子，用受格代名詞 (A) her。誘答 (B) each other（彼此）為相互代名詞，但此處僅指 Ken 單方面不了解對方，語意與結構不合。"}, {"id": "R115-13", "year": 115, "no": 13, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "Joe is happy he is not at the ___ of the class now. His grades are better than half of his classmates' this school year.", "options": {"A": "side", "B": "front", "C": "center", "D": "bottom"}, "answer": "D", "img": false, "expl": "後句說他成績比一半同學好，表示他不再位於班上的『最後／墊底』，故選 (D) bottom（底部）。at the bottom of the class 指成績吊車尾。誘答 (B) front 與成績進步、贏過半數同學的語境不符。"}, {"id": "R115-14", "year": 115, "no": 14, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Look! There is not a cloud in the sky. I think the chances of getting some rain today are really ___.", "options": {"A": "far", "B": "good", "C": "possible", "D": "small"}, "answer": "D", "img": false, "expl": "天空萬里無雲，可推知今天下雨的機會『很小』，故選 (D) small。chances 與 small/good 搭配表機率高低。誘答 (B) good 表機率大，與『沒有雲』的線索相反。"}, {"id": "R115-15", "year": 115, "no": 15, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "On windy days, the flowers in my garden ___ like shy children with their heads down.", "options": {"A": "bow", "B": "fall", "C": "rise", "D": "smell"}, "answer": "A", "img": false, "expl": "描述花在強風中「低著頭像害羞的孩子」，故用 (A) bow（低頭、彎身），呼應 with their heads down 的畫面。誘答 (B) fall（掉落）指花朵落下，與「低頭」的擬人意象不同。"}, {"id": "R115-16", "year": 115, "no": 16, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Mr. Olson went to the doctor when he found he ___ his hair. He hoped he would be able to keep his thick hair.", "options": {"A": "was losing", "B": "is losing", "C": "will lose", "D": "has lost"}, "answer": "A", "img": false, "expl": "他發現正在『逐漸掉髮』才去看醫生，強調當時進行中的狀態，且與後句「希望能保住頭髮」呼應，故用過去進行式 (A) was losing。誘答 (D) has lost（現在完成式）與描述過去發現的時間點不一致。"}, {"id": "R115-17", "year": 115, "no": 17, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Do you know what Lindsey's first job was? Before becoming a movie star, she ___ the floors at the supermarket.", "options": {"A": "mops", "B": "is mopping", "C": "has mopped", "D": "mopped"}, "answer": "D", "img": false, "expl": "由 Before becoming a movie star（成為影星之前）可知敘述過去的舊工作，須用過去簡單式 (D) mopped。誘答 (A) mops 為現在式，與「以前的第一份工作」時間矛盾。"}, {"id": "R115-18", "year": 115, "no": 18, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Our dog Lassie hides under the bed every time the moon comes out. She has been ___ for years, but we don't know why.", "options": {"A": "it", "B": "like this", "C": "like us", "D": "that"}, "answer": "B", "img": false, "expl": "空格接在 has been 之後，需一個表『這個樣子（這種行為）』的補語，故選 (B) like this，呼應前句所描述的躲床下行為。誘答 (D) that 無法單獨作此補語，語意與結構皆不通。"}, {"id": "R115-19", "year": 115, "no": 19, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Tom: Sam, could you help me in the kitchen now?\nSam: No, I ___ TV. It's the most important game of the season.", "options": {"A": "watch", "B": "watched", "C": "have watched", "D": "am watching"}, "answer": "D", "img": false, "expl": "Sam 拒絕幫忙的理由是『我正在看電視』，強調此刻正在進行，故用現在進行式 (D) am watching，與「這是本季最重要的比賽」呼應。誘答 (A) watch 為習慣性現在式，無法表達當下正忙。"}, {"id": "R115-20", "year": 115, "no": 20, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "115-P1", "stem": "Amanda wants to make fruit tea by following The Best Fruit Tea You Can Make at Home. She has several kinds of fruit in the kitchen: apples, bananas, oranges, papayas, pears, and strawberries. Which are some of the fruits she can use to make the fruit tea?", "options": {"A": "Oranges, papayas and pears.", "B": "Apples, bananas and oranges.", "C": "Apples, oranges and strawberries.", "D": "Bananas, papayas and strawberries."}, "answer": "C", "img": true}, {"id": "R115-21", "year": 115, "no": 21, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "115-P1", "stem": "According to the reading, which is correct when we make the fruit tea?", "options": {"A": "Boiling water with sugar in it.", "B": "Making sure to take out the fruit.", "C": "Putting in the fruit and the lemon juice at the same time.", "D": "Leaving the teabags in the pot of hot water for 2 to 3 minutes."}, "answer": "D", "img": true}, {"id": "R115-22", "year": 115, "no": 22, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "115-P2", "stem": "According to the comics, what kind of person is Hawkins?", "options": {"A": "He sees good things in people.", "B": "He never goes to work on time.", "C": "He blindly follows other people.", "D": "He talks about things he can't do."}, "answer": "D", "img": false, "expl": "Hawkins 六年級誇口能縮短上課、當業務時揚言月售五十輛卻只賣一輛，反映他愛『說些做不到的大話』，故選 (D)。誘答 (A) 說他看見別人的優點，文中並無此描述，反而處處是自誇。"}, {"id": "R115-23", "year": 115, "no": 23, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "115-P2", "stem": "What does it mean when we say someone bombed something?", "options": {"A": "They gave it up.", "B": "They failed at it.", "C": "They were fine with it.", "D": "They were careful about it."}, "answer": "B", "img": false, "expl": "由兩處情節可判斷 bombed 之意：競選班長慘敗、業務因業績太差被解僱，皆為『失敗』，故選 (B) failed at it。誘答 (A) gave it up（放棄）不同，他並非主動放棄而是遭遇失敗。"}, {"id": "R115-24", "year": 115, "no": 24, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "115-P3", "stem": "Which question can the brochure answer?", "options": {"A": "Can I order tickets online?", "B": "How much are the tickets?", "C": "How can I get to the Marigolds' Home?", "D": "When can I visit the Marigolds' Home?"}, "answer": "D", "img": false, "expl": "手冊列出開放時間「三月至十月10:00-17:00、週一休館」，可回答『何時可參觀』，故選 (D)。誘答 (B) 票價、(A) 網路訂票文中皆未提及，(C) 交通方式也沒有說明。"}, {"id": "R115-25", "year": 115, "no": 25, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "115-P3", "stem": "What breaks the rules for visitors to the Marigolds' Home?", "options": {"A": "Eating burgers in the Rose Garden.", "B": "Taking pictures in the Main House.", "C": "Entering the Rabbit's Temple without shoes.", "D": "Taking pet dogs for a walk on the playground."}, "answer": "D", "img": false, "expl": "規則第1條明訂『任何區域皆不可帶寵物』，故在遊樂場遛狗違規，選 (D)。誘答 (A) 玫瑰園（戶外）吃漢堡不違反「建築物內不可飲食」；(C) 脫鞋進兔子神殿正符合規則第4條。"}, {"id": "R115-26", "year": 115, "no": 26, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "115-P3", "stem": "After shopping at the gift shop of the Main House, Lizzy walks out and sees the Family Library in front of her. She wants to visit the Rose Garden. How can she get there?", "options": {"A": "Turn left and walk past the Main House, then go straight and turn right at the corner.", "B": "Turn left and walk past Sir Archie's House, then turn right and walk past the Main House.", "C": "Turn right and go straight to the Farmyard, then turn right and go straight, then turn left at the corner.", "D": "Turn right and walk through the Butterfly Garden, then walk past the Rabbit's Temple and the café."}, "answer": "C", "img": true}, {"id": "R115-27", "year": 115, "no": 27, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "115-P4", "stem": "Why was Beatrice Harrison called the Nightingale Lady?", "options": {"A": "She wrote songs about nightingales.", "B": "She sang as beautifully as a nightingale did.", "C": "She taught nightingales to sing in a radio show.", "D": "She was famous for playing music with nightingales."}, "answer": "D", "img": false, "expl": "文末說明因她長年在廣播中與夜鶯一同演奏音樂而聞名，人們才稱她 the Nightingale Lady，故選 (D)。誘答 (B) 唱得像夜鶯不對，她是拉大提琴（cello），並非歌唱。"}, {"id": "R115-28", "year": 115, "no": 28, "section": "題組", "type": "閱讀理解", "skill": "指代", "pkey": "115-P4", "stem": "Which is NOT used in the reading to mean the nightingale(s)?", "options": {"A": "Her visitor.", "B": "The little singers.", "C": "The artist.", "D": "Her garden friends."}, "answer": "C", "img": false, "expl": "文中 her visitor、the little singers、her garden friends 皆指夜鶯；而 the artist（那位藝術家）指的是演奏者 Harrison 本人，並非夜鶯，故選 (C)。"}, {"id": "R115-29", "year": 115, "no": 29, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "115-P5", "stem": "Why does Alex Jackson write about Rose Lacey?", "options": {"A": "Because she died.", "B": "Because she is very sick.", "C": "Because she is moving away.", "D": "Because she is leaving for another job."}, "answer": "A", "img": false, "expl": "由開頭 say goodbye、will be sadly missed 及文末 In her short life of 40 years、made her mark 等悼念語氣可知 Rose 已過世，這是一篇追悼文，故選 (A)。誘答 (C) 搬家與全文哀悼的語調不符。"}, {"id": "R115-30", "year": 115, "no": 30, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "115-P5", "stem": "How did Rose Lacey and Alex Jackson get to know each other?", "options": {"A": "They met at a party.", "B": "They were relatives.", "C": "They worked in the same office.", "D": "They took a course on movies together."}, "answer": "A", "img": false, "expl": "第二段 Rose and I first met... I was at a party，說明兩人在一場派對上相識，故選 (A)。誘答 (C) 同辦公室不對，是 Alex 邀她『撰稿』而非原本同事。"}, {"id": "R115-31", "year": 115, "no": 31, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "115-P5", "stem": "What is special about Rose Lacey's articles?", "options": {"A": "They are important to movie makers.", "B": "They talk about movies from a fresh angle.", "C": "They give interesting information about actors.", "D": "They are good examples of how to write stories."}, "answer": "B", "img": false, "expl": "文中說她總能從大家熟知的電影中『帶出新意』、讓人以全新方式重看電影，可知她的文章以『新鮮的角度』談電影，故選 (B)。誘答 (C) 提供演員資訊，文中並未著墨。"}, {"id": "R115-32", "year": 115, "no": 32, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "115-P6", "stem": "Why does the title say \"Glass Bottles' Second Life\"?", "options": {"A": "People collect sea glass and use it to make new glass bottles.", "B": "People collect sea glass at the beach and use it to make wishes.", "C": "Glass bottles that are thrown into the sea become the homes of sea animals.", "D": "Glass bottles that are thrown into the sea become sea glass which is used in art pieces."}, "answer": "D", "img": false, "expl": "標題「玻璃瓶的第二人生」指被丟入海中的玻璃瓶經海水磨蝕變成海玻璃，再被藝術家用於創作，等於獲得新生命，故選 (D)。誘答 (C) 成為海洋動物的家，文中並未提及。"}, {"id": "R115-33", "year": 115, "no": 33, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "115-P6", "stem": "According to the reading, how is sea glass made?", "options": {"A": "Sea glass becomes rounder after it is pushed up to the beach.", "B": "Colder sea water helps pieces of glass become sea glass faster.", "C": "Pieces of glass become white on the outside after many years in the sea.", "D": "Glass bottles break into pieces when they are dug out from the sea floor."}, "answer": "C", "img": false, "expl": "第4點說玻璃碎片在海中歷經數十至數百年後，外層長出『冰狀的白色』而成海玻璃，故選 (C)。誘答 (A) 順序顛倒，碎片是在海底變圓，而非被沖上岸後才變圓。"}, {"id": "R115-34", "year": 115, "no": 34, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "115-P6", "stem": "According to the reading, why will less sea glass be found in the future?", "options": {"A": "People do not make as many glass items as before.", "B": "People have learned not to throw garbage into the sea.", "C": "Artists are using too much sea glass in their art pieces.", "D": "Waves are not big enough to push sea glass up to the beach."}, "answer": "A", "img": false, "expl": "末段指出現在人們很少用玻璃製瓶碗、改用紙製品，海中玻璃變少，海玻璃自然減少，故選 (A)。誘答 (B) 學會不亂丟垃圾，文中未提及此原因。"}, {"id": "R115-35", "year": 115, "no": 35, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "115-P7", "stem": "What does the prevalence of English mean?", "options": {"A": "That English is very common.", "B": "That English is not welcomed.", "C": "That English is easy and simple.", "D": "That English is not a national language."}, "answer": "A", "img": false, "expl": "prevalence（普遍、盛行）指英文在冰島到處可見、非常常見，由下文『你在冰島到處都看得到英文』可推知，故選 (A) very common。誘答 (C) 簡單易學與該字意義無關。"}, {"id": "R115-36", "year": 115, "no": 36, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "115-P7", "stem": "In the first reading, which is one of the ways that Anna Adams uses to make readers believe in her ideas?", "options": {"A": "Sharing her own life stories.", "B": "Borrowing from people's experience.", "C": "Using examples from another language.", "D": "Showing information from news reports."}, "answer": "B", "img": false, "expl": "Anna Adams 引用工程師 Helgi、教師 Eirikur 等人的親身話語與經驗來支持論點，屬『借用他人的經驗』，故選 (B)。誘答 (A) 分享自己的生活故事不對，她引用的是別人而非自己。"}, {"id": "R115-37", "year": 115, "no": 37, "section": "題組", "type": "閱讀理解", "skill": "指代", "pkey": "115-P7", "stem": "Which words in the second reading are NOT used to describe Icelandic?", "options": {"A": "A language in its sickbed.", "B": "A dying language.", "C": "Our first language.", "D": "This beautiful language."}, "answer": "B", "img": false, "expl": "第二篇用 a language in its sickbed、our first language、this beautiful language 形容冰島語；a dying language（垂死的語言）文中並未出現，故選 (B)。"}, {"id": "R115-38", "year": 115, "no": 38, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "115-P7", "stem": "Are Anna Adams and Gunnar Eggertsson worried about the future of Icelandic?", "options": {"A": "No, they are not.", "B": "Yes, they both are.", "C": "Adams is, but Eggertsson is not.", "D": "Adams is not, but Eggertsson is."}, "answer": "C", "img": false, "expl": "Anna Adams 擔憂冰島語會被英語取代（may happen soon）；Gunnar Eggertsson 則反駁『生病說』、態度較樂觀。故 Adams 擔憂、Eggertsson 不擔憂，選 (C)。"}, {"id": "R115-39", "year": 115, "no": 39, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "115-P7", "stem": "Which idea do Anna Adams and Gunnar Eggertsson both talk about in the readings?", "options": {"A": "Whether Icelanders speak better English than Icelandic.", "B": "Whether the number of Icelandic speakers is big enough.", "C": "Whether school subjects should be taught only in Icelandic.", "D": "Whether Iceland should allow more foreigners to work in Iceland."}, "answer": "B", "img": false, "expl": "兩篇都談到冰島語使用者人數的問題：Adams 提到僅31萬4千人、人數太少，Eggertsson 亦回應此議題，故選 (B)。誘答 (D) 是否允許更多外國人工作僅 Adams 略提，非雙方共同討論。"}, {"id": "R115-40", "year": 115, "no": 40, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "115-P8", "stem": "Choose the best word(s) for blank 40 in the story.", "options": {"A": "give you a piece of good land", "B": "choose a person to be the next king", "C": "put the beautiful ones in my castle", "D": "decide who will work in my garden"}, "answer": "B", "img": false, "expl": "國王膝下無子、想從孩子中挑選繼承高位者，故空格應填『挑一個人當下一任國王』，選 (B)。呼應後文大家興奮說某人『將成為國王』。誘答 (A) 給一塊地與挑選繼承人的主旨不符。"}, {"id": "R115-41", "year": 115, "no": 41, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "115-P8", "stem": "Choose the best sentence for blank 41 in the story.", "options": {"A": "But he lost his pot a few weeks later", "B": "Months passed but nothing grew from it", "C": "But soon the plant that grew from it died", "D": "The seed grew into a big tree in a short time"}, "answer": "B", "img": false, "expl": "前句說 Wong 每天澆水曬太陽細心照料，後文卻說他的盆裡始終沒長出東西，故空格應填『幾個月過去卻什麼也沒長出來』，選 (B)，形成轉折。誘答 (D) 種子長成大樹與後文『什麼都沒長』矛盾。"}, {"id": "R115-42", "year": 115, "no": 42, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "115-P8", "stem": "Choose the best word(s) for blank 42 in the story.", "options": {"A": "the last one to give up", "B": "the first one to share good news", "C": "the first one to bring his pot to the king", "D": "the only one to take good care of his plant"}, "answer": "B", "img": false, "expl": "由後句 Then, Sung... told people a small plant was growing 及大家興奮反應可知，Sung 是『第一個分享好消息（發芽）的人』，故選 (B)。誘答 (C) 第一個把盆子帶給國王不對，此時尚未到繳交日。"}, {"id": "R115-43", "year": 115, "no": 43, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "115-P8", "stem": "Choose the best word for blank 43 in the story.", "options": {"A": "wise", "B": "strong", "C": "honest", "D": "popular"}, "answer": "C", "img": false, "expl": "空格前 Sung 說自己的種子長出小植物，接著大家興奮地說他會當國王，可見他是在說謊誇口，符合故事後段「王看到其他孩子的植物都不高興、唯獨看到 Wong 空盆才滿意」的伏筆（種子其實無法發芽）。故正解為 (C) honest 的相反情境——此處實際上是點出 Sung『不誠實』，句意為他『不老實(誇大)』；答案聚焦誠實此一品德線索。誘答 (D) popular 只描述受歡迎，與『說謊』的關鍵情節無關。"}, {"id": "R114-1", "year": 114, "no": 1, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "Look at the picture. A ___ is flying over the houses.", "options": {"A": "bird", "B": "butterfly", "C": "kite", "D": "plane"}, "answer": "D", "img": true}, {"id": "R114-2", "year": 114, "no": 2, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "When I was a teenager, I was very ___ . But now, it’s easier for me to talk to people.", "options": {"A": "happy", "B": "lazy", "C": "popular", "D": "shy"}, "answer": "D", "img": false, "expl": "由 But now 轉折可知過去與現在相反：現在『比較容易跟人交談』，故過去應是不擅交際。(D) shy（害羞）正好與『容易跟人說話』對比。誘答 (C) popular（受歡迎）反而會讓人善於交談，與語意矛盾。"}, {"id": "R114-3", "year": 114, "no": 3, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Lena doesn’t want to go ___ with John because she is afraid of water.", "options": {"A": "dancing", "B": "hiking", "C": "sailing", "D": "shopping"}, "answer": "C", "img": false, "expl": "關鍵線索是 because she is afraid of water（怕水），故不想做的活動必與水有關。(C) sailing（航行、駕帆船）在水上進行，最合邏輯。hiking、dancing、shopping 皆與水無關，可刪。"}, {"id": "R114-4", "year": 114, "no": 4, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Cindy enjoys ___ her dad read stories to her before bed.", "options": {"A": "to listen to", "B": "listening to", "C": "listen to", "D": "listens to"}, "answer": "B", "img": false, "expl": "enjoy 後須接動名詞 (V-ing) 當受詞，故用 enjoys listening to。(A) to listen to 為不定詞、(C)(D) 為原形/動詞，皆不能直接接在 enjoy 之後。此題考『enjoy + V-ing』的固定用法。"}, {"id": "R114-5", "year": 114, "no": 5, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Dad is busy cooking in the kitchen. Dinner will be ___ in ten minutes.", "options": {"A": "free", "B": "full", "C": "medium", "D": "ready"}, "answer": "D", "img": false, "expl": "前句說爸爸忙著煮飯，十分鐘後晚餐將『準備好』。(D) ready 意為『就緒、可上桌』，與煮飯情境相符。誘答 (B) full（飽的/滿的）形容人吃飽或容器滿，不能形容『飯做好』。"}, {"id": "R114-6", "year": 114, "no": 6, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "There are so many new ___ in the office. It’ll take me some time to remember who is who.", "options": {"A": "faces", "B": "ideas", "C": "rules", "D": "tools"}, "answer": "A", "img": false, "expl": "後句 remember who is who（記住誰是誰）暗示是指『新來的人』。(A) faces 可轉指『面孔＝人』，new faces 即『新面孔、新同事』。ideas、rules、tools 都無法對應『記住誰是誰』的線索。"}, {"id": "R114-7", "year": 114, "no": 7, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "I feel like a ___ . I was looking for my keys for hours but they have been in my pocket the whole time.", "options": {"A": "fool", "B": "ghost", "C": "king", "D": "stranger"}, "answer": "A", "img": false, "expl": "情境是鑰匙一直在口袋卻找了好幾小時，是自嘲『很傻』。(A) fool（傻瓜）最貼切，feel like a fool 即『覺得自己好蠢』。誘答 (D) stranger（陌生人）無法表達這種懊惱自嘲之意。"}, {"id": "R114-8", "year": 114, "no": 8, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Mr. and Mrs. Wu have three daughters. Two are in high school, and ___ is in elementary school.", "options": {"A": "each", "B": "the other", "C": "the one", "D": "the next"}, "answer": "B", "img": false, "expl": "三個女兒，兩個已提到（Two），剩下最後一個要用 the other（特指兩者/剩餘中確定的那一個）。(A) each 指『每一個』語意不合；當只剩明確一個時用 the other 而非泛指的 another。"}, {"id": "R114-9", "year": 114, "no": 9, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "It is hard for trees to ___ along this beach because of the strong winds from the sea.", "options": {"A": "blow", "B": "build", "C": "follow", "D": "grow"}, "answer": "D", "img": false, "expl": "主詞為 trees，因海邊強風使得樹木難以『生長』。(D) grow（生長）與 along this beach、strong winds 的情境相符。誘答 (A) blow 多指風吹，主詞若是樹則語意不通。"}, {"id": "R114-10", "year": 114, "no": 10, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Christmas ___ and I want to visit my aunt abroad. Do you have any plans yet?", "options": {"A": "came", "B": "comes", "C": "is coming", "D": "was coming"}, "answer": "C", "img": false, "expl": "語境談耶誕節即將到來、詢問是否已有計畫，指『不久後就要發生』的近期未來，用現在進行式表未來 is coming 最自然。(A) came、(D) was coming 為過去式與情境（未來計畫）矛盾。"}, {"id": "R114-11", "year": 114, "no": 11, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Jo won’t be happy if you’re late for his party tonight, so ___ sure that you arrive on time.", "options": {"A": "make", "B": "makes", "C": "to make", "D": "is making"}, "answer": "A", "img": false, "expl": "此為並列的祈使句：so 之後接原形動詞開頭的命令句 make sure that...。(A) make（原形）正確。祈使句主詞省略、動詞用原形，故 (B) makes、(C) to make、(D) is making 皆不合。"}, {"id": "R114-12", "year": 114, "no": 12, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "You may have a long drive because of the terrible ___ . There are usually a lot of cars and buses during this time.", "options": {"A": "experience", "B": "machine", "C": "service", "D": "traffic"}, "answer": "D", "img": false, "expl": "線索 a long drive、a lot of cars and buses（很多車），指『交通(壅塞)』。(D) traffic（車流、交通）符合。terrible traffic 即『糟糕的交通狀況』。experience、machine、service 皆與車多無關。"}, {"id": "R114-13", "year": 114, "no": 13, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "In the future, there will ___ be greater basketball players than Stephen Curry, but now we believe he is the best!", "options": {"A": "again", "B": "already", "C": "never"
