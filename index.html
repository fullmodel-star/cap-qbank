, "D": "perhaps"}, "answer": "D", "img": false, "expl": "轉折語意：未來『或許』會有比 Curry 更強的球員，但現在他最強。(D) perhaps（也許）表推測，語氣不肯定，與 but now we believe 的對比相符。(C) never 語意過於絕對且與『現在他最好』的謙讓語氣衝突。"}, {"id": "R114-14", "year": 114, "no": 14, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "I guess the rainwater has come in from the kitchen. See? ___ of the windows are closed except the one in the kitchen.", "options": {"A": "All", "B": "Both", "C": "Most", "D": "Some"}, "answer": "A", "img": false, "expl": "情境：除了廚房那扇外，其他窗戶都是關的，故雨水從廚房進來。except the one 暗示『全部』只有一個例外，用 (A) All（All ... are closed except one）。若用 Some/Most 則無法與『唯一例外』的邏輯相呼應。"}, {"id": "R114-15", "year": 114, "no": 15, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "___ machines have been used to pick fruits for a long time, they were not used on strawberry farms until several years ago.", "options": {"A": "Although", "B": "Because", "C": "Before", "D": "If"}, "answer": "A", "img": false, "expl": "前後為讓步關係：機器早已用於採果『雖然如此』草莓田卻是近年才用，用 (A) Although（雖然）表對比。因果的 Because 或條件的 If 皆不符前後轉折語氣。"}, {"id": "R114-16", "year": 114, "no": 16, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "There are online videos that teach you exercises you can do at home. They’ll ___ you a trip to the gym, and some money too.", "options": {"A": "cost", "B": "give", "C": "keep", "D": "save"}, "answer": "D", "img": false, "expl": "線索 a trip to the gym, and some money（省下上健身房與金錢）。(D) save（節省）符合 save you a trip and some money『替你省下…』。誘答 (A) cost（花費）語意相反。"}, {"id": "R114-17", "year": 114, "no": 17, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Jane’s parents are always happy to see their grandchildren, but mine ___ less so when I visit them with my kids.", "options": {"A": "is", "B": "are", "C": "do", "D": "does"}, "answer": "B", "img": false, "expl": "主詞為 mine＝my parents（複數），故用複數動詞 are。(B) are 正確。前句 Jane's parents are... 也提示主詞是複數父母，須用 are 而非 is/does。"}, {"id": "R114-18", "year": 114, "no": 18, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Before she ___ about it, you should tell Daphne you broke her favorite cup.", "options": {"A": "asks", "B": "asked", "C": "was asking", "D": "will ask"}, "answer": "A", "img": false, "expl": "時間副詞子句 Before... 表未來時間，依規則以現在式代替未來式，故 (A) asks。此為『時間/條件副詞子句中用現在式表未來』的考點，不可用 will ask。"}, {"id": "R114-19", "year": 114, "no": 19, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "It was very windy this morning. Some of the shirts on the balcony were blown away ___ in the pond.", "options": {"A": "fell", "B": "and fell", "C": "fallen", "D": "and fallen"}, "answer": "B", "img": false, "expl": "主詞 Some of the shirts 為複數，需與 were blown away 並列一個過去式動詞，用 and fell（掉進池塘）。(B) and fell 正確。fallen 為過去分詞不能單獨當主要動詞，故 (C)(D) 錯。"}, {"id": "R114-20", "year": 114, "no": 20, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "114-P1", "stem": "What happened to Rex?", "options": {"A": "He got lost.", "B": "He got hurt.", "C": "He bit people.", "D": "He ate too much."}, "answer": "B", "img": false, "expl": "由文中 He was hit by a car last night（昨晚被車撞）及送醫、兩週後康復，可知 Rex『受傷了』。(B) got hurt 正確。文中無走失、咬人或吃太多的訊息，故其餘皆錯。"}, {"id": "R114-21", "year": 114, "no": 21, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "114-P1", "stem": "How did the writer help Rex?", "options": {"A": "By calling the police.", "B": "By making him exercise.", "C": "By taking him to see a doctor.", "D": "By looking for a new home for him."}, "answer": "B", "img": false, "expl": "文中 we decided to take him for a walk every evening... Because of the exercise, Rex became healthier（帶牠散步運動使牠更健康）。(B) By making him exercise 正是作者的幫助方式。看醫生是大家一起去而非作者使其康復的關鍵，(C) 為誘答。"}, {"id": "R114-22", "year": 114, "no": 22, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "114-P2", "stem": "What do we know about Mark from the dialogue?", "options": {"A": "He made Linda unhappy.", "B": "He is looking for a new job.", "C": "He did not like Linda’s cake.", "D": "He is getting married to Jenny."}, "answer": "A", "img": true}, {"id": "R114-23", "year": 114, "no": 23, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "114-P2", "stem": "Which is most likely an example of stealing someone's thunder?", "options": {"A": "Dennis never changes his mind except when his wife tells him to.", "B": "Melisa tells Tom she’ll go to the party but tells her mom she’ll stay home.", "C": "Jeff tells everyone he’ll move abroad when Ivy is still telling them about her baby.", "D": "Alisa says she doesn’t care what we have for lunch but also doesn’t like the restaurant we chose."}, "answer": "C", "img": true}, {"id": "R114-24", "year": 114, "no": 24, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "114-P3", "stem": "What can you do with a White Lake City Card?", "options": {"A": "Save 20% on children’s train tickets.", "B": "Visit any public museum in the city for free.", "C": "Take a train to places out of the three zones.", "D": "Move around the city by metro as much as you want."}, "answer": "D", "img": false, "expl": "表格說明 visit the city by metro, bus, or train as many times as you want（無限次搭乘）。(D) Move around... as much as you want 與此相符。(A) 兒童是免費同行而非省20%，(B) 博物館是省20%非免費，故為誘答。"}, {"id": "R114-25", "year": 114, "no": 25, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "114-P3", "stem": "Stacy is going to White Lake City and is staying at a hotel near the White Lake Main Station. She wants to visit the Museum of White Lake City History on Friday and see White Lake on Saturday. If she plans to buy (a) White Lake City Card(s), which of the four choices will be best for her and cost her the least?", "options": {"A": "A 3-day Card for Zone 1.", "B": "A Weekend Card for Zones 1-3.", "C": "A 1-day Card for Zone 1 and a Weekend Card for Zones 1-2.", "D": "A 1-day Card for Zones 1-2 and a Weekend Card for Zones 1-2."}, "answer": "C", "img": true}, {"id": "R114-26", "year": 114, "no": 26, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "114-P4", "stem": "What is Rolling Acres?", "options": {"A": "A zoo.", "B": "A campground.", "C": "A vacation farm.", "D": "A family restaurant."}, "answer": "C", "img": false, "expl": "文中 it has become a popular place for families to go on vacation（供家庭度假的熱門地點），且可採果、撿蛋、餵動物，故 Rolling Acres 是『度假農場』。(C) A vacation farm 正確。原為 sheep farm 但現已轉型，非單純動物園或餐廳。"}, {"id": "R114-27", "year": 114, "no": 27, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "114-P4", "stem": "What do we learn from the first paragraph?", "options": {"A": "What Libby does at Rolling Acres.", "B": "What visitors think of Rolling Acres.", "C": "Why Libby’s grandparents started Rolling Acres.", "D": "What the Larson family’s plans are for Rolling Acres."}, "answer": "A", "img": false, "expl": "第一段描述 Libby 清晨起床拖地、收信、準備迎接遊客等，皆是她在農場所做的事。(A) What Libby does at Rolling Acres 正確。訪客看法、祖父母創立原因等出現在後文或未提及，故非第一段重點。"}, {"id": "R114-28", "year": 114, "no": 28, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "114-P4", "stem": "What does making sacrifices mean?", "options": {"A": "Learning to make money and use it wisely.", "B": "Getting to know different sides of your family.", "C": "Making excuses for failing to do something difficult.", "D": "Giving up something important to do something else."}, "answer": "D", "img": false, "expl": "下文舉例：她想睡到中午、參加夏令營卻不能，朋友也不再找她出遊——都是為了工作而『放棄重要的事』。(D) Giving up something important to do something else 正確。此為由上下文推論片語 making sacrifices（做出犧牲）之意。"}, {"id": "R114-29", "year": 114, "no": 29, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "114-P5", "stem": "What do the comics tell us?", "options": {"A": "Enjoy life while we can.", "B": "Follow the old ways of life.", "C": "Save our planet before it’s too late.", "D": "Treat others the way we want to be treated."}, "answer": "C", "img": false, "expl": "漫畫描述復活節島居民砍光樹木導致土地乾涸、爭鬥滅亡，結尾 Let's not make Earth, our only home, another Easter Island（別讓地球步上後塵）。主旨是(C) 趁還來得及拯救我們的星球。其餘選項未觸及環境警示主題。"}, {"id": "R114-30", "year": 114, "no": 30, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "114-P5", "stem": "What can we learn about the people in the comics?", "options": {"A": "They made fire before starting a fight.", "B": "They fought for land and plants all the time.", "C": "They prayed to the statues beside a large fire.", "D": "They used statues to show how strong they were."}, "answer": "D", "img": false, "expl": "文中 The statues were moved to fighting grounds to show their power（把石像移到戰場以展現力量）。(D) They used statues to show how strong they were 正確。石像用途是展示力量，非祭拜或生火，故其餘為誤讀。"}, {"id": "R114-31", "year": 114, "no": 31, "section": "題組", "type": "閱讀理解", "skill": "指代", "pkey": "114-P5", "stem": "What does did it in Picture 7 mean?", "options": {"A": "Fall to the ground.", "B": "Cut down the last trees.", "C": "Move the statues to fighting grounds.", "D": "Understand how important trees were."}, "answer": "B", "img": false, "expl": "第7格上文說 those who cut down the last trees... still, they did it，did it 回指前面的動作『砍下最後的樹』。(B) Cut down the last trees 正確。did it 代替前述動詞片語，指砍樹此一行為。"}, {"id": "R114-32", "year": 114, "no": 32, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "114-P6", "stem": "What did Ariely try to find out in the origami study?", "options": {"A": "If he could stop the IKEA effect.", "B": "Why people love making origami.", "C": "Why IKEA furniture is so famous.", "D": "If anyone shared his IKEA experience."}, "answer": "D", "img": false, "expl": "文中 Ariely wanted to know if anyone shared his feelings, so he did a fun origami study（想知道是否有人和他有相同感受）。(D) If anyone shared his IKEA experience 正確。研究目的是驗證他對親手組裝物品產生偏愛的感受是否普遍。"}, {"id": "R114-33", "year": 114, "no": 33, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "114-P6", "stem": "Which is true about the origami study?", "options": {"A": "Buyers would spend less on builders’ origami than builders would.", "B": "Builders and buyers needed to decide a price on the origami they made.", "C": "Builders knew others would not pay as much for the origami as they would.", "D": "Buyers would spend more on builders’ origami after knowing how they were made."}, "answer": "A", "img": false, "expl": "文中 buyers would pay only five cents... builders would spend 25 cents（買家只願付5分，製作者卻願付25分）。(A) Buyers would spend less... than builders 與數據相符。只有 builders 需為自己作品定價、buyers 是評估付多少，故 (B) 錯。"}, {"id": "R114-34", "year": 114, "no": 34, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "114-P6", "stem": "Jerry just can’t get his daughter Mia to eat more vegetables at dinner. Every time he tries to do so, there is always a lot of shouting and crying. If Jerry wants to have Mia eat more vegetables by using the IKEA effect, what should he do?", "options": {"A": "Tell Mia that he cooks the vegetables just for her.", "B": "Ask Mia to help him cook vegetables for her meal.", "C": "Give Mia her favorite candy after she eats vegetables.", "D": "Ask Mia what vegetables she likes and cook them for her."}, "answer": "B", "img": false, "expl": "IKEA 效應指『親手參與製作會讓人更珍愛成果』。要讓 Mia 多吃菜，應讓她『參與烹調』。(B) Ask Mia to help him cook vegetables 才運用了此效應。給糖果、只煮她愛吃的都非讓她親自動手，故非 IKEA 效應。"}, {"id": "R114-35", "year": 114, "no": 35, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "114-P7", "stem": "What is the reading mainly about?", "options": {"A": "The tips on using a picture to tell a story.", "B": "The change that electricity brought to people’s lives.", "C": "The history behind the picture of a UK electricity worker.", "D": "The story of a famous UK electricity worker from the 1970s."}, "answer": "C", "img": false, "expl": "全文圍繞一張1970年代英國電力工人照片，說明其背後的罷工歷史與影響。(C) The history behind the picture 正確。文章非教人看圖說故事，也非某位知名工人的生平，(D) 為誘答。"}, {"id": "R114-36", "year": 114, "no": 36, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "114-P7", "stem": "In the UK in the 1970s, what did people most likely think of the UK electricity workers?", "options": {"A": "They were not brave enough to fix their problems.", "B": "They worked like robots and never learned to change.", "C": "They were asking too much and did not know when to stop.", "D": "They did not care whether their job might hurt people’s health."}, "answer": "C", "img": false, "expl": "第二段工人一年後再度要求加薪、以怠工威脅，導致民生大亂、許多人失業，當時民眾多半覺得他們『要求過多、不知節制』。(C) They were asking too much and did not know when to stop 最符合民情推論。"}, {"id": "R114-37", "year": 114, "no": 37, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "114-P7", "stem": "Why does the writer put the “ ” mark around the word dark in the last sentence?", "options": {"A": "To say that the “dark” time was actually not dark.", "B": "To tell people that the word was said by the government.", "C": "To mean both the days without lights and the difficult lives people lived.", "D": "To show that the government and the electricity workers both lost their fights."}, "answer": "C", "img": false, "expl": "引號中的 dark 一語雙關：既指沒有燈光的黑暗日子，也指人們艱困的生活。(C) To mean both the days without lights and the difficult lives 正確。引號用來提示該字有雙重含意，而非否定其黑暗。"}, {"id": "R114-38", "year": 114, "no": 38, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "114-P8", "stem": "第38題：選出最適合填入文中 ___38___ 處的答案。", "options": {"A": "starts", "B": "started", "C": "has started", "D": "will start"}, "answer": "B", "img": false, "expl": "本段敘述過去養成的習慣：He ___ doing this in his first year of junior high（他在國一時開始這麼做），為過去已發生之事，用過去式 (B) started。全文時間點在過去，故非現在式或未來式。"}, {"id": "R114-39", "year": 114, "no": 39, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "114-P8", "stem": "第39題：選出最適合填入文中 ___39___ 處的答案。", "options": {"A": "he got quite scared of two things", "B": "he still couldn’t understand two things", "C": "he couldn’t stop thinking about two things", "D": "he did two things that would change his life"}, "answer": "C", "img": false, "expl": "空格後 How brave a woman is... Thank God I'll never have to do that! 顯示他一直在想著兩件事。(C) he couldn't stop thinking about two things（忍不住一直想著兩件事）與後文的感嘆相呼應。並非害怕或不理解。"}, {"id": "R114-40", "year": 114, "no": 40, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "114-P8", "stem": "第40題：選出最適合填入文中 ___40___ 處的答案。", "options": {"A": "should be spent helping his mom", "B": "should be a time of welcoming a new start", "C": "should not be about him, but about his mom", "D": "should not be celebrated for just one day, but for nine months"}, "answer": "C", "img": false, "expl": "下文說懷胎九月都是媽媽在辛苦、自己什麼都沒做，憑什麼收禮，該收禮的是媽媽。故他認為生日 (C) should not be about him, but about his mom（不該以自己為主，而該以媽媽為主）。此與整段『把生日獻給媽媽』的邏輯一致。"}, {"id": "R114-41", "year": 114, "no": 41, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "114-P8", "stem": "第41題：選出最適合填入文中 ___41___ 處的答案。", "options": {"A": "first", "B": "last", "C": "only", "D": "other"}, "answer": "A", "img": false, "expl": "本段講他準備的『第一份』生日禮物是自己烤的餅乾，之後每年都做禮物給媽媽，故此處為起點『第一次』。(A) first 正確。由後文 Now, on his birthday every year 可知這是最初的開始，而非最後或唯一。"}, {"id": "R114-42", "year": 114, "no": 42, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "114-P8", "stem": "第42題：選出最適合填入文中 ___42___ 處的答案。", "options": {"A": "made his head hurt", "B": "made his heart sing", "C": "made him change his mind", "D": "made him give up baking"}, "answer": "B", "img": false, "expl": "空格前提到媽媽稱讚難吃的餅乾是「她收過最棒的東西」，Cameron 聽到後的感受，下句又說「這比收到禮物還要好」，可見是正面、喜悅的心情，故選 (B) made his heart sing（讓他心花怒放）。(A) 頭痛、(D) 放棄烘焙皆為負面，與下文「so much better」的正面語氣矛盾。"}, {"id": "R114-43", "year": 114, "no": 43, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "114-P8", "stem": "第43題：選出最適合填入文中 ___43___ 處的答案。", "options": {"A": "is going to give", "B": "gives", "C": "has given", "D": "gave"}, "answer": "A", "img": false, "expl": "句首時間副詞 This year（今年）配合後文「幾個月前他學會做洋裝，決定要為媽媽做一件」，可知送洋裝是尚未實現、即將要做的計畫，須用未來式，故選 (A) is going to give。(D) gave 為過去式、(C) has given 表已完成，皆與「今年即將送」的語意不符。"}, {"id": "R113-1", "year": 113, "no": 1, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "Look at the picture. There is 　　　 under the door.", "options": {"A": "an envelope", "B": "a plant", "C": "a sign", "D": "an umbrella"}, "answer": "A", "img": true}, {"id": "R113-2", "year": 113, "no": 2, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "My 　　　 hurts so much that I cannot even turn my head.", "options": {"A": "arm", "B": "knee", "C": "neck", "D": "stomach"}, "answer": "C", "img": false, "expl": "由 that 子句「痛到連頭都沒辦法轉」可知疼痛部位與轉頭有關，正解為 (C) neck（脖子）。轉頭靠的是頸部，(A) 手臂、(B) 膝蓋、(D) 胃皆與「turn my head」無直接關聯。"}, {"id": "R113-3", "year": 113, "no": 3, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Our school basketball team won the national game last night. We are so 　　　 them.", "options": {"A": "popular with", "B": "proud of", "C": "sorry for", "D": "worried about"}, "answer": "B", "img": false, "expl": "球隊贏得全國賽，我們對他們的情緒應是「以…為榮」，故選 (B) proud of，be proud of 表「為…感到驕傲」。(C) sorry for（為…感到遺憾）與贏球的喜悅相反，是主要誘答；(A) popular with 意為「受…歡迎」，主詞邏輯不合。"}, {"id": "R113-4", "year": 113, "no": 4, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Tomorrow is Sam's last day in the office. Nobody knows why he decided to 　　　 .", "options": {"A": "hide", "B": "leave", "C": "pack", "D": "walk"}, "answer": "B", "img": false, "expl": "由 last day in the office（在辦公室的最後一天）可知 Sam 決定要「離職」，故選 (B) leave（離開、離職）。(C) pack（打包）雖與離開情境有關，但無法解釋「最後一天上班」的原因，語意不如 leave 直接完整。"}, {"id": "R113-5", "year": 113, "no": 5, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "It's not a good idea to go mountain climbing in this bad 　　　 . We should wait until the typhoon goes away.", "options": {"A": "chance", "B": "dream", "C": "habit", "D": "weather"}, "answer": "D", "img": false, "expl": "後句「應該等颱風走了再說」點出這是惡劣的「天氣」，不適合登山，故選 (D) weather（天氣）。bad weather 為固定搭配，(A) chance、(B) dream、(C) habit 皆無法與颱風的情境連貫。"}, {"id": "R113-6", "year": 113, "no": 6, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Chris loves walking with Anna on snowy days, but Anna hates 　　　 very much.", "options": {"A": "them", "B": "so", "C": "one", "D": "it"}, "answer": "D", "img": false, "expl": "此題考代名詞的指代與單複數。Anna 討厭的是「在雪天散步」這件事（動名詞 walking 所指的整件事），視為單一不可數概念，須用 (D) it。(A) them 為複數，指代對象在句中無複數名詞可對應，故錯。"}, {"id": "R113-7", "year": 113, "no": 7, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Lora likes to eat bananas that are already a little brown on the outside, and so 　　　 I.", "options": {"A": "am", "B": "do", "C": "have", "D": "will"}, "answer": "B", "img": false, "expl": "考「so + 助動詞 + 主詞」倒裝，表「某人也是如此」。前句主要動詞為一般動詞 likes，助動詞須用 do，故選 (B) do（so do I 意為「我也一樣」）。誘答 (A) am 只用於前句為 be 動詞時，此處前句非 be 動詞，故錯。"}, {"id": "R113-8", "year": 113, "no": 8, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Your refrigerator shouldn't be making loud noises now, but if it 　　　 does, just give me a call and I'll come check it again.", "options": {"A": "already", "B": "even", "C": "finally", "D": "still"}, "answer": "D", "img": false, "expl": "前句說「冰箱現在不該再發出噪音」，if 子句表「但如果它仍然（照舊）發出噪音」，需表「依然、仍舊」之意，故選 (D) still。(A) already（已經）語意不合此假設語境，無法表達「持續照舊」的意思。"}, {"id": "R113-9", "year": 113, "no": 9, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "After winning money in the card game, Jay decided to try again. He felt that he might also be 　　　 a second time.", "options": {"A": "famous", "B": "interested", "C": "lucky", "D": "ready"}, "answer": "C", "img": false, "expl": "Jay 上次玩牌贏了錢，決定再試一次，覺得自己第二次「也可能會走運」，故選 (C) lucky（幸運的）。贏牌靠運氣，(B) interested、(D) ready 均無法呼應「winning money」帶來的運氣聯想。"}, {"id": "R113-10", "year": 113, "no": 10, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "The knife doesn't cut very well. It's not as 　　　 as before.", "options": {"A": "bright", "B": "heavy", "C": "quick", "D": "sharp"}, "answer": "D", "img": false, "expl": "由「刀子切得不好、不如以前」可知刀子不夠「鋒利」，故選 (D) sharp（鋒利的）。刀的好壞取決於是否鋒利，(C) quick（快的）易誤選，但形容刀的切割能力應用 sharp 而非 quick。"}, {"id": "R113-11", "year": 113, "no": 11, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "John will stay with his sister until he 　　　 an apartment.", "options": {"A": "will find", "B": "would find", "C": "finds", "D": "found"}, "answer": "C", "img": false, "expl": "考時間連接詞 until 引導的副詞子句：主要子句為未來式 will stay 時，時間子句須用現在式代替未來式，故選 (C) finds。(A) will find 犯了「時間副詞子句不可用 will」的常見錯誤。"}, {"id": "R113-12", "year": 113, "no": 12, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Students 　　　 to go on the school trip should ask their parents first.", "options": {"A": "who want", "B": "want", "C": "who they want", "D": "what they want"}, "answer": "A", "img": false, "expl": "空格為修飾 Students 的關係子句，先行詞為人且在子句中作主詞，須用關係代名詞 who 引導且後接動詞，故選 (A) who want。(C) who they want 多了主詞 they，造成主詞重複而錯誤。"}, {"id": "R113-13", "year": 113, "no": 13, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "The temple sits alone in the mountains at a height of 3,000m 　　　 sea level.", "options": {"A": "above", "B": "at", "C": "below", "D": "in"}, "answer": "A", "img": false, "expl": "考介系詞片語。廟位於海拔 3,000 公尺，指高於海平面，故選 (A) above（在…之上），above sea level 為「海拔」的固定說法。(C) below（在…之下）語意相反。"}, {"id": "R113-14", "year": 113, "no": 14, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Patty spent several days planning to invite Charlie to dinner, 　　　 she couldn't say a word when they met.", "options": {"A": "but", "B": "if", "C": "or", "D": "so"}, "answer": "A", "img": false, "expl": "前後兩句語意相反：Patty 花好幾天計畫邀約，見面時卻一個字也說不出來，需用表轉折的對等連接詞，故選 (A) but（但是）。(D) so 表因果，與前後的轉折關係不符。"}, {"id": "R113-15", "year": 113, "no": 15, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "I can't tell you what I think of the movie because I 　　　 it. I'll probably watch it this Saturday.", "options": {"A": "am not seeing", "B": "don't see", "C": "haven't seen", "D": "won't see"}, "answer": "C", "img": false, "expl": "由後句「大概這週六才要看」可知說話者到目前為止「還沒看過」這部電影，須用現在完成式表經驗，故選 (C) haven't seen。(A) am not seeing 為現在進行式，無法表達「至今尚未看過」之意。"}, {"id": "R113-16", "year": 113, "no": 16, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "The new guy at the help desk answers calls like a 　　　 . There are no ups and downs in his voice and you can't tell if he is happy or sad.", "options": {"A": "father", "B": "foreigner", "C": "radio", "D": "robot"}, "answer": "D", "img": false, "expl": "後句描述他的聲音「沒有起伏、聽不出喜怒」，如同無感情的機器，故選 (D) robot（機器人）。關鍵在「no ups and downs、can't tell if he is happy or sad」暗示毫無情感，radio (C) 雖能發聲卻不具「無感情」的比喻連結。"}, {"id": "R113-17", "year": 113, "no": 17, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Jasmine planned to spend her summer in the country, but right after she got there, she started to 　　　 the noise in the city.", "options": {"A": "enjoy", "B": "mind", "C": "miss", "D": "notice"}, "answer": "C", "img": false, "expl": "前句 but 表轉折：Jasmine 原本計畫在鄉下過暑假，一到那裡卻開始「想念」城市的喧鬧，故選 (C) miss（想念）。(A) enjoy 與 but 的轉折語氣矛盾，(B) mind 意為「介意」，語意不合。"}, {"id": "R113-18", "year": 113, "no": 18, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "\"Bad traffic\" is perhaps the 　　　 excuse for being late when your boss knows it only takes you five minutes to walk to work.", "options": {"A": "easiest", "B": "oldest", "C": "smartest", "D": "worst"}, "answer": "D", "img": false, "expl": "當老闆知道你走路上班只要五分鐘，「交通糟」就成了最爛的遲到藉口，故選 (D) worst（最差的）。此處語境帶諷刺，強調藉口站不住腳，(B) oldest（最老套的）雖可考慮，但與「只要五分鐘」的打臉邏輯相比，worst 更貼切完整。"}, {"id": "R113-19", "year": 113, "no": 19, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "The housework in Mr. and Mrs. Wang's family 　　　 between them and their kids. Everyone's got their own job to do.", "options": {"A": "is shared", "B": "are shared", "C": "shares", "D": "share"}, "answer": "A", "img": false, "expl": "主詞 The housework 為不可數名詞，動詞須用單數，且家事是「被分擔」的，須用被動語態，故選 (A) is shared。(B) are shared 動詞用複數，與不可數主詞不一致而錯。"}, {"id": "R113-20", "year": 113, "no": 20, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "I want to find another dentist because 　　　 pulled out a good tooth last time I went to him.", "options": {"A": "I", "B": "me", "C": "mine", "D": "myself"}, "answer": "C", "img": false, "expl": "空格作 pulled out 的主詞，指「我的那位牙醫」，須用所有格代名詞代替 my dentist，故選 (C) mine。因後文 him 指牙醫，主詞不可能是 I（那樣就變成自己拔牙），mine 才符合「我的牙醫拔掉了一顆好牙」的語意。"}, {"id": "R113-21", "year": 113, "no": 21, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Mom: Linda, you've been playing computer games all evening! Have you finished your report?\nLinda: Well, 　　　 most of it this afternoon, and I'll finish it by Friday.", "options": {"A": "I would do", "B": "I did", "C": "I was doing", "D": "I'll do"}, "answer": "B", "img": false, "expl": "由後半「我這週五前會完成」對比，前半指「今天下午已經做了大部分」，為過去已完成的動作，須用過去式，故選 (B) I did。(D) I'll do 為未來式，與 this afternoon（今天下午）的過去時間點矛盾。"}, {"id": "R113-22", "year": 113, "no": 22, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "113-P1", "stem": "Why did Philip go out?", "options": {"A": "To meet a woman.", "B": "To look for his father.", "C": "To ask the police for help.", "D": "To buy food for his brother."}, "answer": "D", "img": false, "expl": "答案依據首段：Jason 肚子餓一直哭、Philip 不會煮飯，所以「decided to take Jason out for some food」，故 Philip 出門是為了買食物給弟弟，選 (D)。(A) 遇見女子是出門後的巧合結果，非出門目的。"}, {"id": "R113-23", "year": 113, "no": 23, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "113-P1", "stem": "Why was Philip's father angry?", "options": {"A": "He forgot his keys.", "B": "The woman was hiding from him.", "C": "The police didn't believe what he said.", "D": "Philip and his brother went out at night."}, "answer": "C", "img": false, "expl": "文章明言警察不相信父親的說法（didn't believe him），父親因而一直生氣大喊自己沒做錯，故選 (C)。(A) 忘記帶鑰匙只是事情起因，真正令他生氣的是「被誤會且不被採信」。"}, {"id": "R113-24", "year": 113, "no": 24, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "113-P2", "stem": "Kevin is going to buy some fresh bread at Baker's Kitchen. He loves white bread, his mom likes farm bread, his father enjoys bagels, and his sister eats only challah. Which is the earliest possible time for him to get all these breads for his family?", "options": {"A": "11:00am.", "B": "4:00pm.", "C": "5:00pm.", "D": "7:00pm."}, "answer": "C", "img": true}, {"id": "R113-25", "year": 113, "no": 25, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "113-P2", "stem": "What do we know about Baker's Kitchen?", "options": {"A": "It is open five days a week.", "B": "Its breads are half price one hour before closing.", "C": "Its croissants and pretzels are sold on weekends.", "D": "Its members can save $100 when they shop on Fridays."}, "answer": "B", "img": true}, {"id": "R113-26", "year": 113, "no": 26, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "113-P3", "stem": "What is recommended to people who want to visit the festival?", "options": {"A": "Using the free festival bus service.", "B": "Visiting the festival on the weekend.", "C": "Entering Satyr's Park from Fox Street.", "D": "Parking in Garden Square and walking to the festival."}, "answer": "A", "img": true}, {"id": "R113-27", "year": 113, "no": 27, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "113-P3", "stem": "What can we learn about the farmers' market from the map?", "options": {"A": "The farmers' market is next to the flower market.", "B": "The farmers' market and the festival are on the same block.", "C": "You can go to the farmers' market by taking Bus No. 157 to Puppy Street.", "D": "The nearest metro station to the farmers' market is the Koala Street Station."}, "answer": "D", "img": true}, {"id": "R113-28", "year": 113, "no": 28, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "113-P4", "stem": "What kind of people do Yan's and Chang's friends most likely think Yan and Chang are?", "options": {"A": "They enjoy good food.", "B": "They don't like to share.", "C": "They like to make friends.", "D": "They don't like new things."}, "answer": "B", "img": false, "expl": "兩則故事中，客人皆用反諷手法點出主人小氣：Yan 只端出一條小魚、Chang 不留客人吃飯，故朋友最可能認為兩人「不喜歡分享（吝嗇）」，選 (B)。(A) 享受美食與故事諷刺主人小氣的主旨相反。"}, {"id": "R113-29", "year": 113, "no": 29, "section": "題組", "type": "閱讀理解", "skill": "指代", "pkey": "113-P4", "stem": "What is it in the second story?", "options": {"A": "A big knife.", "B": "The horse.", "C": "Lunch.", "D": "One of Chang's ducks or chickens."}, "answer": "B", "img": false, "expl": "第二則故事中，客人說要殺掉「他騎來的馬」當午餐，主人問他沒馬怎麼回家，it 即指前面提到的 the horse，故選 (B)。此處 it 承接上一句的受詞 the horse。"}, {"id": "R113-30", "year": 113, "no": 30, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "113-P5", "stem": "Why does the writer talk about doctors and a health center in the reading?", "options": {"A": "To explain Chen's services.", "B": "To talk about Chen's future plans.", "C": "To explain Chen's love for books.", "D": "To show why bookstores are important."}, "answer": "A", "img": false, "expl": "作者把大圖書館博物館比作醫院、Chen 的書店比作衛生所，用醫生與衛生所的比喻是為了說明 Chen 提供的「修書服務」性質與範圍，故選 (A)。第二段整段以醫療作比喻解釋他的服務，並非談未來計畫或愛書。"}, {"id": "R113-31", "year": 113, "no": 31, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "113-P5", "stem": "Why is Chen Bing-Hong's job important in the example he gave?", "options": {"A": "It allows people to get books as gifts.", "B": "It saves people money on new books.", "C": "It gives people hope to follow their dreams.", "D": "It helps people think of special moments in the past."}, "answer": "D", "img": false, "expl": "科學書例子中，書主留著這本半毀的書，是因它是啟發他追夢的老師送的禮物；修好後他「彷彿回到與老師相處的日子」，可見這份工作幫人重溫過去的特別時光，故選 (D)。(C) 追夢是老師的作用，而非修書本身的價值。"}, {"id": "R113-32", "year": 113, "no": 32, "section": "題組", "type": "閱讀理解", "skill": "指代", "pkey": "113-P5", "stem": "What is his magic?", "options": {"A": "Fixing books.", "B": "Making book owners smile.", "C": "Finding books that are long lost.", "D": "Changing his bookstore into a library."}, "answer": "A", "img": false, "expl": "由前文「Chen can always fix the books and make them whole again（總能把書修好、恢復完整）」可知他的魔法就是「修書」，故選 (A) Fixing books。(B) 讓書主微笑是修好書後的結果，而非 magic 本身。"}, {"id": "R113-33", "year": 113, "no": 33, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "113-P6", "stem": "According to the reading, why did Rohla and Kreytenberg open Habibi & Hawara?", "options": {"A": "To help refugees live better in Austria.", "B": "To collect money to help Syria fight the war.", "C": "To help Austrians learn about the war in Syria.", "D": "To help refugees go back to their home countries."}, "answer": "A", "img": false, "expl": "文章指出兩人從與難民共事的經驗出發，「想幫助難民展開新生活」，開餐廳讓難民就業，故選 (A) 幫助難民在奧地利過更好的生活。(D) 送難民回國與文中「start a new life」的用意相反。"}, {"id": "R113-34", "year": 113, "no": 34, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "113-P6", "stem": "What can we learn about Habibi & Hawara?", "options": {"A": "It was moved from Syria to Austria.", "B": "It may finally be sold to its workers.", "C": "It has cooking classes in Syrian food.", "D": "It is an important meeting place for Syrians."}, "answer": "B", "img": false, "expl": "文末提到兩位創辦人「want their best workers to buy the restaurant in the end（希望最終讓最優秀的員工買下餐廳）」，故可推知餐廳最後可能賣給員工，選 (B)。(A) 從敘利亞搬來、(C) 烹飪課皆非文中所述。"}, {"id": "R113-35", "year": 113, "no": 35, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "113-P6", "stem": "What does it mean when people beg to differ?", "options": {"A": "They do not agree.", "B": "They look different.", "C": "They cannot speak for others.", "D": "They do not notice something."}, "answer": "A", "img": false, "expl": "beg to differ 是慣用語，意為「恕難苟同、持不同意見」。文中緊接在一般人視難民為問題之後，Rohla 與 Kreytenberg 卻認為難民不必是問題，形成對比，可推知此片語表「不同意」，故選 (A)。"}, {"id": "R113-36", "year": 113, "no": 36, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "113-P7", "stem": "What does it mean when someone is an advocate of something?", "options": {"A": "They talk a lot but do little about it.", "B": "They believe it is good and should be done.", "C": "They have had some bad experiences with it.", "D": "They are one of the first people who have done it."}, "answer": "B", "img": false, "expl": "advocate（提倡者、支持者）指某人「相信某事是好的、應該去做」。文中 Smith 主張要盡全力讓絕種動物復活，正是支持復育的立場，故選 (B)。由上下文他積極主張復育可推得字義。"}, {"id": "R113-37", "year": 113, "no": 37, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "113-P7", "stem": "What is special about the extinct frog in Smith's book?", "options": {"A": "It can live in a dirty living space.", "B": "It might help fix a health problem.", "C": "It eats its babies when it cannot find food.", "D": "It is the first extinct animal that people studied."}, "answer": "B", "img": false, "expl": "文中提到這種絕種青蛙在胃裡孕育蝌蚪，Smith 認為研究牠或許能幫助那些胎兒早夭的婦女成功保住孩子，即可能有助解決健康問題，故選 (B)。關鍵句為「may be an answer to the problem」。"}, {"id": "R113-38", "year": 113, "no": 38, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "113-P7", "stem": "Why does Ellen Zimmer use the words from Dr. Solomon Wang?", "options": {"A": "To start a new topic.", "B": "To share a big dream.", "C": "To make her idea clearer.", "D": "To invite people to take action."}, "answer": "C", "img": false, "expl": "（依題意）Ellen 引用 Dr. Solomon Wang 的話，是為了佐證、闡明自己的觀點，使論點更清楚有力，故選 (C) To make her idea clearer。引用權威說法通常用來強化、釐清作者立場。"}, {"id": "R113-39", "year": 113, "no": 39, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "113-P7", "stem": "What does Ellen Zimmer most likely think about bringing back extinct animals?", "options": {"A": "It is possible.", "B": "It is dangerous.", "C": "It is not possible.", "D": "It is not dangerous."}, "answer": "C", "img": false, "expl": "Ellen 對復育持懷疑態度：她指出沒人知道絕種動物是否真能回來，且花了十年、數百萬美元研究這種青蛙卻只得到幾顆死掉的卵，可推知她認為這「不可能」，故選 (C) It is not possible。"}, {"id": "R113-40", "year": 113, "no": 40, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "113-P8", "stem": "40. (fill in the blank) Though it has been a very popular topic this year, social distancing 　　　 .", "options": {"A": "is not a new idea", "B": "has not been very useful", "C": "may bring some problems", "D": "is not welcomed by everyone"}, "answer": "A", "img": false, "expl": "空格後 In fact（事實上）接「早在 1918 年流感大流行時就被廣泛使用」，可知作者要強調社交距離「並非新概念」，故選 (A) is not a new idea。轉折點在「雖然今年才成為熱門話題，但其實由來已久」。"}, {"id": "R113-41", "year": 113, "no": 41, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "113-P8", "stem": "41. (fill in the blank) From the picture, we can see that 　　　 started social distancing earlier than the other three cities.", "options": {"A": "Portland", "B": "New York", "C": "Denver", "D": "Pittsburgh"}, "answer": "B", "img": false, "expl": "依圖表判讀，題目問哪座城市比其他三座更早開始社交距離。文章接著說「這幫城市壓低了死亡人數」，對照選項與圖表資訊，正解為 (B) New York。此題須以圖表數據為依據作答。"}, {"id": "R113-42", "year": 113, "no": 42, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "113-P8", "stem": "42. (fill in the blank) However, both cities 　　　 , and the numbers of deaths climbed again.", "options": {"A": "had higher numbers of deaths", "B": "stopped social distancing too soon", "C": "began social distancing a second time", "D": "had the most days of social distancing"}, "answer": "B", "img": false, "expl": "本題考語意連貫。前文說 Portland 和 Denver 一開始「做得不錯」（did well in the first few weeks），但空格後接「死亡人數又攀升」，且前一句強調『維持夠久』的重要性。故此處應為兩城「太早停止社交距離」(B stopped social distancing too soon)，才會導致疫情反撲。誘答 (A) 語意矛盾，前文明明說兩城初期表現良好；(C)、(D) 皆與『沒維持夠久』的主旨相反。"}, {"id": "R113-43", "year": 113, "no": 43, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "113-P8", "stem": "43. (fill in the blank) 　　　 , sick people were kept away from healthy ones; schools were closed; public activities were not allowed.", "options": {"A": "Also", "B": "At first", "C": "However", "D": "For example"}, "answer": "D", "img": false, "expl": "本題考轉承語。空格後列舉了三項具體措施（隔離病人、關閉學校、禁止公共活動），正是前一句『同時使用多種社交距離方式』的具體例子，故選 (D) For example（舉例）。誘答 (A) Also 只表並列增補、(C) However 表轉折，皆無法帶出『舉例說明』的關係。"}, {"id": "R112-1", "year": 112, "no": 1, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "Look at the picture. The man is holding a ___ of grapes in his hands.", "options": {"A": "bag", "B": "basket", "C": "bowl", "D": "box"}, "answer": "B", "img": true}, {"id": "R112-2", "year": 112, "no": 2, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Dennis enjoys ___ in public. He is proud of his beautiful voice.", "options": {"A": "dancing", "B": "drawing", "C": "shopping", "D": "singing"}, "answer": "D", "img": false, "expl": "本題考語意搭配。第二句說他『以自己美妙的嗓音為傲』(proud of his beautiful voice)，可知他喜歡的是公開『唱歌』(D singing)。誘答 (A) dancing 與嗓音無關，voice 一詞是判斷關鍵。"}, {"id": "R112-3", "year": 112, "no": 3, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Mrs. Johnson can't hear very well. If you need to talk to her, you must ___.", "options": {"A": "explain", "B": "hurry", "C": "listen", "D": "shout"}, "answer": "D", "img": false, "expl": "本題考語意推理。前提是 Johnson 太太『聽力不佳』(can't hear very well)，因此要和她說話就必須『大聲喊』(D shout) 她才聽得見。誘答 (C) listen 主客顛倒，是聽者的動作而非對聽障者說話者該做的。"}, {"id": "R112-4", "year": 112, "no": 4, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "People got very excited when they watched Ms. Smith ___ at the party.", "options": {"A": "danced", "B": "dancing", "C": "has danced", "D": "to dance"}, "answer": "B", "img": false, "expl": "本題考感官動詞句型。watch 為感官動詞，其受詞補語用原形 (V) 表『看到全程』或用現在分詞 (V-ing) 表『看到正在進行』。此處強調眾人看到 Smith 女士『正在跳舞』的畫面而興奮，故選現在分詞 (B) dancing。誘答 (D) to dance 不可用於感官動詞後；(A) danced、(C) has danced 為完整時態動詞，不能當受詞補語。"}, {"id": "R112-5", "year": 112, "no": 5, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "I tried on these shoes in several different ___ , and I thought the white pair looked best on me.", "options": {"A": "colors", "B": "prices", "C": "shapes", "D": "sizes"}, "answer": "A", "img": false, "expl": "本題考語意。後半句說『白色那雙看起來最好看』，白色是一種『顏色』，可知他試穿了不同『顏色』(A colors) 的鞋。white 是顏色的線索。誘答 (D) sizes（尺寸）與顏色無關，且同款鞋通常只穿合腳尺寸試。"}, {"id": "R112-6", "year": 112, "no": 6, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Rex did not feel the earthquake this morning. He ___ in the park at the time.", "options": {"A": "jogged", "B": "was jogging", "C": "has jogged", "D": "would jog"}, "answer": "B", "img": false, "expl": "本題考過去進行式。地震發生在『今早某個時間點』(at the time)，Rex 因為當時『正在公園慢跑』而沒感覺到，強調過去某時點正在進行的動作，故用過去進行式 (B) was jogging。誘答 (A) jogged 為單純過去式，無法凸顯『地震當下正在進行』的同時性。"}, {"id": "R112-7", "year": 112, "no": 7, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Mr. Lee has worked in the same store for ten years; he's never thought about ___ his job.", "options": {"A": "changing", "B": "finding", "C": "remembering", "D": "starting"}, "answer": "A", "img": false, "expl": "本題考語意搭配。前文說 Lee 先生在同一家店工作了十年，語意上他從沒想過要『換』工作 (A changing his job)。change one's job（換工作）為固定搭配。誘答 (B) finding、(D) starting 與『已在同店工作十年』的語境不合。"}, {"id": "R112-8", "year": 112, "no": 8, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "I didn't take the bus today because it was ___ . All the seats were taken and a lot of students were standing.", "options": {"A": "dirty", "B": "fast", "C": "full", "D": "wrong"}, "answer": "C", "img": false, "expl": "本題考語意推理。第二句解釋『座位全被占滿、很多學生站著』，正說明公車很『擠、滿』(C full)。後句是判斷關鍵。誘答 (A) dirty（髒）無法解釋座位全滿的現象。"}, {"id": "R112-9", "year": 112, "no": 9, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Don't go away when you're cooking, ___ the food might burn.", "options": {"A": "but", "B": "if", "C": "or", "D": "so"}, "answer": "C", "img": false, "expl": "本題考對等連接詞。句意為『煮菜時別走開，否則食物可能會燒焦』，前後為『命令＋否則會有不良後果』的關係，用 or（否則）連接，故選 (C)。誘答 (D) so 表結果、(A) but 表轉折，皆不符『否則』的警告語氣。"}, {"id": "R112-10", "year": 112, "no": 10, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Jerry wanted to know ___ he was kicked off the soccer team, but no one gave him a good reason.", "options": {"A": "where", "B": "when", "C": "whether", "D": "why"}, "answer": "D", "img": false, "expl": "本題考名詞子句連接詞。後句說『沒人給他一個好理由 (reason)』，可知 Jerry 想知道的是被踢出足球隊的『原因』，故用 why (D)。reason 是判斷關鍵字。誘答 (C) whether 表『是否』，與『想知道理由』語意不符。"}, {"id": "R112-11", "year": 112, "no": 11, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "Jenny is already forty, doesn't have a job and often makes trouble for her parents. To them, she is really a(n) ___ .", "options": {"A": "daughter", "B": "example", "C": "gift", "D": "headache"}, "answer": "D", "img": false, "expl": "本題考字彙。Jenny 已四十歲、沒工作又常給父母惹麻煩，對父母而言她是個『令人頭痛的人物』，headache 引申為『令人頭痛的人事物』(D)。誘答 (A) daughter（女兒）雖屬實但無法呼應『makes trouble』的負面語氣。"}, {"id": "R112-12", "year": 112, "no": 12, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Ed and Jill ___ camping this weekend, so they have to finish their homework by Friday.", "options": {"A": "went", "B": "were going", "C": "are going", "D": "have gone"}, "answer": "C", "img": false, "expl": "本題考未來計畫的時態。後半句說『他們必須在週五前寫完作業』，暗示露營尚未發生，是已安排好的未來計畫。表已計畫的未來動作用現在進行式 (C) are going，故選之。誘答 (A) went 為過去式，與『尚未發生』矛盾。"}, {"id": "R112-13", "year": 112, "no": 13, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Doraemon, a blue Japanese robot cat, has hated mice since his ears ___ by a mouse.", "options": {"A": "bit", "B": "bite", "C": "were bitten", "D": "have bitten"}, "answer": "C", "img": false, "expl": "本題考被動語態。耳朵 (ears) 是『被』老鼠咬的，主詞為動作的承受者，須用被動；且為過去發生的事，故用過去被動 were bitten (C)。誘答 (A) bit、(D) have bitten 皆為主動，語意變成耳朵去咬別人，不合理。"}, {"id": "R112-14", "year": 112, "no": 14, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "If we play some interesting games in class, there ___ more fun in learning English.", "options": {"A": "are", "B": "has", "C": "will be", "D": "will have"}, "answer": "C", "img": false, "expl": "本題考未來式與 there be 句型。前提是條件句『如果我們在課堂玩遊戲』，主句描述未來的結果『學英語會更有趣』。表『將會有』用 there will be (C)。誘答 (D) will have 誤用；there be 句型固定搭配 be 動詞，不用 have。"}, {"id": "R112-15", "year": 112, "no": 15, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "The ___ of this shop was so bad; I never got any answer after I emailed them my questions.", "options": {"A": "item", "B": "business", "C": "price", "D": "service"}, "answer": "D", "img": false, "expl": "本題考語意。後句說『寄了email問問題卻從沒得到回覆』，指這家店的『服務』(D service) 很差。email 詢問卻無人回應，正是服務問題。誘答 (C) price（價格）與『沒回覆問題』無關。"}, {"id": "R112-16", "year": 112, "no": 16, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "It's not easy to see those islands clearly from here on sunny days, and it's even less ___ to see them on cloudy days.", "options": {"A": "difficult", "B": "lucky", "C": "possible", "D": "special"}, "answer": "C", "img": false, "expl": "本題考語意與比較邏輯。晴天都不易看清那些島，陰天『更不 possible（更不可能）』看見它們，語意才連貫。less possible（更不可能）符合『晴天已難、陰天更難』的遞進。誘答 (A) difficult 會變成 less difficult（比較不困難），與『更看不清』的邏輯相反。"}, {"id": "R112-17", "year": 112, "no": 17, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Do you remember the CD I was looking for for months? I ___ found it in a small shop. Look, here it is!", "options": {"A": "almost", "B": "even", "C": "finally", "D": "still"}, "answer": "C", "img": false, "expl": "本題考語意。說話者找了好幾個月的CD，如今『終於』在小店找到，並興奮地說『看，就在這！』，故用 finally (C)。誘答 (A) almost（幾乎）會變成『幾乎找到』，與『看，就在這裡』（已找到）矛盾。"}, {"id": "R112-18", "year": 112, "no": 18, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Business at Jane's shop has not been good these days. And the new supermarket across the street only makes things ___ .", "options": {"A": "easier", "B": "worse", "C": "more boring", "D": "more convenient"}, "answer": "B", "img": false, "expl": "本題考語意與比較級。Jane 店裡生意本來就不好，對街又開了新超市，只會讓情況『更糟』(B worse)。make things worse（使情況更糟）符合競爭對手出現的負面語境。誘答 (A) easier、(D) more convenient 為正面語意，與『生意不好』的困境相反。"}, {"id": "R112-19", "year": 112, "no": 19, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Scott wasn't sure if the young woman before him was ___ pulled him out of a car on fire.", "options": {"A": "who", "B": "the one", "C": "the one she", "D": "the one who"}, "answer": "D", "img": false, "expl": "本題考關係代名詞與先行詞。空格需一個名詞當補語，並帶出關係子句修飾。the one 為先行詞，who 引導形容詞子句作『拉他出車的那個人』，故選 the one who (D)。誘答 (C) the one she 多出主詞 she 造成重複，(A) who 缺少先行詞名詞。"}, {"id": "R112-20", "year": 112, "no": 20, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "I ___ swimming for several years before I went to this high school. I gave it up because of heavy schoolwork.", "options": {"A": "have practiced", "B": "am practicing", "C": "practiced", "D": "would practice"}, "answer": "C", "img": false, "expl": "本題考過去完成的持續與過去簡單式。句中有 before I went to this high school（過去某時點），描述在此之前『游了好幾年泳』這段已結束的往事，用過去式 practiced (C) 即可。第二句『因課業重而放棄』也表明是過去已結束的事。誘答 (A) have practiced 為現在完成式，不可與明確過去時間 before... 連用。"}, {"id": "R112-21", "year": 112, "no": 21, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "Frank Kane is so good in the movie that many people ___ he will win the best actor prize.", "options": {"A": "expect", "B": "forget", "C": "notice", "D": "plan"}, "answer": "A", "img": false, "expl": "本題考字彙。Kane 在片中演得極好，許多人『預期／期待』(A expect) 他會贏得最佳男主角獎。expect 表『預料、期待某事會發生』，符合語意。誘答 (D) plan（計畫）主詞不合，得獎與否非旁人所能計畫。"}, {"id": "R112-22", "year": 112, "no": 22, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "The new medicine that just came out on the market ___ thousands of lives.", "options": {"A": "and saved", "B": "has saved", "C": "saving", "D": "to save"}, "answer": "B", "img": false, "expl": "本題考主詞與動詞及現在完成式。主詞 The new medicine 為單數，需要一個完整的主要動詞。此藥已上市並『拯救了無數生命』，強調對現在的影響，用現在完成式 has saved (B)。誘答 (A) and saved 使句子缺主要動詞、(C) saving、(D) to save 皆非限定動詞，無法作句子的述語。"}, {"id": "R112-23", "year": 112, "no": 23, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Now I often think of those days with Pip, my pet dog. When I read in my room, he ___ quietly beside me.", "options": {"A": "will come and sit", "B": "comes and sits", "C": "has come and sat", "D": "used to come and sit"}, "answer": "D", "img": false, "expl": "本題考過去習慣。前文『我常想起和愛犬 Pip 相處的那些日子』點明是回憶過去，描述『我看書時牠總安靜坐我身旁』的過去習慣性動作，用 used to (D)。誘答 (B) comes and sits 為現在式，與『回憶往日』的過去語境不符。"}, {"id": "R112-24", "year": 112, "no": 24, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "112-P1", "stem": "Amy went to Four Seasons' Kitchen with her mother after she collected 15 stars. They ordered two Garden Sandwiches, an Autumn Wind, and a Winter Snow. After using the stars, how much did they pay for their meals?", "options": {"A": "$290.", "B": "$230.", "C": "$220.", "D": "$160."}, "answer": "B", "img": true}, {"id": "R112-25", "year": 112, "no": 25, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "112-P1", "stem": "Amy wants to bring her friends to Four Seasons' Kitchen in August. She looks at her calendar to pick a time to go there. Which are the time and date she can choose?", "options": {"A": "8:30 pm, August 1.", "B": "5:00 pm, August 11.", "C": "3:00 pm, August 13.", "D": "2:00 pm, August 28."}, "answer": "B", "img": true}, {"id": "R112-26", "year": 112, "no": 26, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "112-P2", "stem": "According to the notes, which is the WRONG way to help a baby bird that is out of its nest?", "options": {"A": "Feed it before you take it to a hospital.", "B": "Leave it alone if it is not hurt and has feathers.", "C": "Call the animal center if you can't find its nest.", "D": "Put it back in its nest if it is not hurt and has few feathers."}, "answer": "A", "img": true}, {"id": "R112-27", "year": 112, "no": 27, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "112-P2", "stem": "According to the notes, what do birds do if their babies have the smell of people on them?", "options": {"A": "They keep taking care of them.", "B": "They push them out of the nest.", "C": "They clean them until the smell goes away.", "D": "They leave them behind and move to a new nest."}, "answer": "A", "img": true}, {"id": "R112-28", "year": 112, "no": 28, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "112-P3", "stem": "According to the reading, which is one of the reasons for food waste?", "options": {"A": "Stores do not know how to pack food well.", "B": "Farmers do not have enough machines to collect food.", "C": "There is no refrigerator on the truck to keep food fresh.", "D": "Factories do not have enough trucks to carry food to stores."}, "answer": "C", "img": true}, {"id": "R112-29", "year": 112, "no": 29, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "112-P3", "stem": "Which is true about food waste at each stage in the three parts of the world?", "options": {"A": "For each area, the highest percentage of food waste happens at Stage 5.", "B": "Europe has a lower percentage of food waste at Stage 3 than the other two areas.", "C": "North America & Oceania has a higher percentage of food waste at Stage 1 than Europe.", "D": "South & Southeast Asia has a higher percentage of food waste at Stage 4 than the other two areas."}, "answer": "D", "img": true}, {"id": "R112-30", "year": 112, "no": 30, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "112-P4", "stem": "What is the trick that the mosquito uses in rain?", "options": {"A": "It shakes its body fast enough to get water off.", "B": "It drops with the raindrop and then rolls off it.", "C": "It flies behind the raindrop and pushes it away.", "D": "It rides on the raindrop and lands on the ground."}, "answer": "B", "img": false, "expl": "本題問蚊子在雨中用的『技巧』。依第三段，蚊子被雨滴打到時會『被雨滴推著一起下墜』，下降約6公分後再『從雨滴上滾開飛走』(rolls off)，故選 (B) 隨雨滴下墜再滾開。誘答 (A) 甩水是講身上的細毛防水，非閃避雨滴的技巧；(D) 落地是技巧失敗的下場。"}, {"id": "R112-31", "year": 112, "no": 31, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "112-P4", "stem": "What keeps a mosquito safe in the rain?", "options": {"A": "It is very light.", "B": "It has no body hairs.", "C": "It is as big as a raindrop.", "D": "It is strong enough to fight the force of a raindrop."}, "answer": "A", "img": false, "expl": "本題問什麼讓蚊子在雨中保命。第二段明言蚊子『輕得多—只有0.002克』，正因為太輕，被雨滴打到時受力不足以致命 (This saves its life)，故選 (A) 牠非常輕。誘答 (B) 身上無毛與文中『covered with hairs』相反，且毛是防水非保命關鍵。"}, {"id": "R112-32", "year": 112, "no": 32, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "112-P4", "stem": "When would it be dangerous for a mosquito in the rain?", "options": {"A": "When it flies too close to the ground.", "B": "When the rain falls too hard and too fast.", "C": "When it is hit by raindrops too many times.", "D": "When it drops for more than 6 cm in the rain."}, "answer": "A", "img": false, "expl": "本題問何時蚊子在雨中有危險。末段說明：若蚊子飛得太低 (flies too low)，被雨滴打到時來不及飛走，就會撞地身亡，故選 (A) 飛得太靠近地面時。誘答 (D) 下墜超過6公分並非危險，文中6公分後正常會滾開飛走。"}, {"id": "R112-33", "year": 112, "no": 33, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "112-P5", "stem": "What do the three stories in the reading all talk about?", "options": {"A": "Who Beethoven's true love was.", "B": "Who played \"For Elise\" the best.", "C": "How \"For Elise\" became popular.", "D": "Why Beethoven wrote \"For Elise.\""}, "answer": "D", "img": false, "expl": "本題問三個故事共同談論的主題。全文圍繞『Elise 是誰、貝多芬為誰而寫《給愛麗絲》』三種說法展開，故選 (D) 貝多芬為何寫《給愛麗絲》。誘答 (C) 樂曲如何走紅並非三個故事的焦點，文章重點在探討獻曲對象。"}, {"id": "R112-34", "year": 112, "no": 34, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "112-P5", "stem": "What do we know about \"For Elise\" from the reading?", "options": {"A": "It first appeared in the opera Fidelio.", "B": "The true \"Elise\" was Elise Barensfeld.", "C": "The manuscript was found after Beethoven died.", "D": "The manuscript is now kept by the city of Vienna."}, "answer": "C", "img": false, "expl": "本題問由文章可知《給愛麗絲》的何事為真。末段說『直到1867年手稿被發現，此時已是貝多芬去世40年後』，可知手稿是在貝多芬死後才被發現，故選 (C)。誘答 (B) 真正的 Elise 是 Barensfeld 為過度推論，文中明言『我們或許永遠不會知道正確答案』。"}, {"id": "R112-35", "year": 112, "no": 35, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "112-P5", "stem": "What can we learn about the three women from the stories?", "options": {"A": "They were called \"Elise\" by their friends.", "B": "Elisabeth Röckel was a close friend of Beethoven's.", "C": "Therese Malfatti changed \"For Elise\" to \"For Therese.\"", "D": "Elise Barensfeld was Beethoven's student."}, "answer": "B", "img": false, "expl": "本題問由故事可知三位女性的何事。第一個故事明白指出 Elisabeth Röckel 曾在貝多芬歌劇中演唱、兩人成為『很好的朋友』，故選 (B) 她是貝多芬的密友。誘答 (C) 說 Malfatti 把曲名改成《給德蕾莎》有誤，文中是貝多芬原本題《給德蕾莎》，後來他人抄錯成 Elise。"}, {"id": "R112-36", "year": 112, "no": 36, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "112-P6", "stem": "What idea does the reading talk about?", "options": {"A": "Not all kinds of toys are helpful for children's learning.", "B": "Parents should give their children the right toys for their age.", "C": "Children should learn about their gender from playing with toys.", "D": "We should not let gender decide which toys children can play with."}, "answer": "D", "img": false, "expl": "本題問文章談論的主旨。全文論證男女幼兒對玩具的興趣並非天生，而是後天『看樣學樣』造成，主張不應以性別決定孩子能玩什麼玩具，故選 (D) 不該讓性別決定孩子玩哪種玩具。誘答 (B) 家長應依年齡給對的玩具，文章重點在『性別』而非『年齡』。"}, {"id": "R112-37", "year": 112, "no": 37, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "112-P6", "stem": "In the third paragraph, why does the writer think \"this rule can be bad for children\"?", "options": {"A": "Children may not want to share their toys with others.", "B": "Children may have the wrong idea about following rules.", "C": "Children may not be able to learn from playing with toys.", "D": "Children may miss the chance to find out what they really like."}, "answer": "D", "img": false, "expl": "本題問第三段作者為何認為『這規則對孩子有害』。該段指出不同玩具教孩子不同能力，孩子透過玩各種玩具才能發現自己的興趣與專長；若受性別限制，就會『錯失發掘真正喜好的機會』，故選 (D)。誘答 (C) 說孩子無法從玩具中學習太絕對，作者強調的是『錯失發掘興趣的機會』。"}, {"id": "R112-38", "year": 112, "no": 38, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "112-P6", "stem": "In the reading, after the writer talks about an idea, he often gives an example to make it clear. Below are four of the sentences in the third paragraph. Which is used as an example?", "options": {"A": "\"However, this rule can be bad for children.\"", "B": "\"Dolls help with their early language use, and building toys are good for learning math and science.\"", "C": "\"Some doctors worry that children may use the same kind of thinking when they look for jobs in the future.\"", "D": "\"If they do, they may miss something more important than just getting a chance to play with different toys.\""}, "answer": "B", "img": false, "expl": "本題問第三段中哪句是用來『舉例說明』的。作者先提出『不同玩具教孩子不同東西』的概念，接著以 (B)『洋娃娃有助早期語言、積木有助數理』具體舉例說明，故選 (B)。誘答 (A) 是提出論點的主題句，非例子。"}, {"id": "R112-39", "year": 112, "no": 39, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "112-P7", "stem": "What is the reading mostly about?", "options": {"A": "Marie Colvin's war reports.", "B": "Marie Colvin's working life.", "C": "Marie Colvin's schooldays at Yale.", "D": "Marie Colvin's experiences in Homs."}, "answer": "B", "img": false, "expl": "本題問文章主旨。全文依時間敘述 Marie Colvin 從立志當記者、加入《周日泰晤士報》、赴各戰地採訪到殉職的『職業生涯』，故選 (B) 她的工作人生。誘答 (D) 她在 Homs 的經歷只是文章最後一小段，並非全篇重點。"}, {"id": "R112-40", "year": 112, "no": 40, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "112-P7", "stem": "What does it mean when someone has empathy?", "options": {"A": "They are good at taking war photos.", "B": "They like to read other people's life stories.", "C": "They are able to understand how other people feel.", "D": "They are good at helping people change their own lives."}, "answer": "C", "img": false, "expl": "本題問 empathy（同理心）的意思。第二段描述 Colvin 寫真實的人與生活，讓讀者對這些人的故事感同身受、彷彿是自己的事，可推知 empathy 即『能理解他人的感受』，故選 (C)。誘答 (A) 擅長拍戰地照片與『同理心』無關，文中還說戰地報導不只是照片。"}, {"id": "R112-41", "year": 112, "no": 41, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "112-P7", "stem": "Which is true about Marie Colvin?", "options": {"A": "The chance to study at Yale made her leave her job in the Middle East.", "B": "The experience in Sri Lanka did not change her way of reporting news.", "C": "She was killed in Homs when she was interviewing soldiers there for her report.", "D": "She was not sure what to do in the future until she worked for the Sunday Times."}, "answer": "B", "img": false, "expl": "本題問關於 Colvin 何者為真。文中說她在斯里蘭卡採訪時失去左眼，『但那從未阻止她』，仍前往危險之地並在他人撤離時留守，可見斯里蘭卡的經歷『沒有改變她報導新聞的方式』，故選 (B)。誘答 (C) 說她在 Homs 採訪士兵時遇害有誤，文中她是在所住房屋遭攻擊時喪生。"}, {"id": "R112-42", "year": 112, "no": 42, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "112-P8", "stem": "It's about ___(42)___ in different parts of the US.", "options": {"A": "what things are called", "B": "how sports are played", "C": "why different languages are spoken", "D": "what words are often spelled differently"}, "answer": "A", "img": false, "expl": "本題為文意選填。全文在談 Katz 的書，並舉例說明同一種運動鞋在美國不同地區有 tennis shoes、sneakers、gym shoes 等『不同的稱呼』，故 (42) 填 (A) 東西在各地怎麼被稱呼。誘答 (D) 拼字不同與文中『名稱/用詞不同』不符，例子講的是不同的字而非拼法。"}, {"id": "R112-43", "year": 112, "no": 43, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "112-P8", "stem": "But in my experience, it also shows ___(43)___.", "options": {"A": "how old they are", "B": "who they speak to", "C": "where they grew up", "D": "whether they are men or women"}, "answer": "A", "img": false, "expl": "本題為文意選填，考代名詞 it 與後文邏輯。空格後舉例：作者祖父說 plimsolls、女兒說 kicks/vans，同一家人卻用詞不同，差異在於『世代／年齡』，故 (43) 填 (A) 他們幾歲（年齡）。誘答 (C) 在哪長大不合理，因全家都住紐約，差異來自不同年紀的用語。"}, {"id": "R111-1", "year": 111, "no": 1, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "Look at the picture. The woman is putting       on the cake.", "options": {"A": "candles", "B": "forks", "C": "plates", "D": "strawberries"}, "answer": "A", "img": true}, {"id": "R111-2", "year": 111, "no": 2, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "The movie starts at two o'clock,       let's meet at the theater at one forty-five.", "options": {"A": "so", "B": "or", "C": "if", "D": "because"}, "answer": "A", "img": false, "expl": "前句「電影兩點開始」與後句「我們一點四十五在戲院碰面」是「因此」的因果關係，故用表結果的對等連接詞 so（所以）。B(或)、C(如果)、D(因為)皆不符前因後果的邏輯；特別注意 because 語意相反，是「後果+原因」的順序。"}, {"id": "R111-3", "year": 111, "no": 3, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "Peter is afraid of the dark. He even leaves the       on when sleeping.", "options": {"A": "computer", "B": "fans", "C": "lights", "D": "music"}, "answer": "C", "img": false, "expl": "由 afraid of the dark（怕黑）可知他睡覺時會開著「燈」不關，故選 lights。關鍵在於怕黑對應的是照明，選 computer／fans／music 都與「怕黑」無直接關聯，屬語意誤導。"}, {"id": "R111-4", "year": 111, "no": 4, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Pam is a       baseball player; she has more fans than any other player on her team.", "options": {"A": "boring", "B": "heavy", "C": "popular", "D": "rich"}, "answer": "C", "img": false, "expl": "分號後「她的粉絲比隊上任何人都多」正好說明 Pam 很受歡迎，故選 popular（受歡迎的）。B(重的)、D(有錢的)與粉絲多沒有因果連結，boring(無聊的)語意相反。"}, {"id": "R111-5", "year": 111, "no": 5, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "I did not do my homework, so my teacher said I       stay after school to finish it.", "options": {"A": "failed to", "B": "had to", "C": "hoped to", "D": "used to"}, "answer": "B", "img": false, "expl": "因為沒寫作業，老師要求「不得不」留校完成，語意上是被規定、非自願，故用 had to（必須，過去式）。C(希望)、D(過去習慣)語意不合；A failed to（未能）意思相反，並不表示義務。"}, {"id": "R111-6", "year": 111, "no": 6, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "Kevin has only enough money for the bag or the shoes. That is a hard       to make because he likes them both.", "options": {"A": "choice", "B": "gift", "C": "rule", "D": "trick"}, "answer": "A", "img": false, "expl": "由「只夠買包包或鞋子」且「兩個都喜歡」可知要做出難以取捨的「選擇」，故選 choice（選擇）。make a choice 為固定搭配；gift／rule／trick 皆與二選一的情境無關。"}, {"id": "R111-7", "year": 111, "no": 7, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "It was       for us to answer the math question because we've done the same kind of questions many times.", "options": {"A": "common", "B": "easy", "C": "safe", "D": "special"}, "answer": "B", "img": false, "expl": "後半句「因為我們做過很多次同類題目」是「容易作答」的原因，故選 easy（容易的）。做過很多次→熟練→簡單，符合因果；common(常見的)、safe(安全的)、special(特別的)都無法由「做過很多次」推得。"}, {"id": "R111-8", "year": 111, "no": 8, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Although it took me lots of time       a big meal for ten people, I was happy that everyone enjoyed it.", "options": {"A": "prepare", "B": "to prepare", "C": "preparing", "D": "prepared"}, "answer": "B", "img": false, "expl": "本題考「花時間做某事」的句型 It takes+人+time+to V，故用不定詞 to prepare。雖然 spend 常接 V-ing，但主詞為 it、動詞為 took 時固定接 to V，這是主要誘答陷阱(誤選 preparing)。"}, {"id": "R111-9", "year": 111, "no": 9, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Don't let the children swim in the river. We don't know how       it is. It could be dangerous.", "options": {"A": "deep", "B": "far", "C": "long", "D": "thick"}, "answer": "A", "img": false, "expl": "後句「可能很危險」提示是擔心河水的「深度」，故選 deep（深的）。游泳的安全顧慮直接對應水深；far(遠)、long(長)、thick(厚)都不是評估河中游泳危險的關鍵屬性。"}, {"id": "R111-10", "year": 111, "no": 10, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Bob is       of the boys in the family. He never does any housework. His brothers at least take out the garbage sometimes.", "options": {"A": "lazier", "B": "the lazy", "C": "the lazier", "D": "the laziest"}, "answer": "D", "img": false, "expl": "由「他從不做家事，兄弟們至少偶爾倒垃圾」可知 Bob 是家中所有男孩裡「最懶的」，三者以上比較用最高級 the laziest。誘答 A lazier 為兩者比較的比較級，與「所有男孩中」不符。"}, {"id": "R111-11", "year": 111, "no": 11, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Aunt Gina has lived in this town for more than sixty years, so she       it very well.", "options": {"A": "will know", "B": "knew", "C": "knows", "D": "was going to know"}, "answer": "C", "img": false, "expl": "Gina 姑姑住這鎮上超過六十年，表示「現在」對這裡很熟，敘述現在的狀態用現在簡單式 knows。for+一段時間雖常搭配現在完成式，但此處強調目前熟悉的事實，且 know 為狀態動詞，故用現在式。"}, {"id": "R111-12", "year": 111, "no": 12, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "We won't see the sun even after the typhoon leaves, because the news said that heavier rain will soon      .", "options": {"A": "catch", "B": "follow", "C": "move", "D": "stop"}, "answer": "B", "img": false, "expl": "由「颱風走後仍看不到太陽，因為新聞說更大的雨很快會…」可知大雨會「接著到來」，故選 follow（跟隨、接著發生）。catch／move／stop 與「隨後而來」的語意不合，stop 更是意思相反。"}, {"id": "R111-13", "year": 111, "no": 13, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Yesterday when I got home from work, my brother       for dinner, so he invited me to join him.", "options": {"A": "goes out", "B": "went out", "C": "has gone out", "D": "was going out"}, "answer": "D", "img": false, "expl": "昨天回到家的「那個時間點」哥哥正要出門吃晚餐，描述過去某時刻正在進行/即將發生的動作用過去進行式 was going out，才能與 so he invited me（順勢邀我）銜接。B went out 為單純過去，無法表達「正要」的進行語境。"}, {"id": "R111-14", "year": 111, "no": 14, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "You were       not to lend Amy money. She never gives back what she borrows.", "options": {"A": "crazy", "B": "helpful", "C": "wise", "D": "wrong"}, "answer": "C", "img": false, "expl": "後句「她從不歸還借的東西」說明不借錢給 Amy 是「明智的」，故選 wise（明智的）。crazy(瘋狂)、wrong(錯的)語意相反；helpful(有幫助的)不符「不借錢」反而是保護自己的判斷。"}, {"id": "R111-15", "year": 111, "no": 15, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Have you found a summer job yet? Mr. Firth       someone to take care of his kids during the vacation. Maybe you can talk to him.", "options": {"A": "has looked for", "B": "is looking for", "C": "looks for", "D": "was looking for"}, "answer": "B", "img": false, "expl": "由「你找到暑期工作沒？」與「也許你可以找他談談」可知 Firth 先生「目前正在找」人照顧小孩，描述現階段正進行的狀態用現在進行式 is looking for。誘答 D was looking for 為過去進行，與「現在可去談」時態不合。"}, {"id": "R111-16", "year": 111, "no": 16, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "David looked out of the balcony window and saw a woman get in his car       away.", "options": {"A": "drive", "B": "drove", "C": "and drive", "D": "and drove"}, "answer": "C", "img": false, "expl": "此處考感官動詞 see 的受詞補語並列：saw a woman (get in his car) and (drive away)，兩個原形動詞用 and 連接，故選 and drive。感官動詞後接原形 V，排除 drove／drive(單獨)，需用 and drive 使兩動作並列。"}, {"id": "R111-17", "year": 111, "no": 17, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "The police haven't found the little girl who       at a supermarket. They'll keep doing all they can to find her.", "options": {"A": "took away", "B": "taken away", "C": "has taken away", "D": "was taken away"}, "answer": "D", "img": false, "expl": "小女孩是「被」帶走的，主詞 the little girl 為動作的承受者，需用被動語態，且為過去事件，故選 was taken away。A took away 為主動、C 時態與語態皆不符，關鍵在辨別女孩是被害者而非施動者。"}, {"id": "R111-18", "year": 111, "no": 18, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Buses to the airport only come once every hour, and we just missed      . Why don't we take a taxi?", "options": {"A": "another", "B": "it", "C": "one", "D": "them"}, "answer": "C", "img": false, "expl": "公車每小時一班，「我們剛錯過了一班(其中一班)」，指同類事物中不特定的一個用 one（代替 a bus）。B it 指特定某一台、D them 為複數皆不合；A another(另一個)不符「剛錯過的那班」語意。"}, {"id": "R111-19", "year": 111, "no": 19, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Ariel       every night for a week before her Chinese test and got a very good grade.", "options": {"A": "studied", "B": "studies", "C": "has studied", "D": "was going to study"}, "answer": "A", "img": false, "expl": "由 for a week before her Chinese test（考試前一週每晚)及後句 got a good grade(得高分)可知是已完成的過去事件，用過去簡單式 studied。時間點明確落在過去(考試前)，故不用現在完成式 has studied。"}, {"id": "R111-20", "year": 111, "no": 20, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "While reading this story, Brad saw the word \"trolling\" and didn't know what it meant. Josh turned off the screen and sat back. \"Why are they trolling me like this?\" He didn't understand. They wanted him to share what he thought about the show, and he did. And now look what he got. In the end, all they wanted was nice words. He found several meanings of the word in a dictionary. Which one should Brad choose?", "options": {"A": "To celebrate in song.", "B": "To make someone or something move around.", "C": "To pull a fishing line through the water, often from a boat.", "D": "To write something on the Internet to hurt someone or make them angry."}, "answer": "D", "img": false, "expl": "Josh 因在網路上分享看法卻遭人攻擊而困惑，故 trolling 在此指「在網路上發文傷害他人或使人生氣」，對應選項 D。前文 share what he thought…and now look what he got 提示是網路上的惡意留言，其餘為釣魚、移動、唱歌等字面義誘答。"}, {"id": "R111-21", "year": 111, "no": 21, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "111-P1", "stem": "What does Tea-Rock celebrate?", "options": {"A": "Their sales in 20 countries.", "B": "The coming out of their 20th kind of tea.", "C": "Their 20th year of business.", "D": "The opening of their 20th store in the USA."}, "answer": "C", "img": true}, {"id": "R111-22", "year": 111, "no": 22, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "111-P1", "stem": "Here is the postcard Jason is going to send to Tea-Rock 20. What else does he need to put on the postcard before he sends it?", "options": {"A": "His age.", "B": "His address.", "C": "His birthday.", "D": "Another picture of the tea cup."}, "answer": "C", "img": true}, {"id": "R111-23", "year": 111, "no": 23, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "111-P2", "stem": "What can we learn about sugar from the infographic?", "options": {"A": "There are 4 g of sugar in 66 g of ice cream.", "B": "A woman can eat as much sugar a day as a man can.", "C": "Taiwan eats more sugar for each person than the US does.", "D": "400 ml of rice milk has less sugar than 400 ml of grape juice."}, "answer": "D", "img": true}, {"id": "R111-24", "year": 111, "no": 24, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "111-P2", "stem": "What can be a reason why the list of \"Sugar that is hidden in foods and drinks\" is put in the infographic?", "options": {"A": "To help us understand how sugar hurts our body.", "B": "To show what kinds of foods and drinks are popular with children.", "C": "To tell us that we often have more sugar than we can without knowing it.", "D": "To let us know how much sugar is enough to make foods and drinks taste good."}, "answer": "C", "img": true}, {"id": "R111-25", "year": 111, "no": 25, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "111-P3", "stem": "Why did Darrell tell Marina to go to Pinterest?", "options": {"A": "To find some examples for her homework.", "B": "To shop for things that are needed for art classes.", "C": "To meet new friends who have the same interests.", "D": "To share her works and tell people how they are made."}, "answer": "A", "img": false, "expl": "Darrell 建議 Marina 上 Pinterest，是因為她要畫「未來的房子」卻沒靈感，而 Pinterest 上很多人分享作品、可以獲得點子，故選 A(找作業的範例)。文中 I'm sure you can get some ideas there 為直接依據；B 把它誤當購物 App，正是 Marina 一開始的錯誤認知。"}, {"id": "R111-26", "year": 111, "no": 26, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "111-P3", "stem": "What does it mean when you learn something from A to Z?", "options": {"A": "You can learn it at any time.", "B": "You learn it in a baking class.", "C": "You learn everything about it.", "D": "You spend all your life learning it."}, "answer": "C", "img": false, "expl": "Darrell 用 A to Z 形容他找到做巧克力蛋糕「從選巧克力、烤蛋糕到裝飾糖花」的完整過程，故 from A to Z 意為「學到關於它的一切」，選 C。破折號後的完整步驟即為線索，與時間或烘焙課皆無關。"}, {"id": "R111-27", "year": 111, "no": 27, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "111-P4", "stem": "Which idea is talked about in the first paragraph of the reading?", "options": {"A": "How you should do Tabata training.", "B": "What is the best time for Tabata training.", "C": "Who first had the idea of Tabata training.", "D": "How often you should do Tabata training."}, "answer": "A", "img": false, "expl": "第一段介紹 Tabata 的做法：運動20秒、休息10秒、重複，以及常見動作，屬於「你該如何做 Tabata」，故選 A。段落重點在操作方式與動作示範，B/C/D 的最佳時間、發明者、頻率在第一段皆未提及。"}, {"id": "R111-28", "year": 111, "no": 28, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "111-P4", "stem": "Who might find that Tabata training is right for them?", "options": {"A": "People who enjoy team sports.", "B": "People who want to start exercising.", "C": "People who want to fix their heart problems.", "D": "People who already have a habit of exercising."}, "answer": "D", "img": false, "expl": "末段指出這運動不適合很少運動或有心臟問題的人，但適合「喜歡運動卻太忙沒空上健身房」的人，故選 D(已有運動習慣的人)。for people who enjoy exercising but are too busy 為依據；B(想開始運動者)與 C(想治心臟病者)正是文中提醒不適合的族群。"}, {"id": "R111-29", "year": 111, "no": 29, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "111-P4", "stem": "Which is true about Tabata training?", "options": {"A": "It is difficult to learn the moves.", "B": "You are free to choose your own moves.", "C": "You need a large space to do the exercises.", "D": "You cannot rest between moves if you want the afterburn."}, "answer": "B", "img": false, "expl": "文中 You can decide yourself what moves to do 明確說明可自行選擇動作，故選 B。A、C 與文意相反(動作不難學、不需大空間)；D 錯在文章說要重複並含休息，afterburn 靠的是每20秒全力，而非不休息。"}, {"id": "R111-30", "year": 111, "no": 30, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "111-P5", "stem": "There are four important points in the report: a. What \"No Overtime Day\" is  b. Why \"No Overtime Day\" fails  c. Why there is \"No Overtime Day\" in the country  d. How workers deal with \"No Overtime Day\"  How are they ordered in the report?", "options": {"A": "acdb.", "B": "adcb.", "C": "cabd.", "D": "cadb."}, "answer": "D", "img": false, "expl": "報導先講長工時的問題並帶出「無加班日」的由來(c)，再說明無加班日是什麼(a)，接著描述員工如何應對(d)，最後解釋為何仍失敗/繼續工作(b)，故順序為 cadb，選 D。依段落推進：背景原因→定義→員工行為→失效原因。"}, {"id": "R111-31", "year": 111, "no": 31, "section": "題組", "type": "閱讀理解", "skill": "指代", "pkey": "111-P5", "stem": "What does \"this\" mean in the report?", "options": {"A": "The way workers show they are hard-working.", "B": "Restaurants and coffee shops open until very late at night.", "C": "Workers do not go home when they walk out of the office.", "D": "The number of workers who get paid more and rise higher in the company."}, "answer": "A", "img": false, "expl": "this 指前一句「加班成為顯示自己勤奮的方式」，故選 A(員工展現勤奮的方式)。this must be changed 承接的正是這種以長工時證明努力的風氣，B/C/D 皆非該句所指的對象。"}, {"id": "R111-32", "year": 111, "no": 32, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "111-P5", "stem": "What can we learn from Figure 1 and Figure 2?", "options": {"A": "Long working hours killed more women than men in 2014.", "B": "Long working hours kills more and more workers every year.", "C": "Men usually have a bigger chance to get paid more and rise higher when they work the same hours as women.", "D": "Men and women have almost the same chance to get paid more and rise higher when they work 2,200 hours."}, "answer": "D", "img": false, "expl": "由選項與圖表推論，當工時達2,200小時時男女獲得加薪與升遷的機會幾乎相同，故選 D。文中 This is true for both men and women 支持男女趨勢相近；B 錯在文章未說死亡人數逐年增加，A、C 亦無圖表數據支持。"}, {"id": "R111-33", "year": 111, "no": 33, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "111-P6", "stem": "Which map is most likely the map of Cameroon in 1962?", "options": {"A": "(地圖圖片A，原始PDF未擷取圖像內容)", "B": "(地圖圖片B，原始PDF未擷取圖像內容)", "C": "(地圖圖片C，原始PDF未擷取圖像內容)", "D": "(地圖圖片D，原始PDF未擷取圖像內容)"}, "answer": "D", "img": true}, {"id": "R111-34", "year": 111, "no": 34, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "111-P6", "stem": "What does resentful mean in the reading?", "options": {"A": "Sad.", "B": "Angry.", "C": "Careful.", "D": "Worried."}, "answer": "B", "img": false, "expl": "resentful 出現在英語使用者長期不被善待、決定為自己抗爭的脈絡中，情緒是對政府的「憤怒」，故選 B(Angry)。前文列舉找不到公職、被要求說法語等不公，引發的是憤怒而非單純難過或擔憂。"}, {"id": "R111-35", "year": 111, "no": 35, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "111-P6", "stem": "What does Cameroon's government most likely think of Ambazonia?", "options": {"A": "It plans to do business with Ambazonia.", "B": "It needs Ambazonia for money and help.", "C": "It does not want to be part of Ambazonia.", "D": "It does not agree that Ambazonia is a country."}, "answer": "D", "img": false, "expl": "全文描述英語區人民不受政府善待、決定為己抗爭，政府是由法語人士掌權，因此政府最可能「不承認 Ambazonia 是一個國家」，選 D。由政府長期打壓英語族群、掌權者立場可推知不會認可其獨立建國，而非與之合作或依賴。"}, {"id": "R111-36", "year": 111, "no": 36, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "111-P6", "stem": "What does Elisa Grant try to tell readers by talking about the history of Cameroon?", "options": {"A": "Why speaking English is a way to get power.", "B": "Why English speakers in Cameroon have less power.", "C": "Why the two parts of Cameroon became one country.", "D": "Why only 20% of the people in Cameroon speak English."}, "answer": "B", "img": false, "expl": "作者從1919年 Kamerun 被英法瓜分講起，目的是解釋「為何喀麥隆的英語使用者權力較小」，故選 B。文章以歷史背景回答開頭 this is not true for English speakers in Cameroon 的疑問，說明權力失衡的來由。"}, {"id": "R111-37", "year": 111, "no": 37, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "111-P7", "stem": "What is recommended to people who are visiting the Southend Trail?", "options": {"A": "Camping on the side trails.", "B": "Biking along the side trails.", "C": "Hiking one part of the trail a day.", "D": "Visiting the museum in the morning."}, "answer": "C", "img": false, "expl": "文中建議「安排一天走一段步道、清晨出發，因為每段至少要走七小時」，故選 C(一天走一部分)。plan one day for one part of the trail 為直接依據；側步道太窄不適合騎車(排除 B)，博物館時間文中未特別推薦(排除 D)。"}, {"id": "R111-38", "year": 111, "no": 38, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "111-P7", "stem": "What does lodging mean in the reading?", "options": {"A": "A meal to have.", "B": "A place to stay in.", "C": "A time for visiting.", "D": "A way of moving around."}, "answer": "B", "img": false, "expl": "lodging 一詞後接「露營」與「住旅館」兩種選擇，可知是指「可住宿的地方」，故選 B(A place to stay in)。two types of lodging…Camping…stay at a hotel 的舉例即為線索，與用餐、參觀時間或交通方式無關。"}, {"id": "R111-39", "year": 111, "no": 39, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "111-P7", "stem": "Kaylen will start his trip from Cove. He plans to visit one of the old castles. He also wants to go birdwatching near the river. Which parts of the trail should Kaylen go on?", "options": {"A": "Parts 1 and 2.", "B": "Parts 1 and 2a.", "C": "Parts 2 and 3.", "D": "Parts 4 and 4a."}, "answer": "A", "img": true}, {"id": "R111-40", "year": 111, "no": 40, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "111-P8", "stem": "40. (在文中空格處，選出最適合的用語)", "options": {"A": "in fact", "B": "at first", "C": "of course", "D": "for example"}, "answer": "D", "img": false, "expl": "空格前說迴文是左右讀都相同的字句，空格後緊接 eye、Bob、my gym 等「例子」，故選 for example(舉例)。此處在列舉迴文範例，in fact／at first／of course 皆無「舉例」的銜接功能。"}, {"id": "R111-41", "year": 111, "no": 41, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "111-P8", "stem": "41. (根據上下文，選出符合anagram範例的選項)", "options": {"A": "take sit", "B": "Ms Easy", "C": "it makes", "D": "me steak"}, "answer": "C", "img": false, "expl": "anagram 是把單字字母重新排列組成新字詞，須與原詞字母完全相同。題目範例(如 steam 類)重組後為 it makes，字母組成一致，故選 C。其餘選項字母無法與原詞完全對應，屬字母不符的誘答。"}, {"id": "R111-42", "year": 111, "no": 42, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "111-P8", "stem": "42. (在文中空格處，選出最適合的用語)", "options": {"A": "strange", "B": "difficult", "C": "delicious", "D": "important"}, "answer": "A", "img": false, "expl": "空格後以 restaurant 變成 Eat rats, run! 為例，說明重組後有時會產生「奇怪」卻有意義的字句，故選 A(strange)。此例語意突兀有趣，對應 strange；difficult／delicious／important 皆無法呼應這個古怪的例子。"}, {"id": "R111-43", "year": 111, "no": 43, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "111-P8", "stem": "43. (在文中空格處，選出最適合總結全文的用語)", "options": {"A": "more than just games", "B": "often played in public", "C": "not so popular as before", "D": "not first used to learn words"}, "answer": "A", "img": false, "expl": "空格後說迴文可用來學數學、作音樂，字謎可用來藏祕密、藏重要研究，說明兩者「不只是遊戲」，故選 A(more than just games)。此為總結句，後文列舉的實際用途正是支持「不僅是遊戲」的論據。"}, {"id": "R110-1", "year": 110, "no": 1, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "In the picture, the boy is ___ the old man.", "options": {"A": "smiling at", "B": "dancing with", "C": "cheering for", "D": "bowing to"}, "answer": "D", "img": true}, {"id": "R110-2", "year": 110, "no": 2, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Listen! The baby ___ in the bedroom. Why don't you go in and take a look?", "options": {"A": "cried", "B": "cries", "C": "is crying", "D": "will cry"}, "answer": "C", "img": false, "expl": "由 Listen!(聽!)與「你何不進去看看」可知寶寶「此刻正在」哭，描述說話當下正進行的動作用現在進行式 is crying。Listen! 為現在進行式的典型時間提示，排除過去式 cried 與未來式 will cry。"}, {"id": "R110-3", "year": 110, "no": 3, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Jill is ___ that the city park is closed for the music festival because now she can't jog there.", "options": {"A": "excited", "B": "proud", "C": "scared", "D": "unhappy"}, "answer": "D", "img": false, "expl": "後句「現在她不能在那裡慢跑」說明公園因音樂節關閉讓 Jill「不開心」，故選 unhappy。無法慢跑是負面結果，對應不悅；excited(興奮)、proud(驕傲)語意相反，scared(害怕)不符情境。"}, {"id": "R110-4", "year": 110, "no": 4, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "Steven wants to be a ___, because he loves to watch people enjoy the food he prepares.", "options": {"A": "cook", "B": "doctor", "C": "driver", "D": "farmer"}, "answer": "A", "img": false, "expl": "句意「Steven 想成為___，因為他喜歡看別人享用他準備的食物」。準備食物、看人享用美食的職業是 (A) cook（廚師）。(B) doctor 醫生、(C) driver 司機、(D) farmer 農夫都與「準備食物給人享用」無關，關鍵線索在 prepares the food 與 enjoy the food。"}, {"id": "R110-5", "year": 110, "no": 5, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Paul misses his parents a lot. He ___ them since he came to work in Taiwan a year ago.", "options": {"A": "didn't see", "B": "doesn't see", "C": "hasn't seen", "D": "won't see"}, "answer": "C", "img": false, "expl": "考現在完成式。時間狀語 since he came... a year ago（自一年前來台工作以來）表示動作從過去持續到現在，須用 has/have + p.p.，故選 (C) hasn't seen（一直沒見到）。誘答 (A) didn't see 為單純過去式，無法搭配 since 引導的「自…以來」時間點。"}, {"id": "R110-6", "year": 110, "no": 6, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Our teacher Ms. Wu seldom laughs, but when she ___, everyone in the same building can hear her.", "options": {"A": "can", "B": "does", "C": "has", "D": "will"}, "answer": "B", "img": false, "expl": "此空取代前面的動詞 laughs，以避免重複。原句為一般現在式、主詞第三人稱單數，故用助動詞 does 代替（when she does = when she laughs），選 (B)。(A) can、(D) will 會改變語氣，(C) has 不合時態，都不能單純代替現在式的一般動詞。"}, {"id": "R110-7", "year": 110, "no": 7, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "My sister is coming to my home today. She ___ with me for a week.", "options": {"A": "stays", "B": "stayed", "C": "has stayed", "D": "will stay"}, "answer": "D", "img":
