<style>

body{margin:0;font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;

.top{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 0 12px}
.top .in{max-width:var(--wrap);margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:10px}

#v-run .iconbtn.faved{background:var(--gold);color:#fff}
.cd{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:16px;padding:14px 16px;margin:14px 0 4px;cursor:pointer;box-shadow:var(--shadow)}

.mode.daily{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:0}

.bar .track{height:12px;border-radius:99px;background:var(--line);overflow:hidden}
.bar .track i{display:block;height:100%;border-radius:99px}
.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px}

  display:flex;padding-bottom:env(safe-area-inset-bottom)}

<script>
const QB = {"meta": {"title": "國中教育會考 英語科 官方題庫", "source": "教育部 心測中心 官方公開試題（110–115）", "years": [115, 114, 113, 112, 111, 110], "audioYears": [115, 114, 113, 112, 111, 110], "readingTotal": 256, "readingUsable": 226, "listeningTotal": 126, "listeningUsable": 99, "listeningWithAudio": 99}, "passages": {"115-P1": {"id": "P1", "year": 115, "genre": "說明文/食譜", "topic": "自製水果茶做法", "text": "The Best Fruit Tea You Can Make at Home\n(A recipe brochure showing how to make fruit tea at home using fruit such as apples, bananas, oranges, papayas, pears, and strawberries; boil water, add teabags, add fruit and lemon juice, stir, and let steep before removing the fruit.)\n※ stir 攪拌"}, "115-P2": {"id": "P2", "year": 115, "genre": "對話/漫畫", "topic": "Hawkins 屢次失敗卻總是過度自信", "text": "In 6th grade, I tried to get the students to pick me as student leader.\n\"I'll make class hours shorter. And we'll have only three days of school a week…\"\nI totally bombed it.\n\"What? That's not what a student leader can decide. He doesn't know anything.\"\nI was the best choice, but why didn't people know that?\n\nI became a salesperson when I was 23, and I believed I could be Number 1.\n\"You said you would sell 50 cars a month. But you sold only 1 car in two months.\"\n\"Don't worry. I'll sell 149 cars next month.\"\n\"You said that a year ago.\"\nI bombed it again.\n\"Hawkins, we don't need your service anymore. Go pack your things…\"\n\"Why?\""}, "115-P3": {"id": "P3", "year": 115, "genre": "廣告DM/公告通知", "topic": "The Marigolds' Home 參觀宣傳手冊", "text": "The Marigolds' Home\nOpening times: March to October 10:00-17:00, November to February 10:00-16:00. Closed on Mondays.\nTo make sure you enjoy your visit to The Marigolds' Home, we'd like to ask you to follow the rules below:\n1. Pets are not allowed in any areas of the Marigolds' Home.\n2. Eating and drinking are not allowed inside the buildings, except in the café.\n3. Picture-taking is not allowed inside Sir Archie's House.\n4. Please take off your shoes before entering the Rabbit's Temple.\nBecome a member and save 10% on tickets and 30% on all items in the gift shops. To join, visit www.themarigoldshome.com.\n※ brochure 宣傳手冊"}, "115-P4": {"id": "P4", "year": 115, "genre": "記敘文/新聞報導", "topic": "大提琴家 Beatrice Harrison 與夜鶯共演的故事", "text": "One summer evening when English cello player Beatrice Harrison was practicing in her garden, she was joined by a visitor she did not expect.\nThe visitor was a nightingale. The small brown bird sang together with Harrison's cello music, and the birdsong sounded like the piece she was playing. For the next few evenings, her visitor kept coming back, sometimes with several of its friends. Harrison decided that more people should hear the little singers.\nSo, on May 19, 1924, Harrison worked with the BBC, the UK's national TV and radio station, and played in her garden. At first, the artist was playing alone. Fifteen minutes before the end of her playing, the nightingales began to sing with the cello.\nThe nightingale show was popular with radio listeners. It was repeated the next week, and for the next twelve years Harrison played on the radio with her garden friends. During this time, she got 50,000 fan letters. People called her \"the Nightingale Lady.\""}, "115-P5": {"id": "P5", "year": 115, "genre": "記敘文/悼詞", "topic": "悼念電影文章作家 Rose Lacey", "text": "With heavy hearts, we are here to say goodbye to Rose Lacey, a wonderful writer who will be sadly missed.\nRose and I first met in 2010. I was at a party to pick up my wife when I heard Rose explaining to her and her friends why Get Across was a great movie. Her ideas were so interesting that I invited her to write some articles about movies for Action! US. Rose was very excited and agreed right away.\nOver the next ten years, Rose wrote more than 150 articles. Rose could always bring out something new from movies that we thought we knew so well. People often told me that Rose never failed to surprise them. Her articles often made them think whether they actually saw the same movie, but if they went to see it again, they experienced the movie in a whole new way.\nIn her short life of 40 years, Rose has made her mark on the world of movies with her articles for Action! US. We are lucky to have had her in our lives. She was a very special person.\nAlex Jackson\nHead of Action! US\n※ article 文章"}, "115-P6": {"id": "P6", "year": 115, "genre": "說明文/圖表(流程圖)", "topic": "海玻璃的形成過程", "text": "SEA GLASS: GLASS BOTTLES' SECOND LIFE\nSea glass is made from the magic of the sea. It usually comes from glass bottles that are thrown into the water. Each piece of sea glass looks different, and sea glass is often seen on art pieces. The pictures below explain how sea glass is born.\n1. Glass bottles are thrown as garbage into the sea.\n2. When these bottles ride the waves of the sea, they hit each other or other garbage in the sea and break into small pieces of glass.\n3. Pieces of glass are pushed by sea water and move along the sea floor. The sharp pieces slowly become rounder and rounder.\n4. After tens or hundreds of years in the sea, the pieces of glass grow an ice-like white color on the outside and become sea glass.\n5. Sea glass is finally pushed up to the beach.\n6. Artists collect pieces of sea glass and put them into their works.\nHowever, people now seldom use glass to make bottles and bowls—paper bowls and cups have become more popular these days. This means there are fewer glass items in the sea, so less and less sea glass will be found in the future.\n※ title 標題"}, "115-P7": {"id": "P7", "year": 115, "genre": "說明文/新聞評論(對照兩篇)", "topic": "冰島語的未來（兩篇對立觀點文章）", "text": "The Future of Icelandic — Scandinavian News, by Anna Adams\nIcelandic is a language that is spoken only in Iceland. It has a long history. But many Icelanders are worried that they're losing Icelandic.\nThe reason for their worry is the prevalence of English in Iceland. \"I use English when I talk to my housework robot, use my phone, and watch movies,\" said Helgi Atlason, an engineer. There is a reason for that. Most of these products use English, and few companies care to change the language into Icelandic because there are only a small number of Icelandic speakers (314,000 people). Actually, you see English everywhere in Iceland.\nIcelanders also speak and hear more English than Icelandic these days because many foreigners who come to live and work in Iceland speak only English. \"We can't use Icelandic abroad, and we're not using it much in Iceland, either. How do you expect our kids will want to learn it?\" said Eirikur Wilson, a teacher.\nWill Iceland one day give up Icelandic for English? It may happen soon.\n\nOur Future with Icelandic — Scandinavian News, by Gunnar Eggertsson\nMany people think Icelandic is a language in its sickbed and that it needs to be saved. I understand their worries, but does the future of our language really look that bad?\nAccording to Dr. David Clingingsmith, a language needs at least 35,000 speakers to be \"safe\" from becoming a dying language. There are now 314,000 Icelandic speakers. Also, every year Iceland spends 51.3 million Icelandic crowns (3.7 million US dollars) teaching Icelandic to machines: phones, computers, and robots. Icelandic is appearing more often in products. Most importantly, schools still teach Icelandic to children. Clearly, we are not giving up our first language.\nHowever, I'm not saying that Iceland has done enough for Icelandic. Our country can do a better job at getting more people to speak this beautiful language. One way to do so is to give more language courses to foreigners. With much more work, I'm sure Icelandic can grow and even reach farther into the world.\n※ Icelander 冰島人　product 商品"}, "115-P8": {"id": "P8", "year": 115, "genre": "記敘文/故事", "topic": "老國王以種子考驗孩子選出誠實繼承人", "text": "A long time ago, there was an old king who had no child of his own. The king was worried that his land would fall into the wrong hands after his death, so he decided to pick a child in his land to take the high seat. One day, he called all the children to his castle and gave each of them a seed. \"Come back on New Year's Day and show me what you have grown,\" he said to them, \"and I will 40 .\" Every child brought their seeds home carefully. One of the children, Wong, planted his seed in a pot. He gave it water every day and made sure there was sun to help it grow. 41 . Then, Sung, the child of the richest family in the land, told people that a small plant was growing from his seed. He was 42 . Everyone excitedly said that he would be king. Soon, one after another, more and more children were also saying that they had something in their pots. But Wong still didn't find anything in his. On the big day, when Wong brought his pot to the castle, he saw all the other children carrying interesting plants. Some had flowers in the shape of a bird, and some had grasses of different colors. Everyone proudly showed their plants to the king, but the king looked unhappy until he saw Wong's pot. \"I boiled the seeds before I gave them out, so no plants could grow from them.\" The king looked seriously at the children. \"There is only one child who is 43 enough to be king.\" Ten years later, the king died. On his deathbed, he was not worried because he knew Wong would be a good king."}, "114-P1": {"id": "P1", "year": 114, "genre": "記敘文", "topic": "學校旁麵包店的狗 Rex 被車撞傷後，大家陪伴牠復原的故事", "text": "Rex is a dog that lives at the bakery next to our school. He is cute and friendly. Every morning, he stands in front of the school to welcome everybody. We all see Rex as one of us. But one Monday morning, I was surprised that Rex was not there to say hello to us. “Rex is in the hospital. He was hit by a car last night,” my classmate told me. We went to see Rex in the hospital that day after school. Two weeks later, Rex was much better, and we decided to take him for a walk every evening. Because of the exercise, Rex became healthier and stronger. Soon he could happily run and jump again. He is now as handsome and strong as before!"}, "114-P2": {"id": "P2", "year": 114, "genre": "對話", "topic": "關於 Mark、Linda 與 Jenny 之間狀況的對話（原文為對話框圖像，PDF文字擷取時對話內容遺失，僅保留題目）", "text": "[說明：此篇為對話框（圖像）形式的題組，pdftotext 轉檔時僅擷取到題號與題目，未能擷取對話框內的實際對白文字，原始對話內容缺失。]"}, "114-P3": {"id": "P3", "year": 114, "genre": "廣告DM/圖表(票券/地圖)", "topic": "White Lake City 交通票卡（White Lake City Card）的種類、票價與使用規則", "text": "Buy a White Lake City Card When You’re in the City\nWith any of the Cards, you can\n- visit the city by metro, bus, or train as many times as you want. *\n- take one child under 12 with you for free.\n- save 20% on tickets to public museums.\nThe 1-day, 3-day, and 5-day Cards are for trips from Monday to Friday, and the Weekend Card is for trips on weekends and holidays.\nCheck the map and buy the right Card for the zones you’ll be entering.\n\nCard / Zone 1 / Zones 1-2 / Zones 1-3\n1-day: $20 / $40 / $60\n3-day: $40 / $60 / $80\n5-day: $50 / $80 / $110\nWeekend: $30 / $50 / $80\n\n* The Cards are only for trips inside the three zones.\n\nⓐ White Lake Main Station ⓑ Museum of White Lake City History ⓒ Museum of Modern Art ⓓ White Lake ⓔ White Lake Castle ⓕ White Lake Airport"}, "114-P4": {"id": "P4", "year": 114, "genre": "記敘文", "topic": "16歲少女 Libby Larson 在家族經營的 Rolling Acres 度假農場工作的故事", "text": "At 5 o’clock every morning, while most people are sleeping, 16-year-old Libby Larson is already up. She mops the floor, gets the mail and the newspapers, and gets ready for visitors to Rolling Acres. Libby’s grandparents started Rolling Acres in 1970, and since then all of the Larson family have been working there. Rolling Acres used to be just a sheep farm, but now, with its fruit trees, vegetable gardens, and many other kinds of animals, it has become a popular place for families to go on vacation. Visitors can pick fruits, collect eggs, and feed the animals. It is one of Libby’s jobs to show kids how to feed the baby sheep.\nFor her work, Libby is paid $10 an hour. This summer, she expects to make about $1,200 and plans to buy a cell phone. Her friends think it’s great to make that much money in a summer. However, for Libby, working at a family business also means making sacrifices. “I’d love to sleep until noon or go to summer camp like other kids. My friends stopped inviting me on trips because I’m always busy in the summer.” However, Libby also said, “But it’s better to see both sides. Working with your family is great. You feel closer to each other.”"}, "114-P5": {"id": "P5", "year": 114, "genre": "漫畫", "topic": "以復活節島（Easter Island）為喻，說明過度砍伐樹木導致文明衰亡，藉此呼籲珍惜地球資源", "text": "Around the year 400, people came to Easter Island. So many trees here!\nThey used trees to make fire and build houses. Because of the trees, people had a great life on the island.\nIn their free time, they loved making statues with big rocks. With the trees they cut down, they could move the statues around easily.\nTrees were needed and used in every part of their life. Years passed, and there were fewer and fewer trees on Easter Island.\nWithout enough trees to keep water under the ground, the land became dry, and plants didn’t grow.\nAnd I’m hungry. I’m thirsty.\nPeople began to fight for water and food. The statues were moved to fighting grounds to show their power. The last trees were probably cut down at this time.\nThose who cut down the last trees surely understood how important trees were to them—but still, they did it. When the last trees fell to the ground, people on the island fell, too.\nLet’s not make Earth, our only home, another Easter Island."}, "114-P6": {"id": "P6", "year": 114, "genre": "說明文", "topic": "行為經濟學家 Dan Ariely 以 IKEA 家具和摺紙實驗，說明人們對親手製作之物會產生更高評價的「IKEA效應」", "text": "Many years ago, Dan Ariely bought a cabinet from IKEA. IKEA is a famous furniture store that sells boxes of furniture parts. People who buy them have to put all the parts together themselves. It took Ariely hours to build his cabinet. Ariely didn’t really enjoy himself when he was trying to put all the parts together. However, after he finished, he felt quite good about himself and his cabinet. Later, he found that he loved his cabinet more than any of his other furniture.\nAriely wanted to know if anyone shared his feelings, so he did a fun origami study. He invited two groups of people to join his study. He called one group “builders” and the other group “buyers.” Builders were told to make origami, like paper frogs or paper birds. When they finished, they were asked how much they would spend on their works. Ariely then showed the origami to buyers and asked them how much they would pay for them. The two groups gave very different answers. Though buyers would pay only five cents for builders’ origami, builders would spend 25 cents! Interestingly, builders believed others would think their works were good enough to cost that much money! Ariely’s study showed that he was not alone in his IKEA experience — we just love things more, sometimes blindly, when we make them ourselves. Ariely called it “the IKEA effect.”"}, "114-P7": {"id": "P7", "year": 114, "genre": "說明文", "topic": "1970年代英國電力工人兩度罷工要求加薪、政府因應限電，以及當時社會大眾對此事件觀感的歷史故事", "text": "In the picture is a UK electricity worker in the 1970s. Pictures like this appeared in many newspapers at the time. In 1972, electricity workers in the UK asked to be paid more, and they decided to stop working until their wish was answered. The government worried that there wouldn’t be enough electricity for the country if these workers didn’t go to work, so it agreed to give them the pay rise. However, the story didn’t end there.\nA year later, the electricity workers asked for another pay rise. To get what they wanted, they worked shorter hours and acted like they would walk away from their job anytime. But this time, the government decided to fight. To save electricity, it made new rules for people to follow. For example, each family could turn on the heat in only one room; TV stations had to stop their shows at 10:30 p.m.; businesses could open only three days a week.\nPeople’s lives were greatly changed. Without enough heat to keep the house warm, people covered themselves in blankets all the time. Hospitals had to use candles because they couldn’t keep all the lights on. Factories couldn’t keep their machines working. Many people lost their jobs. For months, people were paying the price while the electricity workers were fighting for their wish. In the end, the government agreed to the second pay rise. This picture shows what many people thought of the electricity workers during the “dark” time."}, "114-P8": {"id": "P8", "year": 114, "genre": "記敘文", "topic": "少年 Cameron 每年生日反而親手做禮物感謝媽媽生養之恩的故事（綜合填空）", "text": "Most kids want gifts from their parents on their birthdays, but Cameron doesn’t. On his birthday, he gives his mom a gift. He ___38___ doing this in his first year of junior high school. That year, during one class, he watched a video about how a baby is pushed from its mother’s body. After class, ___39___ . How brave a woman is to have a baby! Thank God I’ll never have to do that!\nWhen Cameron came home that day, he held his mom in his arms for a long time. He decided that his birthday ___40___ . During those nine months inside his mom, he just ate and slept while his mom was doing all the hard work. So why should he get a birthday gift for doing nothing? If anyone should get a gift on his birthday, it should be his mom.\nThe ___41___ “birthday gift” Cameron prepared was a bag of cookies he baked. The cookies tasted so bad, but his mom said they were the best thing she ever got. Hearing that ___42___ . It was so much better than getting a gift. Now, on his birthday every year, Cameron makes a gift for his mother to thank her for giving him life.\nThis year, Cameron ___43___ his mom a nice dress. A few months ago, he learned to make dresses at school and decided to make one for his mom. Now the dress is finished and hanging behind Cameron’s bedroom door. He believes the gift will tell his mother how much he loves her."}, "113-P1": {"id": "P1", "year": 113, "genre": "記敘文", "topic": "男孩帶弟弟外出買食物，返家時父親被誤認為闖空門", "text": "It was around eight o'clock on Saturday night. Philip was at home with his little brother, Jason. Jason was hungry and kept crying. But Philip couldn't cook and their father was not home yet because he was working late in the office. So Philip decided to take Jason out for some food.\nHalf an hour later, when they came back home, Philip was surprised to find that their father was talking to the police and a woman outside their house. He didn't know who the woman was. She looked scared and stood behind the police. Philip's father was very angry and kept shouting, \"I didn't do anything wrong! I forgot my keys and was just trying to get into MY OWN HOUSE!\" But the police didn't believe him until Philip ran to them and explained everything.\nThe police told Philip that the woman called 110 when she saw Philip's father trying to get into a house through a window. That was how it all happened."}, "113-P2": {"id": "P2", "year": 113, "genre": "圖表(時刻表/菜單)", "topic": "Baker's Kitchen 麵包店的販售時間表", "text": "[圖表題：Baker's Kitchen 麵包店的營業與各式麵包（白麵包、農場麵包、貝果、猶太辮子麵包）供應時刻表，原文為圖片，PDF文字擷取僅保留註解 oven 烤爐]"}, "113-P3": {"id": "P3", "year": 113, "genre": "圖表(地圖)", "topic": "音樂季/市集會場地圖與交通資訊", "text": "[圖表題：音樂季會場地圖，標示 Satyr's Park、Fox Street、Garden Square、農夫市集、花卉市集、公車路線 No.157、Puppy Street、Koala Street 捷運站等地點與交通建議，原文為地圖圖片，PDF文字擷取僅保留註解 recommend 推薦]"}, "113-P4": {"id": "P4", "year": 113, "genre": "記敘文", "topic": "兩則關於待客小氣的幽默故事（Yan與Chang）", "text": "Yan lived a good life in a big house. One day he invited a friend to dinner at his house. However, on the dinner table there was only one small dish of one small fish.\nThe friend looked quietly at the fish. It was no bigger than a finger. Then he asked Yan if he could borrow a lamp.\n\"What for?\" Yan asked. \"Well, it's so dark in here,\" the friend said with a dry smile, \"I can't see the other delicious dishes you've prepared for me.\"\n\nChang kept a lot of ducks and chickens on his farm. One day, his best friend came to visit him. At noon, Chang told his friend that he couldn't let him stay for lunch because there wasn't much food to eat. The friend looked out at Chang's farm animals for a moment. Then he asked Chang if he had a big knife.\n\"Yes, but what for?\" Chang asked. \"I'm thinking about killing the horse I rode here so we'll have something for lunch,\" the friend said. \"But how are you going to go home without it?\" \"Well, you wouldn't mind lending me one of your many ducks or chickens so I can ride it home, would you?\""}, "113-P5": {"id": "P5", "year": 113, "genre": "說明文", "topic": "修書師傅陳彥宏(Chen Bing-Hong)與書店Cotoha的故事", "text": "Usually, people visit bookstores to buy books. But those who walk into Cotoha come to see its owner, Chen Bing-Hong. They bring him books with different problems. Some have lost their covers, some are missing a few pages, and some have pages that are falling out. Chen can always fix the books and make them whole again.\nChen sees himself as a doctor. He says that books, like people, get sick and need help. In Taiwan, there are not many \"doctors\" like him, and most of them work for big libraries and museums. If big libraries and museums are hospitals, Chen's bookstore is a health center. Big libraries and museums fix important old books with serious problems, and Chen helps people with books that have smaller problems. However, the smaller size of the problems doesn't mean Chen's job is less important.\nChen gave an example of a science book he once worked on. It was very old and half of its cover was lost. Its owner still wanted to keep it because it was a gift from a teacher who helped him follow his dream of studying science. When he got his book back, he was very surprised at the new-old book. He felt he was brought back to the days with his teacher. Seeing the owner's smile made Chen happy, because smiles like that are what his magic is for."}, "113-P6": {"id": "P6", "year": 113, "genre": "說明文", "topic": "奧地利敘利亞難民合開的餐廳 Habibi & Hawara", "text": "A Delicious Surprise and Welcome Change\nBy Karl Falk, June 1, 2016\nIn Austria, there are not many restaurants like Habibi & Hawara. Here you can enjoy Austrian and Syrian food together. Two Austrians, Martin Rohla and David Kreytenberg, started this yummy plan from their experience of working with refugees. Every year, thousands of people have to leave their homes and families because of war in their countries. So many of them go to Austria that some people in the country think they have become a problem. They are afraid refugees may take away their jobs and they don't feel safe around them, either. But Rohla and Kreytenberg would beg to differ: The refugees don't have to be a problem. They want to help them start a new life. They invited refugees to meetings and found that some of them were cooks back in Syria. So the idea of Habibi & Hawara was born—a restaurant that brings together Austrian and Syrian food. \"The two worlds far away from each other meet together,\" Kreytenberg said. But Rohla and Kreytenberg want to do more than just give the refugees work. They want their best workers to buy the restaurant in the end. They hope that Habibi & Hawara is not just a one-time plan and that other Austrians will join them and help more refugees."}, "113-P7": {"id": "P7", "year": 113, "genre": "書信/網頁貼文", "topic": "讀者對 John Smith 復活絕種動物一書的評論", "text": "VOICES OF PEOPLE\nEllen Zimmer\nIf you want to learn about bringing back extinct animals, reading John Smith's Back from the Dead is a good start. But I have to say I can't agree with everything he says.\nFrom his book, I can see Smith is an advocate of bringing extinct animals back. He says we have lost many animals because we made their living spaces too dirty. He also thinks we must do everything we can to bring them back. However, I don't know how much time and money we would need to make the world a better place for them, and honestly no one knows if they could actually come back.\nSmith also says that bringing back extinct animals may be good for us. He talks about an extinct frog that grew tadpoles in its stomach. Some women's babies die before they are born, and Smith believes bringing back the frog may be an answer to the problem. According to him, by studying how the tadpoles grow inside the frog's stomach, we might be able to find new ways to help these women successfully keep their babies. But I don't think things are as easy as Smith thinks. We have spent ten years and millions of dollars on this kind of frog, but all we have got are only a few dead frog eggs. If we can't see a real frog, how can we be sure women will get the help they need?\nDr. Solomon Wang from the Animal Saving Office says the study of bringing back extinct animals is \"throwing good money after bad.\" And he's right. A lot of hard work has been put into this expensive dream, but we haven't seen anything come out of it. So should we still keep going down this road?"}, "113-P8": {"id": "P8", "year": 113, "genre": "說明文/圖表", "topic": "1918流感大流行中社交距離措施的成效(附城市死亡率圖表)", "text": "A HISTORY LESSON ON THE PANDEMIC 2020.10.29\nSince the Covid-19 pandemic started, people have begun \"social distancing\"— keeping a safe space between you and anyone you don't live with. Though it has been a very popular topic this year, social distancing 40 . In fact, it was widely used in the U.S. in the flu pandemic in 1918. But how well did it work? The Americans' experience can tell us whether it really saved lives.\nFrom the picture, we can see that 41 started social distancing earlier than the other three cities. This helped the city keep the number of deaths down. Besides taking early action, keeping the action long enough was also important in fighting the pandemic. The picture shows that Portland and Denver did well in the first few weeks. However, both cities 42 , and the numbers of deaths climbed again.\nBut there was one thing Portland did right. The city used several ways of social distancing at the same time to deal with the pandemic. 43 , sick people were kept away from healthy ones; schools were closed; public activities were not allowed. All these were useful in keeping people safe.\nThe lessons of the 1918 pandemic bring us hope. While we are still learning to fight Covid-19, social distancing may be the best way to get us through the dark days, at least for now.\n[附有各城市死亡率隨時間變化的統計圖表，原文為圖片]"}, "112-P1": {"id": "P1", "year": 112, "genre": "圖表(菜單/優惠訊息)", "topic": "Four Seasons' Kitchen 餐廳菜單、集點兌換與營業月曆", "text": "[原始題本為菜單價目表與八月營業月曆之圖表，pdftotext僅擷取到詞彙註解「calendar 月曆」，價目與月曆表格內容因圖片排版未能完整擷取為文字。] 題目敘述：Amy went to Four Seasons' Kitchen with her mother after she collected 15 stars. They ordered two Garden Sandwiches, an Autumn Wind, and a Winter Snow. Amy wants to bring her friends to Four Seasons' Kitchen in August. She looks at her calendar to pick a time to go there."}, "112-P2": {"id": "P2", "year": 112, "genre": "公告notice/說明文", "topic": "如何協助落巢的幼鳥", "text": "[原始題本為一則提醒民眾如何處理離巢幼鳥的圖文告示，pdftotext僅擷取到詞彙註解「nest 鳥巢」「feather 羽毛」，告示本文因圖片排版未能完整擷取為文字。] 題目線索：告示內容涉及幼鳥受傷與否、羽毛多寡時應如何處理（送醫、放回巢中、聯絡動物中心等），以及親鳥對沾有人類氣味幼鳥的反應。"}, "112-P3": {"id": "P3", "year": 112, "genre": "圖表(統計圖表)", "topic": "全球食物生產各階段的浪費比例", "text": "[原始題本為比較歐洲、北美與大洋洲、南亞與東南亞三地區在食物生產五個階段(Stage 1-5)食物浪費百分比的統計圖表，pdftotext僅擷取到詞彙註解「stage 階段」「waste 浪費」「percentage 百分比」，圖表數據因圖片排版未能完整擷取為文字。]"}, "112-P4": {"id": "P4", "year": 112, "genre": "說明文", "topic": "蚊子如何在下雨時存活", "text": "Sometimes when the rain falls hard and fast on you, it might hurt a little. But what happens when it hits a mosquito? A 2012 study says when a raindrop falls on a mosquito, it's like when a bus hits a person. Besides, the little insect is hit by a raindrop about once every 20 seconds. So why don't we see many dead mosquitoes after it rains?\nA mosquito is as big as a raindrop, but it is much lighter — 0.002 g only. This saves its life in raindrop attacks. Because the mosquito is so light, when it is hit by a raindrop, it won't experience a force that is strong enough to kill it.\nThe study also found that when a mosquito is hit by a raindrop, the insect is pushed by the raindrop and falls together with it. But the mosquito doesn't get wet easily because it is covered with hairs which keep off water. After dropping about 6 cm, it will roll off the raindrop and fly away.\nHowever, this trick isn't always successful. If the mosquito flies too low when it is hit by the raindrop, it won't have time to fly off. Then it will hit the ground and meet its death.\n(force 力量)"}, "112-P5": {"id": "P5", "year": 112, "genre": "說明文/人物介紹", "topic": "貝多芬鋼琴曲《給愛麗絲》中「愛麗絲」身分之謎", "text": "You probably have heard Beethoven's famous piano piece \"For Elise,\" but do you know who \"Elise\" was?\nOne story is that Elise was Elisabeth Röckel. She once sang in Beethoven's opera Fidelio, and the two became very good friends. Beethoven called her \"Elise.\" When Röckel was leaving the city of Vienna, Beethoven wrote \"For Elise\" to say goodbye to her. Another story is that Elise was Therese Malfatti. Beethoven was in love with her. He wrote a piece for her and put \"For Therese\" on the manuscript. Malfatti kept the manuscript and left it to her family when she died. Later, a man copied the manuscript and wrote \"For Elise\" by mistake. There is another possible Elise: Elise Barensfeld. She learned the piano from Malfatti, the same Malfatti in the second story. To help Malfatti, Beethoven wrote the piece for her to use to teach Barensfeld.\nThese are just some guesses about who Elise was. We may never know the right answer.\nNo one knew about the piece until 1867, when the manuscript was found. This was 40 years after Beethoven's death, so he wasn't around to tell us who Elise was. Only one thing is for sure: \"For Elise\" will always be enjoyed.\n(opera 歌劇 manuscript 手稿)"}, "112-P6": {"id": "P6", "year": 112, "genre": "說明文", "topic": "玩具選擇與性別刻板印象", "text": "Which would you give a boy for his birthday, a toy truck or a doll? If you choose the truck, well, you're not alone. Most people think that some toys are for boys and some are for girls. We might pick building toys for boys and kitchen toys for girls. But why do we do this? Are boys and girls really born with different interests in toys?\nNo, they are not. Children start to show different interests in toys at age three, but only because at this time, they begin to learn about gender and to follow what others of their gender do. If you give a girl kitchen toys, she will think they are girls' toys because she sees other girls playing with them. But if you give a girl a toy car and show her a group of girls who are playing with cars, she'll play with the toy car and think it is a girls' toy. This \"watch and follow\" habit often becomes a rule for both boys and girls in choosing the \"right\" toys.\nHowever, this rule can be bad for children. Different toys teach children different things. Dolls help with their early language use, and building toys are good for learning math and science. By playing with different toys, children can find out what they are interested in or what they are good at. If they only play one kind of toy, they may lose this important chance. They may also get a wrong idea about what boys or girls are able to do. Some doctors worry that children may use the same kind of thinking when they look for jobs in the future. If they do, they may miss something more important than just getting a chance to play with different toys. They may miss many, perhaps better, chances in life.\n(gender 性別)"}, "112-P7": {"id": "P7", "year": 112, "genre": "記敘文/人物傳記", "topic": "戰地記者Marie Colvin的生平", "text": "Marie Colvin was a world-famous war reporter. She was born in New York, USA, in 1956 and died in Homs, Syria, in 2012. When she was a student at Yale University, Colvin decided that she wanted to be a reporter in the future. She joined the Sunday Times, a UK newspaper, in 1985 and soon became its Middle East reporter. Besides the Middle East, she also reported from other parts of the world: Chechnya, Kosovo and Sri Lanka, for example. When she was reporting on the war in Sri Lanka, she lost her left eye. But that never stopped her. She still went to dangerous places that few reporters wanted to visit and stayed when others left.\nColvin showed great empathy in her stories. For her, war reporting was not just some quick interviews and a few photos. She wrote about real people and their real lives. Her writing made you feel so strongly about these people's stories, just like they were your own. She hoped that through her work the world would understand what really happened in war, and would take action to stop the fighting.\nOn February 22, 2012, the day after she gave her report on the war in Homs, Colvin was killed when the house she was staying in was attacked. She always knew what price a war reporter might have to pay. She already lost an eye before. This time, she gave her life to the work she could not give up — telling the true stories to the world.\n(war 戰爭)"}, "112-P8": {"id": "P8", "year": 112, "genre": "網頁貼文/書評", "topic": "《Speaking American》一書談美式英語各地用詞差異", "text": "Speaking American is a great book! Lucia Leisure ★★★★★\nI just love Josh Katz's new book! It's about ___(42)___ in different parts of the US. The information in the book was collected from the quiz that Katz built on the website in 2013. The quiz asked what words people use for something, and their answers showed interesting facts. For example, there are different names for sports shoes. In most parts of the US, people say \"tennis shoes.\" In the northeast of the country, people wear \"sneakers.\" In some towns, \"tennis shoes\" and \"sneakers\" become \"gym shoes.\"\nThe use of words tells us where people are from, like Katz's book says. But in my experience, it also shows ___(43)___. My family has lived in New York since my grandparents. It's not surprising that I say \"sneakers.\" But my grandfather says \"plimsolls,\" and my daughter says \"kicks\" or \"vans.\" Maybe Katz can study this difference for his next book.\n(website 網站)"}, "111-P1": {"id": "P1", "year": 111, "genre": "廣告DM", "topic": "Tea-Rock 20週年紀念明信片", "text": "(此篇為圖像式明信片廣告，原始PDF文字抽取僅保留註解 \"address 地址\"，明信片圖片內容未能以純文字擷取。內容大意：Tea-Rock茶飲品牌慶祝其20週年，並附上一張要寄給Tea-Rock 20的明信片圖樣，圖上有杯子圖案及待填寫的個人資料欄位。)"}, "111-P2": {"id": "P2", "year": 111, "genre": "圖表(統計圖)", "topic": "糖分攝取資訊圖表 (infographic)", "text": "Below is an infographic. (此篇為資訊圖表(infographic)，內容以圖像呈現各種食物/飲料中隱藏的糖分含量比較，原始PDF文字抽取僅保留說明文字 \"Below is an infographic.\" 及註解 \"infographic 資訊圖表\"，圖表數據本身未能以純文字擷取。)"}, "111-P3": {"id": "P3", "year": 111, "genre": "對話", "topic": "Darrell建議Marina使用Pinterest尋找靈感", "text": "Darrell: Marina…Marina…MARINA!\nMarina: Oh, sorry. I didn't hear you. I was thinking about my homework.\nDarrell: What's it about?\nMarina: Well, I need to draw a future house for my art class, but I haven't got any ideas. Maybe I should go to the library and look for something useful.\nDarrell: Or you can try Pinterest.\nMarina: Isn't it a shopping app?\nDarrell: Not really. Many people share their works on Pinterest and tell you how they made them. I'm sure you can get some ideas there.\nMarina: Sounds like you use it often.\nDarrell: Yeah. Just last week I went there and found the A to Z of making chocolate cake—from choosing good chocolate to baking the cake to making sugar flowers on top.\nMarina: Really? I'll check it out later. Thanks a lot."}, "111-P4": {"id": "P4", "year": 111, "genre": "說明文", "topic": "Tabata訓練法介紹", "text": "Tabata training is a very popular way of exercising these days. It doesn't take much time or space, and it burns calories faster than other ways of exercising. The idea of Tabata training is simple: exercise for 20 seconds, rest for 10 seconds, and then repeat (at least eight times). The moves for the 20-second exercise are not difficult to learn. Jumping jacks, high knees, squats, and planks are some of the most common moves. You can decide yourself what moves to do in your Tabata training. For example, you can do more leg exercises if you want strong legs.\n\nOne great thing about Tabata training is that your body will keep burning calories for at least an hour after 4 minutes of Tabata training. But to have this wonderful \"afterburn,\" you need to exercise really hard during each 20 seconds. If you seldom exercise or have heart problems, this exercise may not be good for you. But for people who enjoy exercising but are too busy to go to the gym, Tabata training might just be the answer.\n\n(calorie 卡路里(熱量單位); paragraph 段落)"}, "111-P5": {"id": "P5", "year": 111, "genre": "說明文", "topic": "無加班日(No Overtime Day)與長工時問題報導", "text": "The problem of long working hours is a real headache in our country. It kills many people every year (see Figure 1), and many companies are trying to change that. They have at least one \"No Overtime Day\" in a week, and it is often Wednesday. On \"No Overtime Day,\" workers are asked to leave their offices before 8 p.m. At 8 p.m., companies play the song \"There's Always Tomorrow\" and turn off all the lights.\n\nHowever, after the workers walk out of their offices, they don't go home. Some go back later, turn on their table lamps, and keep working, and others find somewhere else to work until very late at night. Restaurants and coffee shops are busier on Wednesday evenings, and they have started selling drinks and meals for these workers.\n\nBut why do these people keep working? A study shows that workers who work more hours often have a bigger chance to get paid more and rise higher in their companies. This is true for both men and women (see Figure 2). Working long hours has become a way to show that people are hard-working. Clearly, this must be changed before the problem gets any worse.\n\n(Figure 1, Figure 2 為圖表，原始資料未能以純文字擷取; average 平均)"}, "111-P6": {"id": "P6", "year": 111, "genre": "說明文(網頁新聞報導)", "topic": "喀麥隆(Cameroon)的語言與權力問題", "text": "http://www.aab.com/news/language-and-power-756315\nLanguage and Power: Cameroon's Story\nBy Elisa Grant, 2 Oct 2017\n\nIn the modern world, being able to speak English is often a way to get power. However, this is not true for English speakers in Cameroon. To know why things are different in this African country, we need to go back one hundred years.\n\nIn 1919, Kamerun (the name of Cameroon at the time) was cut into two parts: one belonged to France, and the other belonged to the UK. In 1960, the French Cameroon became the Republic of Cameroun, and the UK's part joined it in 1961. The new country changed its name to the Federal Republic of Cameroon. Although both French and English are Cameroon's official languages, only around 20% of its people speak English. Also, the government has been in French speakers' hands since the two parts became one country.\n\nFor a long time, Cameroon's English speakers have felt they are not welcome in their own country. For example, it is very difficult for them to find jobs in the government, and they are often asked to speak French in business and at official events. They have become more resentful at the government and decided to fight for themselves. Since last year, the English speakers have tried to build their own country. Yesterday, they said in a public meeting that they were not part of Cameroon anymore. They are now a new country, \"Ambazonia.\" When the police tried to stop the meeting, at least eight people were killed.\n\nRead more\n\n(official 官方的; government 政府)"}, "111-P7": {"id": "P7", "year": 111, "genre": "說明文(旅遊步道介紹)", "topic": "Southend步道健行旅遊介紹", "text": "THE SOUTHEND TRAIL has been popular with nature lovers for years. The 120-km trail passes beautiful lakes, crosses rivers, and goes through mountains and hills. This gives bird lovers some of the best places for birdwatching. The trail also takes you to the Southend Museum and to two famous castles, Edward Castle and Sloan Castle.\n\nIt's best to plan one day for one part of the trail and start your hike early in the morning, because each part takes at least seven hours. If you don't want to walk, you can bike, but make sure you stay on the main trail, because the side trails are not wide enough for biking.\n\nThere are two types of lodging for visitors. Camping is popular in summer, but it is only allowed on a few campgrounds (see the map). A more comfortable one is to stay at a hotel in one of the towns. You can find some very nice ones that also have breakfast.\n\n(trail 步道; recommend 推薦)\n(附有步道地圖，標示Parts 1, 2, 2a, 3, 4, 4a及Cove等地點，原始地圖圖像未能以純文字擷取。)"}, "111-P8": {"id": "P8", "year": 111, "genre": "說明文", "topic": "回文(palindromes)與變位詞(anagrams)", "text": "English words are made of 26 letters, and palindromes and anagrams are two kinds of word games about spelling. A palindrome is a word or a sentence that reads the same from left to right or from right to left, 40 , \"eye,\" \"Bob,\" \"my gym,\" and \"Was it a car or a cat I saw?\" An anagram of a word or words is made by putting the letters of the word or words in a different way. Look at the words and their anagrams below. Can you think of other possible anagrams of these words?\n\nAnagrams are often longer words that don't really mean anything but are fun to say. Sometimes they can even mean something 42 , like when a common word, \"restaurant,\" becomes \"Eat rats, run!\"\n\nActually, palindromes and anagrams are 43 . Palindromes can be used to learn mathematics and make music. Anagrams are also a good way to hide something. In history, people often hid their important studies in anagrams. Can you think of any other way to use them?"}, "110-P1": {"id": "P1", "year": 110, "genre": "廣告DM", "topic": "e-BeautiMed 線上商店集點優惠活動", "text": "We've prepared many wonderful surprises for you at e-BeautiMed, BeautiMed's online store!\n\nSurprise 1\nJoin \"BeautiMed Friend\" online for free and get 2000 BeautiMed points!\n\nSurprise 2\nAlready a \"BeautiMed Friend\"? Come collect your free gift by entering your \"BeautiMed Friend\" card number at e-BeautiMed before 8/31.\n\nSurprise 3\nGet 500 BeautiMed points by shopping at e-BeautiMed and you'll get 500 more points if you spend more than $1,000.\n\nSurprise 4\nShop at e-BeautiMed during 7/1-8/31 and you may win $5,000 or free movie tickets!\n\nSurprise 5\nInvite a friend to join \"BeautiMed Friend\" and you both can get 1000 points each!"}, "110-P2": {"id": "P2", "year": 110, "genre": "對話", "topic": "Joey 與 Lynn 討論 Caldron 餐廳的火鍋用餐經驗", "text": "Joey: Lynn, have you tried Caldron? I've heard that restaurant is good.\nLynn: I have. I went there once for Tom's party.\nJoey: And?\nLynn: Well, I never thought I would have to cook for myself when eating out.\nJoey: But it's fun to cook your own food.\nLynn: I don't see any fun in that. Besides, I want nice food.\nJoey: So you didn't like the food there?\nLynn: Everything tasted the same. I mean, they were all cooked in the same boiling pot. How could they taste different? I just kept throwing strange things into the pot. I didn't even know what half the things were made of.\nJoey: Don't worry. Everything should be safe to eat after a hot bath in the pot. And you didn't get sick after that, right? Besides, you tried something different there. Still a good experience, I think?\nLynn: I don't think we share the same idea of good experiences."}, "110-P3": {"id": "P3", "year": 110, "genre": "記敘文", "topic": "Katie 的日記：關於綿羊 Woollie 的故事", "text": "Dear Diary, June 7, 2011\nI was very sad to hear what happened to Woollie yesterday. Woollie was my favorite sheep. I have a storybook about Woollie. It says when Woollie was four, he ran away from Mr. Armstrong's farm, and it took Mr. Armstrong six years to find Woollie. But Woollie had grown so much fleece that he didn't even look like a sheep. Mr. Armstrong decided to cut his fleece on TV so everyone could see. Daddy said this happened on the day I was born. Woollie's fleece weighed 27 kg, and could make clothes for 20 large men. I asked Daddy if his favorite vest was made from Woollie's fleece. Daddy said no, because Woollie's fleece was sold to collect money for sick kids. In the storybook, Woollie was taken to see Ms. Stella Clark, the leader of our city then. They even had tea together. Daddy said Woollie did meet Ms. Clark, but he wasn't sure if they had tea. Daddy said Woollie was put down because he was too sick and there was no way to help him. I cried. I hope Woollie will be happy up there in the sky.\n(fleece 羊毛 weigh 重達)"}, "110-P4": {"id": "P4", "year": 110, "genre": "說明文", "topic": "介紹馬諦斯的名畫《鋼琴課》", "text": "Here's The Piano Lesson, one of Henri Matisse's most famous paintings. The boy in the picture is the painter's son, Pierre. In the picture, Pierre looks quite serious. Why? Well, look at the yellow candle on the red piano. It's almost burned down. So maybe Pierre has already practiced for hours. And Matisse uses a lot of gray, not a very fun color, right? It shows how the poor kid feels, don't you think?\nOn the top right corner, you can see a woman sitting straight on a seat. Is she Pierre's piano teacher? Or his mother? Well, if you're a Matisse fan, you'll know this is in fact another painting by him, Woman on a High Stool. Interesting, right? Matisse likes to do that a lot. In fact, there's another work by Matisse in the picture. Did you find it? Right! The sculpture on the bottom left corner!\nMatisse painted this picture in 1916. Pierre was already 16 then, but the artist painted his son much younger than he really was. Pierre had gone away to be a soldier, and Matisse didn't know whether he would come back. Maybe this is a worried father's way to remember the good old days.\n(sculpture 雕像)"}, "110-P5": {"id": "P5", "year": 110, "genre": "說明文", "topic": "教師節的由來與歷史演變", "text": "On Teachers' Day, we thank our teachers for their hard work. We also celebrate this day to remember Confucius, the great Chinese teacher from 2,500 years ago. Well, that's everything we're taught about Teachers' Day. But, the first Teachers' Day was not on Confucius's birthday, and it was not about thanking our teachers.\nIn 1930, Mr. Tai Shuang-qiu and other teachers celebrated the first Teachers' Day in Nanjing. But there was nothing to celebrate. Teachers were paid very little and not respected. These teachers took this chance to shout out their problems. They had Teachers' Day on June 6 because the date was easy to remember and near the end of the school year. This action by Mr. Tai and the other teachers was welcomed and followed by teachers from other cities. In 1939, the government made Teachers' Day a national holiday. However, it was on August 27, the day when Confucius's birthday was celebrated. Not everyone hailed this decision: Teachers' Day was never about Confucius, and Confucius couldn't speak for all the teachers either.\nOne funny thing was that the government was wrong about the date of Confucius's birthday. In 1952, people found out he was in fact born on September 28. That was when we started to celebrate Teachers' Day on Confucius's real birthday.\n(respect 尊敬 government 政府)"}, "110-P6": {"id": "P6", "year": 110, "genre": "公告通知", "topic": "國家寶島鐵路因颱風改道公告信件", "text": "Dear Traveler,\nYou have bought an NFR ticket online for a train that runs between White Water City and Cloud City. We are sorry to tell you that, because of the typhoon last month, the Sand Town – Spring Town line will be closed between August 14 and 28 2016. During this time, some trains will change lines and will not stop at a few stations. There will be free buses to take travelers to these stations. Please check below for the changes. Visit http://www.nfr.gov/ for more information.\nWe wish you a nice summer.\nLena Muller\nNational Formosa Railway\n\n1. Trains that run between Green City and Cloud City will take the Smoke Town – Spring Town line, and will stop at every station. Below are the trains that will change lines:\nGoing South: RL101 White Water City -> Cloud City; RL102 White Water City -> Spring Town; RL103 Green City -> Cloud City\nGoing North: RL201 Spring Town -> Green City; RL202 Cloud City -> Green City\n2. The free buses for the Sand Town – Spring Town line will wait at Green City (going south) and Spring Town (going north) stations. No stop at Gray Village.\n(Stations on the Sand Town - Spring Town line, north to south: Spring Town, Hill Town, Black Town, Gray Village, Sand Town; other stations: White Water City, Green City, Smoke Town, Cloud City)\n(line 路線)"}, "110-P7": {"id": "P7", "year": 110, "genre": "說明文", "topic": "敘利亞 Darayya 地下祕密圖書館", "text": "SYRIA - Darayya\nIn Darayya, a city in Syria, there's a library, and it has 15,000 books on almost every subject you can think of. However, it is different from any libraries you know: It is a secret underground library, and only people in Darayya know where it is.\nOver the years, war has shaken Darayya badly. Every day, houses are bombed and people are killed. Stores are closed one after another, and so are schools. To help the kids in Darayya with their learning, Anas Ahmad, a 19-year-old student, and his friends decided to build a library. They built the library under the ground to keep it safe from bombing. But it is dangerous to collect books for the library. Often, Ahmad and his friends look for books in houses that were bombed. They need to be careful because they may be killed in another bombing.\nYou may ask, \"In a place like Darayya, would people be interested in books?\" \"Just like the body needs food, the mind needs books,\" says one library user. In the library, people enjoy their time of reading and forget about the terrible world above, so their life doesn't seem so hard. Through reading, they are able to dream of a better life after war.\n(war 戰爭 bomb 轟炸 seem 彷彿)"}, "110-P8": {"id": "P8", "year": 110, "genre": "書信email", "topic": "Mia Loren 寄給 Dave Doddo 關於兒子生日派對的邀請信", "text": "From: Mia Loren <mloren@qmail.com>\nTo: Dave Doddo <dd1225@qmail.com>\nDate: Tue, Oct 24, 2017 at 10:01 AM\nSubject: Daniel's 5th Birthday Party – This Saturday!\n\nHello Dave,\nWe're happy to invite you and your family to Daniel's fifth birthday party this Saturday.\nWe know we told you that the party would be in  35 . However, we just moved to Carlton City last month, so the party won't be in Pattersons Town. It'll be at Mosman Garden right next to Victor Zoo, just across from our new apartment. Please don't go to Northbank Park next to our old house.\nThe weather report said that it may be rainy this weekend, but  36 . If it rains, we'll move the party inside our home. However, if we're  37  and it is fine, we'll still have the party at the garden.\nAgain, we're all very happy and excited to welcome you to join us for some fun this weekend!\nBest, Mia, Sam & Daniel"}, "110-P9": {"id": "P9", "year": 110, "genre": "記敘文", "topic": "夜晚穿越公園時因誤會而受到驚嚇的故事", "text": "Usually I wouldn't cross the park at this time of night. But walking around the park would take more time, and it was raining so hard that I couldn't even see clearly what was right before me. So I entered the park. And that was the first stupid thing I did tonight. Soon after I walked into the park, I saw a man under a tree up ahead. My heart fell. The stories I'd heard about the park  38  into my head at this moment. Anyone with a clear mind would just turn back. But me? No. I did  39  stupid thing: I decided to hurry past him. Just when I was passing the man, he raised his head and gave me the strangest smile ever. I got scared and started running. \"Hey!\" the man shouted from behind. \"Wait!\" He was running after me! I ran like crazy. I had hoped the trees would keep some rain off. And they  40 . But they also made the park look even darker. I couldn't see what was ahead of me. Then, I ran into something. It was the ": "According to the reading, which is one of the reasons for food waste?", "options": {"A": "Stores do not know how to pack food well.", "B": "Farmers do not have enough machines to collect food.", "C": "There is no refrigerator on the truck to keep food fresh.", "D": "Factories do not have enough trucks to carry food to stores."}, "answer": "C", "img": true}, {"id": "R112-29", "year": 112, "no": 29, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "112-P3", "stem": "Which is true about food waste at each stage in the three parts of the world?", "options": {"A": "For each area, the highest percentage of food waste happens at Stage 5.", "B": "Europe has a lower percentage of food waste at Stage 3 than the other two areas.", "C": "North America & Oceania has a higher percentage of food waste at Stage 1 than Europe.", "D": "South & Southeast Asia has a higher percentage of food waste at Stage 4 than the other two areas."}, "answer": "D", "img": true}, {"id": "R112-30", "year": 112, "no": 30, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "112-P4", "stem": "What is the trick that the mosquito uses in rain?", "options": {"A": "It shakes its body fast enough to get water off.", "B": "It drops with the raindrop and then rolls off it.", "C": "It flies behind the raindrop and pushes it away.", "D": "It rides on the raindrop and lands on the ground."}, "answer": "B", "img": false}, {"id": "R112-31", "year": 112, "no": 31, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "112-P4", "stem": "What keeps a mosquito safe in the rain?", "options": {"A": "It is very light.", "B": "It has no body hairs.", "C": "It is as big as a raindrop.", "D": "It is strong enough to fight the force of a raindrop."}, "answer": "A", "img": false}, {"id": "R112-32", "year": 112, "no": 32, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "112-P4", "stem": "When would it be dangerous for a mosquito in the rain?", "options": {"A": "When it flies too close to the ground.", "B": "When the rain falls too hard and too fast.", "C": "When it is hit by raindrops too many times.", "D": "When it drops for more than 6 cm in the rain."}, "answer": "A", "img": false}, {"id": "R112-33", "year": 112, "no": 33, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "112-P5", "stem": "What do the three stories in the reading all talk about?", "options": {"A": "Who Beethoven's true love was.", "B": "Who played \"For Elise\" the best.", "C": "How \"For Elise\" became popular.", "D": "Why Beethoven wrote \"For Elise.\""}, "answer": "D", "img": false}, {"id": "R112-34", "year": 112, "no": 34, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "112-P5", "stem": "What do we know about \"For Elise\" from the reading?", "options": {"A": "It first appeared in the opera Fidelio.", "B": "The true \"Elise\" was Elise Barensfeld.", "C": "The manuscript was found after Beethoven died.", "D": "The manuscript is now kept by the city of Vienna."}, "answer": "C", "img": false}, {"id": "R112-35", "year": 112, "no": 35, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "112-P5", "stem": "What can we learn about the three women from the stories?", "options": {"A": "They were called \"Elise\" by their friends.", "B": "Elisabeth Röckel was a close friend of Beethoven's.", "C": "Therese Malfatti changed \"For Elise\" to \"For Therese.\"", "D": "Elise Barensfeld was Beethoven's student."}, "answer": "B", "img": false}, {"id": "R112-36", "year": 112, "no": 36, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "112-P6", "stem": "What idea does the reading talk about?", "options": {"A": "Not all kinds of toys are helpful for children's learning.", "B": "Parents should give their children the right toys for their age.", "C": "Children should learn about their gender from playing with toys.", "D": "We should not let gender decide which toys children can play with."}, "answer": "D", "img": false}, {"id": "R112-37", "year": 112, "no": 37, "section": "題組", "type" at are needed for art classes.", "C": "To meet new friends who have the same interests.", "D": "To share her works and tell people how they are made."}, "answer": "A", "img": false}, {"id": "R111-26", "year": 111, "no": 26, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "111-P3", "stem": "What does it mean when you learn something from A to Z?", "options": {"A": "You can learn it at any time.", "B": "You learn it in a baking class.", "C": "You learn everything about it.", "D": "You spend all your life learning it."}, "answer": "C", "img": false}, {"id": "R111-27", "year": 111, "no": 27, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "111-P4", "stem": "Which idea is talked about in the first paragraph of the reading?", "options": {"A": "How you should do Tabata training.", "B": "What is the best time for Tabata training.", "C": "Who first had the idea of Tabata training.", "D": "How often you should do Tabata training."}, "answer": "A", "img": false}, {"id": "R111-28", "year": 111, "no": 28, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "111-P4", "stem": "Who might find that Tabata training is right for them?", "options": {"A": "People who enjoy team sports.", "B": "People who want to start exercising.", "C": "People who want to fix their heart problems.", "D": "People who already have a habit of exercising."}, "answer": "D", "img": false}, {"id": "R111-29", "year": 111, "no": 29, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "111-P4", "stem": "Which is true about Tabata training?", "options": {"A": "It is difficult to learn the moves.", "B": "You are free to choose your own moves.", "C": "You need a large space to do the exercises.", "D": "You cannot rest between moves if you want the afterburn."}, "answer": "B", "img": false}, {"id": "R111-30", "year": 111, "no": 30, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "111-P5", "stem": "There are four important points in the report: a. What \"No Overtime Day\" is  b. Why const R = QB.reading, L = QB.listening||[], PS = QB.passages, YEARS = QB.meta.years;
const TYPEICON = {'字彙':'🔤','語法':'🧩','語意':'💡','閱讀理解':'📖','閱讀測驗':'📖','聽力':'🎧',
  '詞彙':'🔤','綜合測驗':'🧩','文意選填':'📝','篇章結構':'🧱'};
const TI=t=>TYPEICON[t]||'📘';
const TYPEORDER = ['字彙','詞彙','語法','語意','綜合測驗','文意選填','篇章結構','閱讀理解','閱讀測驗'];
const AUDIOYEARS = QB.meta.audioYears || [];
const usableR = R.filter(q=>!q.img);
const usableL = L.filter(q=>!q.img && AUDIOYEARS.includes(q.year));
const TYPES = [...new Set(usableR.map(q=>q.type))].sort((a,b)=>{
  const ia=TYPEORDER.indexOf(a),ib=TYPEORDER.indexOf(b); return (ia<0?99:ia)-(ib<0?99:ib);});

/* ---------- storage ---------- */
const LS='cap_qb_v1';
let S = load();
function load(){ try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return{}} }
function save(){ try{localStorage.setItem(LS,JSON.stringify(S))}catch(e){} }
S.rec = S.rec||{};        // id -> {correct:bool, n:times}
S.wrong = S.wrong||[];    // ids currently wrong
S.fav = S.fav||[];        // 收藏的題目 id
S.daily = S.daily||{};    // dateStr -> true（當天完成每日一練）
S.settings = S.settings||{dark:'auto',immediate:true};
if(S.settings.examDate===undefined)S.settings.examDate='';
applyTheme();

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pct(a,b){return b?Math.round(a/b*100):0}
function markAns(q,pick){
  const ok = pick===q.answer;
  S.rec[q.id]={correct:ok,n:(S.rec[q.id]?.n||0)+1};
  const set=new Set(S.wrong);
  if(ok) set.delete(q.id); else set.add(q.id);
  S.wrong=[...set]; save();
  return ok;
}
function passageOf(q){ return q.pkey?PS[q.pkey]:null }
const ALLQ = usableR.concat(usableL);
const byId = Object.fromEntries(R.concat(L).map(q=>[q.id,q]));
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dayDiff(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function streak(){ let s=0,d=new Date(); for(;;){const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); if(S.daily[k]){s++;d.setDate(d.getDate()-1);}else{ if(k===todayStr()){d.setDate(d.getDate()-1);continue;} break;}} return s; }
function isFav(id){ return S.fav.includes(id); }
function toggleFav(id){ const i=S.fav.indexOf(id); if(i<0)S.fav.push(id); else S.fav.splice(i,1); save();
  const b=document.getElementById('favBtn'); if(b)b.className='iconbtn'+(isFav(id)?' faved':''); }
function examCountdown(){ const dt=S.settings.examDate; if(!dt)return null; const n=dayDiff(todayStr(),dt); return n; }

/* ---------- nav ---------- */
function go(v){
  ['home','run','result','diagnose','wrong','fav','settings'].forEach(x=>$('#v-'+x).classList.toggle('hidden',x!==v));
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  $('#nav').classList.toggle('hidden', v==='run'||v==='result');
  if(v==='home')renderHome();
  if(v==='diagnose')renderDiagnose();
  if(v==='wrong')renderWrong();
  if(v==='fav')renderFav();
  if(v==='settings')renderSettings();
  window.scrollTo(0,0);
}

/* ---------- home ---------- */
function renderHome(){
  const done=Object.keys(S.rec).length;
  const corr=Object.values(S.rec).filter(x=>x.correct).length;
  const cd=examCountdown(); const st=streak(); const todayDone=!!S.daily[todayStr()];
  const cdBanner = cd!=null ? `<div class="cd ${cd<0?'past':''}" onclick="go('settings')">
     <div class="cdi">${cd<0?'🎓':'📅'}</div>
     <div><b>${cd>0?`距離考試還有 ${cd} 天`:cd===0?'今天就是考試日，加油！':`考試已過 ${-cd} 天`}</b>
     <small>${esc(S.settings.examDate)}${cd>0?'　每天練一點，穩紮穩打':''}</small></div></div>` : '';
  $('#v-home').innerHTML=`
   ${cdBanner}
   <div class="stats">
     <div class="stat"><b>${done}</b><span>已作答</span></div>
     <div class="stat"><b>${pct(corr,done)}%</b><span>答對率</span></div>
     <div class="stat"><b>${S.fav.length}</b><span>收藏題</span></div>
   </div>
   <button class="mode wide daily ${todayDone?'ok':''}" onclick="startDaily()">
     <div class="mi">${todayDone?'✅':'☀️'}</div>
     <div><div class="mt">每日一練　${st>0?`🔥 ${st} 天`:''}</div>
       <div class="md">${todayDone?'今天已完成，明天再來保持連勝！':'15 題精選（優先錯題與新題），養成每天練習'}</div></div></button>
   <div class="sect">📝 整卷模擬考（計時）</div>
   <div class="picker">
     ${YEARS.map(y=>`<button class="pbtn" onclick="startExam(${y})">${y} 年<small>閱讀 ${usableR.filter(q=>q.year===y).length} 題</small></button>`).join('')}
   </div>
   <div class="sect">🎯 題型專練</div>
   <div class="modes">
     ${TYPES.map(t=>`<button class="mode" onclick="startType('${t}')"><div class="mi">${TI(t)}</div><div class="mt">${t}</div><div class="md">${usableR.filter(q=>q.type===t).length} 題 · 即時對答</div></button>`).join('')}
     ${usableL.length?`<button class="mode" onclick="startListen()"><div class="mi">🎧</div><div class="mt">聽力</div><div class="md">${usableL.length} 題 · 官方音檔（${AUDIOYEARS.join('・')}）</div></button>`:''}
     <button class="mode" onclick="startWrongPractice()"><div class="mi">🔁</div><div class="mt">錯題複習</div><div class="md">${S.wrong.length} 題待清</div></button>
     <button class="mode" onclick="go('fav')"><div class="mi">⭐</div><div class="mt">我的收藏</div><div class="md">${S.fav.length} 題 · 重點再練</div></button>
   </div>
   <div class="sect">📊 診斷</div>
   <button class="mode wide" onclick="go('diagnose')"><div class="mi">📈</div><div><div class="mt">弱點診斷</div><div class="md">看各題型／各年答對率，一鍵補強最弱項</div></div></button>
   <p style="text-align:center;color:var(--sub);font-size:.7rem;margin-top:18px">${esc(QB.meta.source)} · 離線可用 · 進度存本機</p>`;
}

/* ---------- session engine ---------- */
let sess=null;  // {list, i, mode, picks:{}, timed, t0, timerId, title}
function startExam(y){
  const list=usableR.filter(q=>q.year===y).sort((a,b)=>a.no-b.no);
  sess={list,i:0,mode:'exam',picks:{},timed:true,t0:Date.now(),title:`${y} 年 · 整卷閱讀模擬`};
  startTimer(); go('run'); drawRun();
}
function startType(t){
  const list=shuffle(usableR.filter(q=>q.type===t));
  sess={list,i:0,mode:'practice',picks:{},timed:false,title:`題型專練 · ${t}`};
  go('run'); drawRun();
}
function startListen(){
  const list=shuffle(usableL);
  sess={list,i:0,mode:'listen',picks:{},timed:false,title:'聽力練習'};
  go('run'); drawRun();
}
function startWrongPractice(){
  if(!S.wrong.length){alert('目前沒有錯題，先去練習吧！');return;}
  const set=new Set(S.wrong);
  const list=shuffle([...usableR,...usableL].filter(q=>set.has(q.id)));
  sess={list,i:0,mode:'practice',picks:{},timed:false,title:'錯題複習'};
  go('run'); drawRun();
}
function startFav(){
  if(!S.fav.length){alert('還沒有收藏題目。作答時點右上角 ⭐ 就會收藏。');return;}
  const set=new Set(S.fav);
  const list=shuffle(ALLQ.filter(q=>set.has(q.id)));
  sess={list,i:0,mode:'practice',picks:{},timed:false,title:'我的收藏'};
  go('run'); drawRun();
}
const DAILY_N=15;
function startDaily(){
  const wrongSet=new Set(S.wrong);
  const wrong=usableR.filter(q=>wrongSet.has(q.id));
  const unseen=usableR.filter(q=>!S.rec[q.id]&&!wrongSet.has(q.id));
  const seen=usableR.filter(q=>S.rec[q.id]&&!wrongSet.has(q.id));
  const list=[...shuffle(wrong).slice(0,6),...shuffle(unseen),...shuffle(seen)].slice(0,DAILY_N);
  if(!list.length){alert('題目都練完了，太厲害了！');return;}
  sess={list:shuffle(list),i:0,mode:'practice',picks:{},timed:false,title:'每日一練',daily:true};
  go('run'); drawRun();
}
let timerId=null;
function startTimer(){ stopTimer(); timerId=setInterval(()=>{const el=$('#timer');if(el)el.textContent=fmtT(Date.now()-sess.t0)},1000); }
function stopTimer(){ if(timerId)clearInterval(timerId); timerId=null; }
function fmtT(ms){const s=Math.floor(ms/1000);return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

function drawRun(){
  const q=sess.list[sess.i]; if(!q){finish();return;}
  const isL=sess.mode==='listen'||q.id[0]==='L';
  const p=passageOf(q);
  const picked=sess.picks[q.id];
  const answered=picked!=null;
  const immediate=sess.mode!=='exam';
  const audio = isL ? `<div class="audio"><button onclick="playAudio('${q.year}',${q.no})">▶</button><div class="lab">播放官方音檔<small>${q.year} 年 · 第 ${q.no} 題（${esc(q.part||'')}）</small></div></div>` : '';
  const passage = (p && !isL) ? `<div class="passage"><div class="pg">📄 ${esc(p.genre)}｜${esc(p.topic)}</div>${esc(p.text)}</div>` : '';
  const tag = isL ? `<span class="tag">🎧 聽力</span>` : `<span class="tag">${TYPEICON[q.type]||''} ${esc(q.type)}</span>`;
  const stem = q.stem ? `<div class="stem">${esc(q.stem)}</div>` : (isL?'<div class="stem" style="color:var(--sub)">請聽音檔作答</div>':'');
  const opts=Object.entries(q.options||{}).filter(([k,v])=>v!=null).map(([k,v])=>{
    let cls='opt';
    if(answered){
      if(k===q.answer)cls+=' correct';
      else if(k===picked)cls+=' wrong';
    } else if(k===picked) cls+=' sel';
    return `<button class="${cls}" ${answered?'disabled':''} onclick="pick('${k}')"><span class="k">${k}</span><span class="v">${esc(v)}</span></button>`;
  }).join('');
  let fb='';
  if(answered && immediate){
    const ok=picked===q.answer;
    fb=`<div class="fb ${ok?'ok':'no'}">${ok?'✅ 答對了！':'❌ 正解是 '+q.answer+'．'+esc(q.options[q.answer]||'')}</div>`;
  }
  $('#v-run').innerHTML=`
    <div style="display:flex;align-items:center">
      <button class="back" onclick="quitRun()" style="flex:1;text-align:left">‹ 結束</button>
      <button class="iconbtn${isFav(q.id)?' faved':''}" id="favBtn" onclick="toggleFav('${q.id}')" title="收藏">★</button>
    </div>
    <div class="qhead">
      <div class="prog"><i style="width:${(sess.i+1)/sess.list.length*100}%"></i></div>
      <div class="cnt">${sess.i+1}/${sess.list.length}</div>
      ${sess.timed?`<div class="timer" id="timer">${fmtT(Date.now()-sess.t0)}</div>`:''}
    </div>
    <div style="font-weight:800;font-size:.8rem;color:var(--sub);margin-bottom:8px">${esc(sess.title)}</div>
    ${audio}${passage}
    <div>${tag}</div>${stem}
    <div class="opts">${opts}</div>
    ${fb}
    <div class="foot"><div class="in">
      ${sess.i>0?'<button class="btn ghost" onclick="prevQ()">‹ 上一題</button>':''}
      <button class="btn" id="nextBtn" ${(!answered&&sess.mode!=='exam')?'disabled':''} onclick="nextQ()">${sess.i+1<sess.list.length?(sess.mode==='exam'?'下一題 ›':'下一題 ›'):'交卷／看結果'}</button>
    </div></div>`;
}
function pick(k){
  const q=sess.list[sess.i];
  if(sess.picks[q.id]!=null && sess.mode!=='exam') return;
  sess.picks[q.id]=k;
  if(sess.mode!=='exam'){ markAns(q,k); }
  drawRun();
}
function nextQ(){ if(sess.i+1<sess.list.length){sess.i++;drawRun();}else finish(); }
function prevQ(){ if(sess.i>0){sess.i--;drawRun();} }
function quitRun(){ if(sess.mode==='exam'&&Object.keys(sess.picks).length&&!confirm('離開會結束這次模擬考，確定？'))return; stopTimer(); go('home'); }

function finish(){
  stopTimer();
  // exam mode: grade all now
  if(sess.mode==='exam'){ sess.list.forEach(q=>{ if(sess.picks[q.id]!=null) markAns(q,sess.picks[q.id]); }); }
  if(sess.daily && Object.keys(sess.picks).length){ S.daily[todayStr()]=true; save(); }
  const list=sess.list, picks=sess.picks;
  const done=list.filter(q=>picks[q.id]!=null);
  const corr=done.filter(q=>picks[q.id]===q.answer);
  // by type
  const byType={};
  list.forEach(q=>{const t=q.id[0]==='L'?'聽力':q.type;byType[t]=byType[t]||[0,0];if(picks[q.id]!=null){byType[t][1]++;if(picks[q.id]===q.answer)byType[t][0]++;}});
  const wrongList=list.filter(q=>picks[q.id]!=null&&picks[q.id]!==q.answer);
  const timeStr = sess.timed?`<div class="chip">⏱ ${fmtT(Date.now()-sess.t0)}</div>`:'';
  $('#v-result').innerHTML=`
    <div class="result">
     <div class="big card">
       <div style="font-size:.85rem;color:var(--sub);font-weight:700">${esc(sess.title)}</div>
       <div class="score">${pct(corr.length,done.length)}<span style="font-size:1.2rem">分</span></div>
       <div style="font-weight:700">答對 ${corr.length} / ${done.length} 題 ${timeStr}</div>
     </div>
     <div class="card">
       <div class="sect" style="margin-top:0">各題型表現</div>
       ${Object.entries(byType).map(([t,[c,n]])=>bar(t+' '+TI(t),c,n)).join('')||'<div class="empty">—</div>'}
     </div>
     ${wrongList.length?`<div class="card"><div class="sect" style="margin-top:0">錯題檢討（${wrongList.length}）</div>${wrongList.map(revItem).join('')}</div>`:'<div class="card" style="text-align:center;color:var(--good);font-weight:800">🎉 全部答對！</div>'}
    </div>
    <div class="foot"><div class="in">
      <button class="btn ghost" onclick="go('home')">回首頁</button>
      ${wrongList.length?'<button class="btn" onclick="startWrongPractice()">複習錯題</button>':''}
    </div></div>`;
  go('result');
}
function bar(label,c,n){
  const p=pct(c,n); const col=p>=80?'var(--good)':p>=60?'var(--gold)':'var(--bad)';
  return `<div class="bar"><div class="lb"><span>${esc(label)}</span><span>${c}/${n}（${p}%）</span></div><div class="track"><i style="width:${p}%;background:${col}"></i></div></div>`;
}
function revItem(q){
  const p=passageOf(q);
  return `<div class="rev-item"><div class="q"><span class="tag">${q.id[0]==='L'?'🎧聽力':esc(q.type)}</span>${esc(q.stem||('聽力 '+q.year+' 第'+q.no+'題'))}</div>
    <div class="a">你選 <s>${esc(sess.picks[q.id])}</s>　正解 <b>${esc(q.answer)}．${esc((q.options||{})[q.answer]||'')}</b></div></div>`;
}

/* ---------- audio ---------- */
let curAudio=null;
function playAudio(year,no){
  if(curAudio){curAudio.pause();curAudio=null;}
  const file=`audio/${year}/${String(no)}.mp3`;
  curAudio=new Audio(file);
  curAudio.play().catch(()=>alert('此音檔尚未內建（聽力音檔部署中）'));
}

/* ---------- diagnose ---------- */
function renderDiagnose(){
  const byType={}, byYear={};
  R.concat(L).forEach(q=>{const r=S.rec[q.id];if(!r)return;
    const t=q.id[0]==='L'?'聽力':q.type; byType[t]=byType[t]||[0,0]; byType[t][1]++; if(r.correct)byType[t][0]++;
    byYear[q.year]=byYear[q.year]||[0,0]; byYear[q.year][1]++; if(r.correct)byYear[q.year][0]++;});
  const has=Object.keys(byType).length;
  let weak=null,wp=101;
  Object.entries(byType).forEach(([t,[c,n]])=>{if(n>=3){const p=pct(c,n);if(p<wp){wp=p;weak=t}}});
  $('#v-diagnose').innerHTML=`
    <div class="sect" style="margin-top:6px">📊 弱點診斷</div>
    ${!has?'<div class="empty">還沒有作答紀錄。先去練幾題，這裡就會顯示你各題型／各年的答對率。</div>':`
    <div class="card"><div class="sect" style="margin-top:0">依題型</div>
      ${TYPES.concat('聽力').filter(t=>byType[t]).map(t=>bar(TI(t)+' '+t,byType[t][0],byType[t][1])).join('')}</div>
    <div class="card"><div class="sect" style="margin-top:0">依年度</div>
      ${YEARS.filter(y=>byYear[y]).map(y=>bar(y+' 年',byYear[y][0],byYear[y][1])).join('')}</div>
    ${weak?`<button class="mode wide" onclick="startType('${weak}')"><div class="mi">💪</div><div><div class="mt">補強最弱：${weak}（${wp}%）</div><div class="md">點我專練這個題型</div></div></button>`:''}`}`;
}

/* ---------- wrong ---------- */
function renderWrong(){
  const set=new Set(S.wrong);
  const list=R.concat(L).filter(q=>set.has(q.id));
  $('#v-wrong').innerHTML=`
    <div class="sect" style="margin-top:6px">🔁 錯題本（${list.length}）</div>
    ${!list.length?'<div class="empty">目前沒有錯題 👍 答錯的題目會自動收進這裡，答對即移除。</div>':
      `<button class="btn" style="margin:4px 0 14px" onclick="startWrongPractice()">開始複習全部錯題</button>`+
      list.map(q=>`<div class="rev-item"><div class="q"><span class="tag">${q.id[0]==='L'?'🎧聽力':esc(q.type)} · ${q.year}</span>${esc(q.stem||('聽力第'+q.no+'題'))}</div>
        <div class="a">正解 <b>${esc(q.answer)}．${esc((q.options||{})[q.answer]||'')}</b></div></div>`).join('')}`;
}

/* ---------- fav ---------- */
function renderFav(){
  const set=new Set(S.fav);
  const list=ALLQ.filter(q=>set.has(q.id));
  $('#v-fav').innerHTML=`
    <div class="sect" style="margin-top:6px">⭐ 我的收藏（${list.length}）</div>
    ${!list.length?'<div class="empty">還沒有收藏題目。作答時點右上角的 ⭐ 就能把重點題收進來。</div>':
      `<button class="btn" style="margin:4px 0 14px" onclick="startFav()">開始練習收藏題</button>`+
      list.map(q=>`<div class="rev-item" style="border-color:var(--gold)"><div class="q"><span class="tag">${q.id[0]==='L'?'🎧聽力':esc(q.type)} · ${q.year}</span>${esc(q.stem||('聽力第'+q.no+'題'))}</div>
        <div class="a">正解 <b>${esc(q.answer)}．${esc((q.options||{})[q.answer]||'')}</b>　<span onclick="toggleFav('${q.id}');renderFav()" style="color:var(--bad);cursor:pointer;font-weight:700">✕ 移除</span></div></div>`).join('')}`;
}

/* ---------- settings ---------- */
function renderSettings(){
  const done=Object.keys(S.rec).length;
  $('#v-settings').innerHTML=`
    <div class="sect" style="margin-top:6px">⚙️ 設定</div>
    <div class="card">
      <div class="setrow"><div class="l"><b>考試倒數</b><small>設定考試日期，首頁顯示倒數</small></div>
        <input type="date" value="${esc(S.settings.examDate||'')}" onchange="S.settings.examDate=this.value;save();renderSettings()"
          style="flex:0 0 auto;border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;background:var(--card);color:var(--ink);font:inherit"></div>
      <div class="setrow"><div class="l"><b>深色模式</b><small>跟隨系統／手動</small></div>
        <div class="switch ${isDark()?'on':''}" onclick="toggleDark()"><i></i></div></div>
      <div class="setrow"><div class="l"><b>題型專練即時對答</b><small>選完立刻顯示正解</small></div>
        <div class="switch ${S.settings.immediate?'on':''}" onclick="S.settings.immediate=!S.settings.immediate;save();renderSettings()"><i></i></div></div>
    </div>
    <div class="card">
      <div class="setrow" style="border:0"><div class="l"><b>學習進度</b><small>已作答 ${done} 題 · 錯題 ${S.wrong.length}</small></div>
        <button class="btn ghost" style="flex:0 0 auto;padding:10px 16px" onclick="resetAll()">清除</button></div>
    </div>
    <div class="card" style="font-size:.78rem;color:var(--sub);line-height:1.8">
      <b>關於</b><br>題目為教育部心測中心 <b>國中教育會考 英語科 官方公開試題（110–115）</b>。
      閱讀 ${QB.meta.readingUsable} 題${usableL.length?`、聽力 ${usableL.length} 題`:''}可練；少數需對照原卷插圖的圖表／看圖題已隱藏。僅供教學與自學練習。
    </div>`;
}
function resetAll(){ if(confirm('確定清除所有作答與錯題紀錄？（收藏會保留）')){S.rec={};S.wrong=[];S.daily={};save();renderSettings();alert('已清除');} }

/* ---------- theme ---------- */
function isDark(){ if(S.settings.dark==='dark')return true; if(S.settings.dark==='light')return false;
  return window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches; }
function applyTheme(){ const d=S.settings.dark; if(d==='auto')document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme',d); }
function toggleDark(){ S.settings.dark=isDark()?'light':'dark'; save(); applyTheme(); renderSettings(); }

/* ---------- boot ---------- */
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
renderHome();
</script>
