 false, "expl": "由 is coming today（今天要來）可知是未來的安排，後句「她將和我住一週」指未來動作，用 will + 原形，選 (D) will stay。(C) has stayed 為完成式，指過去到現在，與「今天才要來」矛盾。"}, {"id": "R110-8", "year": 110, "no": 8, "section": "單題", "type": "字彙", "skill": "字彙", "pkey": null, "stem": "Edward had worked as a computer engineer for ten years. This ___ helped him a lot when he started his own computer shop.", "options": {"A": "chance", "B": "experience", "C": "hobby", "D": "knowledge"}, "answer": "B", "img": false, "expl": "句意「Edward 當電腦工程師十年，這份___在他開自己的電腦店時幫了他很大的忙」。十年的工作累積的是 (B) experience（經驗）。(A) chance 機會、(C) hobby 嗜好、(D) knowledge 知識雖近似，但十年「工作」最直接對應的是實務經驗。"}, {"id": "R110-9", "year": 110, "no": 9, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "If you're interested in our business plan, ___ this number and ask for Ms. Lee. She'll answer your questions.", "options": {"A": "calling", "B": "call", "C": "and call", "D": "to call"}, "answer": "B", "img": false, "expl": "這是祈使句（命令句），主詞 you 省略，動詞用原形開頭，故 call this number 用原形 (B) call。(A) calling 分詞、(D) to call 不定詞都不能當祈使句主動詞，(C) and call 前面無對等成分。"}, {"id": "R110-10", "year": 110, "no": 10, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Jimmy would not get up for breakfast, ___ his dad had already tried to pull him from his bed several times.", "options": {"A": "although", "B": "because", "C": "if", "D": "until"}, "answer": "A", "img": false, "expl": "前後語意為對比：Jimmy 不肯起床吃早餐，「儘管」爸爸已試著把他拉下床好幾次。表讓步轉折用 (A) although。(B) because 表原因、(D) until 表直到，皆與「已多次嘗試卻仍不起床」的讓步語意不符。"}, {"id": "R110-11", "year": 110, "no": 11, "section": "單題", "type": "語意", "skill": "語意", "pkey": null, "stem": "Duncan spent all his money trying to ___ the bookstore his mom left him. Sadly, the business never got better, and he had to close it in the end.", "options": {"A": "build", "B": "buy", "C": "save", "D": "start"}, "answer": "C", "img": false, "expl": "由後句「生意始終沒起色，最後只好收掉」可知 Duncan 花光錢是想「挽救」母親留下的書店，選 (C) save（挽救、拯救）。(A) build 蓋、(B) buy 買、(D) start 開設都不合「媽媽已留給他、他想維持」的情境。"}, {"id": "R110-12", "year": 110, "no": 12, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Fiona loves listening to her children sing songs ___ at school.", "options": {"A": "are learned", "B": "that learned", "C": "they learned", "D": "that they are learned"}, "answer": "C", "img": false, "expl": "songs 為先行詞（受詞），後接的子句 they learned at school 為省略關係代名詞 that/which 的形容詞子句，主詞 they、動詞 learned 主動，選 (C) they learned。(A)(D) 用被動 are learned 不當（歌是他們主動學的），(B) that learned 缺主詞。"}, {"id": "R110-13", "year": 110, "no": 13, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Beverly eats lots of snacks ___ meals. That's why she is often too full to eat anything at mealtimes.", "options": {"A": "after", "B": "between", "C": "during", "D": "from"}, "answer": "B", "img": false, "expl": "由後句「常常太飽以致正餐吃不下」可知她在「兩餐之間」吃零食，選 (B) between（在…之間，between meals 兩餐之間）。(C) during meals 是用餐時、(A) after 餐後皆不合「吃到正餐吃不下」的因果。"}, {"id": "R110-14", "year": 110, "no": 14, "section": "單題", "type": "語法", "skill": "語法", "pkey": null, "stem": "Nora: Can I check your drawer for some tools we can use? Matt: Sure. Take a look. See if you can find ___ in there.", "options": {"A": "any", "B": "it", "C": "others", "D": "those"}, "answer": "A", "img": false, "expl": "Matt 請 Nora 看看抽屜裡「有沒有任何」工具，用於疑問/條件語意的不特定數量代名詞為 (A) any（any of the tools）。(B) it 指單一特定物、(C) others 指別的（複數其他）、(D) those 指那些特定物，均不符「看看有沒有」的語意。"}, {"id": "R110-15", "year": 110, "no": 15, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "110-P1", "stem": "What is this ad for?", "options": {"A": "Teaching people how to use their BeautiMed points.", "B": "Telling people they can shop at BeautiMed on the Internet now.", "C": "Inviting people to share their shopping experience at e-BeautiMed.", "D": "Letting people know what is on sale at e-BeautiMed from 7/1 to 8/31."}, "answer": "B", "img": false, "expl": "廣告核心是宣布 BeautiMed 推出線上商店 e-BeautiMed，開頭 \"BeautiMed's online store\" 及各項驚喜都圍繞「現在可上網購物」，故選 (B) 告知大家現在可在網路上購物。(D) 談 7/1-8/31 特賣只是驚喜4的片段，非整則廣告主旨。"}, {"id": "R110-16", "year": 110, "no": 16, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "110-P1", "stem": "What will NOT get you BeautiMed points?", "options": {"A": "Shopping at e-BeautiMed.", "B": "Joining \"BeautiMed Friend\" online.", "C": "Inviting a friend to join \"BeautiMed Friend.\"", "D": "Entering the \"BeautiMed Friend\" card number."}, "answer": "D", "img": false, "expl": "逐項比對可得點數：購物(驚喜3)、線上加入會員(驚喜1)、邀朋友加入(驚喜5)都能得點；而 (D)「輸入會員卡號」對應驚喜2，只是領取免費禮物，並未給 BeautiMed 點數，故選 (D)。"}, {"id": "R110-17", "year": 110, "no": 17, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "110-P2", "stem": "Lynn took some photos at Tom's party. Which is most likely one of them?", "options": {"A": "(picture option A)", "B": "(picture option B)", "C": "(picture option C)", "D": "(picture option D)"}, "answer": "B", "img": true}, {"id": "R110-18", "year": 110, "no": 18, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "110-P2", "stem": "What can we learn about Lynn from the dialogue?", "options": {"A": "She does not cook.", "B": "She likes to try new food.", "C": "She did not enjoy the food at Caldron.", "D": "She changed Joey's idea about Caldron."}, "answer": "C", "img": false, "expl": "由 Lynn 的話「Everything tasted the same」「They were all cooked in the same boiling pot」可知她不喜歡 Caldron 的食物，選 (C)。(A) 她其實會抱怨要自己煮，並非不下廚；(D) 對話結尾她說彼此對好體驗看法不同，並未改變 Joey 想法。"}, {"id": "R110-19", "year": 110, "no": 19, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "110-P3", "stem": "What do we know about Woollie from Katie's diary?", "options": {"A": "Woollie was older than Katie.", "B": "Woollie was taken to visit sick kids.", "C": "Woollie was sick when he ran away.", "D": "Woollie looked strange without his fleece."}, "answer": "A", "img": false, "expl": "故事書寫 Woollie 四歲時走失，花了六年才被 Mr. Armstrong 找到（即找到時十歲）；日記說剪羊毛那天正是 Katie 出生之日，故 Woollie 年紀比 Katie 大，選 (A)。其餘選項（生病時逃走、被帶去探望病童、沒毛看起來很怪）皆與文中細節不符。"}, {"id": "R110-20", "year": 110, "no": 20, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "110-P3", "stem": "Which picture of Woollie and Ms. Clark did Katie talk about in her diary?", "options": {"A": "(picture option A)", "B": "(picture option B)", "C": "(picture option C)", "D": "(picture option D)"}, "answer": "C", "img": true}, {"id": "R110-21", "year": 110, "no": 21, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "110-P3", "stem": "What happened when Woollie was put down?", "options": {"A": "He was sold.", "B": "He couldn't be found.", "C": "He died.", "D": "He became famous."}, "answer": "C", "img": false, "expl": "put down 在此指「（因病重無法醫治而）將動物安樂死」，文中 Daddy 說 Woollie 太病重、無法可救，所以 Woollie 死了，選 (C) He died。故事最後 Katie 哭並希望牠在天上快樂，也印證此意。"}, {"id": "R110-22", "year": 110, "no": 22, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "110-P4", "stem": "What can we learn about The Piano Lesson from the reading?", "options": {"A": "Matisse painted it when his son was away from home.", "B": "The woman who sits on a seat behind the boy is his mother.", "C": "Matisse uses yellow and red to show that his son was happy.", "D": "The candle on the piano shows that the piano lesson has just begun."}, "answer": "A", "img": false, "expl": "文末說明 Matisse 於 1916 年作畫時，兒子 Pierre 已 16 歲且已離家去當兵，畫家不知他是否回得來，故是在兒子不在家時所畫，選 (A)。(B) 坐在後方的女子其實是他另一幅畫作 Woman on a High Stool，非母親。"}, {"id": "R110-23", "year": 110, "no": 23, "section": "題組", "type": "閱讀理解", "skill": "指代", "pkey": "110-P4", "stem": "What does \"do that\" mean in the reading?", "options": {"A": "Put his family in his paintings.", "B": "Paint to remember the good old days.", "C": "Use a lot of fun colors in his art works.", "D": "Put his earlier art work in a new painting."}, "answer": "D", "img": false, "expl": "\"do that\" 前一句提到畫中其實藏著他自己的另一幅畫作（Woman on a High Stool），並說 Matisse 很愛這樣做，故 that 指「把自己早期的畫作放進新畫裡」，選 (D)。緊接著 In fact, there's another work... 也再度印證此意。"}, {"id": "R110-24", "year": 110, "no": 24, "section": "題組", "type": "閱讀理解", "skill": "指代", "pkey": "110-P4", "stem": "What is NOT used in the reading to refer to Henri Matisse?", "options": {"A": "The artist.", "B": "The painter.", "C": "The poor kid.", "D": "A worried father."}, "answer": "C", "img": false, "expl": "文中稱 Matisse 為 the painter、the artist、a worried father。(C) the poor kid（可憐的孩子）是用來形容畫中兒子 Pierre 的感受，並非指 Matisse 本人，故選 (C)。"}, {"id": "R110-25", "year": 110, "no": 25, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "110-P5", "stem": "What idea is talked about in the reading?", "options": {"A": "How Teachers' Day is celebrated now.", "B": "Why Teachers' Day was celebrated at first.", "C": "Why Confucius was seen as a great teacher.", "D": "How teachers today feel about Teachers' Day."}, "answer": "B", "img": false, "expl": "全文重點在說明「第一個教師節其實不是為了紀念孔子，也不是為了感謝老師」，接著敘述 1930 年教師節最初的緣由（老師待遇差、藉此發聲），故談的是「教師節最初為何而慶祝」，選 (B)。"}, {"id": "R110-26", "year": 110, "no": 26, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "110-P5", "stem": "Which is true about Teachers' Day from the reading?", "options": {"A": "It used to be celebrated on different dates.", "B": "It was started by students for their teachers.", "C": "It has been celebrated in Nanjing for over 2,500 years.", "D": "Teachers decided to celebrate it on Confucius's birthday."}, "answer": "A", "img": false, "expl": "文中提到最早的教師節在 6 月 6 日，後來 1939 年政府改為 8 月 27 日，可知教師節曾在不同日期慶祝，選 (A)。(B) 是老師發起而非學生；(D) 老師最初選 6/6 是因好記，非孔子生日。"}, {"id": "R110-27", "year": 110, "no": 27, "section": "題組", "type": "閱讀理解", "skill": "字義猜測", "pkey": "110-P5", "stem": "What does \"not everyone hailed this decision\" mean in the reading?", "options": {"A": "Not everyone cared about the decision.", "B": "Not everyone welcomed the decision.", "C": "Not everyone heard about the decision.", "D": "Not everyone remembered the decision."}, "answer": "B", "img": false, "expl": "hail 在此意為「歡迎、擁護」，not everyone hailed this decision 即「並非人人都歡迎這項決定」，選 (B)。後文說「教師節本來就與孔子無關」正是反對此決定的理由，可推知其為「不歡迎」之意。"}, {"id": "R110-28", "year": 110, "no": 28, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "110-P5", "stem": "What does the writer try to do with this reading?", "options": {"A": "To talk about a problem that no one notices.", "B": "To share a fun experience that was not common.", "C": "To tell a piece of history that few people know about.", "D": "To give an example of an idea that is hard to understand."}, "answer": "C", "img": false, "expl": "全文揭露一段大家熟知的教師節背後、鮮為人知的真實由來（最初非為孔子、非為謝師），屬於「述說少有人知的歷史」，選 (C)。它不是在談無人注意的問題，也非分享罕見趣事或舉例說明難懂概念。"}, {"id": "R110-29", "year": 110, "no": 29, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "110-P6", "stem": "Why does National Formosa Railway write this letter?", "options": {"A": "There is a train ticket sale.", "B": "A train line will be closed in July.", "C": "It will open a new train line in August.", "D": "Some of its trains will run on different lines."}, "answer": "D", "img": false, "expl": "信中說明因上月颱風，Sand Town–Spring Town 線將封閉，部分列車將改走其他路線、不停靠某些站，故寫信目的是告知「部分列車將行駛不同路線」，選 (D)。(B) 只是暫時封閉一段時間並非直接主旨，(A)(C) 文中未提。"}, {"id": "R110-30", "year": 110, "no": 30, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "110-P6", "stem": "What is true about NFR's trains between August 14 and 28 2016?", "options": {"A": "No trains will stop at Spring Town.", "B": "Trains that change lines will all stop at Cloud City.", "C": "People can take the free buses to any station on the Sand Town - Spring Town line.", "D": "People can go to Hill Town on any train that runs between Green City and Cloud City."}, "answer": "D", "img": false, "expl": "第1點說明行駛於 Green City 與 Cloud City 之間的列車將改走 Smoke Town–Spring Town 線且「每站皆停」，Hill Town 在該線上，故搭這些列車皆可到 Hill Town，選 (D)。(A) Spring Town 仍有列車停靠、(C) 免費巴士不到 Gray Village，皆與文不符。"}, {"id": "R110-31", "year": 110, "no": 31, "section": "題組", "type": "閱讀理解", "skill": "圖表判讀", "pkey": "110-P6", "stem": "James lives in Smoke Town. He wants to go to Black Town on August 19. How can he get there?", "options": {"A": "Take Train RL202 to Green City, get off there, and take the free bus.", "B": "Take Train RL103 to Green City, get off there, and take the free bus.", "C": "Take Train RL102 to Spring Town, get off there, and take Train RL201.", "D": "Take Train RL101 to Cloud City, get off there, and take the free bus."}, "answer": "A", "img": false, "expl": "James 在 Smoke Town，要到 Black Town（在封閉的 Sand Town–Spring Town 線上）。需先搭改道且每站皆停的列車，其中往北的 RL202（Cloud City→Green City）會經 Smoke Town 到 Green City，再於 Green City 轉搭往北的免費巴士（巴士在 Green City 往南、Spring Town 往北候車），故選 (A)。"}, {"id": "R110-32", "year": 110, "no": 32, "section": "題組", "type": "閱讀理解", "skill": "主旨", "pkey": "110-P7", "stem": "Below are the ideas that are talked about in the reading. a. The problems Darayya has. b. How Darayya's library was started. c. What makes Darayya's library special. d. How Darayya's library helps people there. In what order does the writer put his ideas in the reading?", "options": {"A": "c, b, a, d.", "B": "b, a, d, c.", "C": "a, c, b, d.", "D": "c, a, b, d."}, "answer": "D", "img": false, "expl": "全文順序：先描述這座圖書館與眾不同（秘密地下館藏，c），再談 Darayya 因戰爭面臨的困境（房屋被炸、學校關閉，a），接著說明圖書館如何被建立（Anas Ahmad 等人所建，b），最後說它如何幫助當地人（讀書忘卻苦難、懷抱希望，d），故為 c, a, b, d，選 (D)。"}, {"id": "R110-33", "year": 110, "no": 33, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "110-P7", "stem": "Why do people in Darayya go to the library even during the war?", "options": {"A": "They can get free food.", "B": "They find joy and hope in reading.", "C": "They want to learn how to win the war.", "D": "Their school teachers give lessons there."}, "answer": "B", "img": false, "expl": "由末段「人們在圖書館享受閱讀、忘卻上方可怕的世界」「透過閱讀能夢想戰後更好的生活」可知他們在閱讀中找到樂趣與希望，選 (B)。(A) 免費食物、(C) 學打仗、(D) 老師授課皆非文中所述。"}, {"id": "R110-34", "year": 110, "no": 34, "section": "題組", "type": "閱讀理解", "skill": "細節", "pkey": "110-P7", "stem": "What do we know about Darayya's library?", "options": {"A": "It was built during the war.", "B": "It has been bombed many times.", "C": "It was built to remember people who died in the war.", "D": "Most of its books are collected from outside of Darayya."}, "answer": "A", "img": false, "expl": "文中敘述戰爭爆發、學校關閉後，Anas Ahmad 與朋友才決定興建這座圖書館，可知它是在戰爭期間建立的，選 (A)。書多是在被炸毀的房屋中「就地」蒐集（來自 Darayya 內部），非來自外地，(D) 不符。"}, {"id": "R110-35", "year": 110, "no": 35, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "110-P8", "stem": "We know we told you that the party would be in  35 .", "options": {"A": "Victor Zoo", "B": "Carlton City", "C": "Mosman Garden", "D": "Northbank Park"}, "answer": "D", "img": false, "expl": "這是文意選填。空格前 We know we told you that the party would be in ___（我們先前告訴你派對會在___），後文說他們上月已搬到 Carlton City、派對不會在舊居附近的地方，故此處應填原本告知的舊地點。信中提到請勿去舊家旁的 Northbank Park，可知原先說的地點即 (D) Northbank Park。"}, {"id": "R110-36", "year": 110, "no": 36, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "110-P8", "stem": "The weather report said that it may be rainy this weekend, but  36 .", "options": {"A": "we have a plan if this happens", "B": "we could just wait for the rain to stop", "C": "we should be fine if the rain isn't too heavy", "D": "we will let you know if we'll still have the party"}, "answer": "A", "img": false, "expl": "空格前後：氣象說週末可能下雨，「但是___」，後文緊接 If it rains, we'll move the party inside our home（若下雨就把派對移到室內）。可見他們對下雨「已有應變計畫」，選 (A) we have a plan if this happens，語意最連貫。"}, {"id": "R110-37", "year": 110, "no": 37, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "110-P8", "stem": "However, if we're  37  and it is fine, we'll still have the party at the garden.", "options": {"A": "crazy", "B": "good", "C": "lucky", "D": "strong"}, "answer": "C", "img": false, "expl": "此句與前句形成對照：下雨有備案，「然而，如果我們夠___、天氣放晴，就仍在花園辦」。天氣放晴屬運氣好，故填 (C) lucky（幸運）。(A) crazy、(B) good、(D) strong 皆與「天氣正好」無邏輯關聯。"}, {"id": "R110-38", "year": 110, "no": 38, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "110-P9", "stem": "The stories I'd heard about the park  38  into my head at this moment.", "options": {"A": "are all coming", "B": "have all come", "C": "were all coming", "D": "would all come"}, "answer": "C", "img": false, "expl": "全篇敘事採過去式，描述當下「我聽過關於這座公園的種種故事，此刻全湧上心頭」。at this moment 指過去那一刻正在發生的動作，用過去進行式 were all coming，選 (C)。(A) 現在進行、(B) 現在完成、(D) 過去未來皆與過去敘事時態不符。"}, {"id": "R110-39", "year": 110, "no": 39, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "110-P9", "stem": "I did  39  stupid thing: I decided to hurry past him.", "options": {"A": "another", "B": "one", "C": "the last", "D": "the other"}, "answer": "A", "img": false, "expl": "前文已提到「第一件蠢事」（進入公園），此處說「我又做了___蠢事：決定快步經過他」，表示再做「另一件」，用 (A) another（再一、又一件）。(B) one 無「再一件」之意，(C) the last、(D) the other 指特定的最後/另一（兩者中的另一個），皆不合。"}, {"id": "R110-40", "year": 110, "no": 40, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "110-P9", "stem": "I had hoped the trees would keep some rain off. And they  40 .", "options": {"A": "have", "B": "did", "C": "had", "D": "would"}, "answer": "B", "img": false, "expl": "前句 I had hoped the trees would keep some rain off（我原希望樹能擋些雨），此處 And they ___ 以助動詞代替前面的動詞、肯定「樹確實擋了雨」。因敘事為過去、原動詞為一般動詞，用過去式助動詞 did，選 (B)。"}, {"id": "R110-41", "year": 110, "no": 41, "section": "題組", "type": "閱讀理解", "skill": "推論", "pkey": "110-P9", "stem": "\"What? I  41  to give back your bag! You dropped it,\" the man gave me my bag.", "options": {"A": "was trying", "B": "try", "C": "would try", "D": "will try"}, "answer": "A", "img": false, "expl": "情境為過去敘事，男子解釋「我（當時）正想把包包還你」。指過去那一刻正在進行的意圖，用過去進行式 was trying，選 (A)。(B) try 現在式、(C) would try、(D) will try 皆與過去情境時態不符。"}], "listening": [{"id": "L115-1", "year": 115, "no": 1, "part": "第一部分_辨識句意", "options": {"A": null, "B": null, "C": null}, "answer": "C", "audioDir": "115/115聽力/Listening", "img": true}, {"id": "L115-2", "year": 115, "no": 2, "part": "第一部分_辨識句意", "options": {"A": null, "B": null, "C": null}, "answer": "C", "audioDir": "115/115聽力/Listening", "img": true}, {"id": "L115-3", "year": 115, "no": 3, "part": "第一部分_辨識句意", "options": {"A": null, "B": null, "C": null}, "answer": "C", "audioDir": "115/115聽力/Listening", "img": t if(S.settings.examDate===undefined)S.settings.examDate='';
applyTheme();

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pct(a,b){return b?Math.round(a/b*100):0}
function markAns(q,pick){
  const ok = pick===q.answer;
  S.rec[q.id]={correct:ok,n:(S.rec[q.id]?.n||0)+1};
  const set=new Set(S.wrong);
  if(ok) set.delete(q.id); else set.add(q.id);
  S.wrong=[...set]; save();
  try{ if(window.EngReview){
    const ks=Object.keys(q.options||{}).filter(k=>q.options[k]!=null);
    if(!ok){ const p=passageOf(q); const cat=(q.id&&q.id[0]==='L')?'聽力':(q.type||'題目');
      const stem=(p?('📄'+(p.topic||p.genre||'閱讀')+'：'):'')+(q.stem||'（請看題目）');
      EngReview.addWrong({cat:cat,stem:stem,options:ks.map(k=>q.options[k]),your:ks.indexOf(pick),ans:ks.indexOf(q.answer),expl:q.expl||''}); }
  }}catch(e){}
  return ok;
}
function passageOf(q){ return q.pkey?PS[q.pkey]:null }
const ALLQ = usableR.concat(usableL);
const byId = Object.fromEntries(R.concat(L).map(q=>[q.id,q]));
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dayDiff(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function streak(){ let s=0,d=new Date(); for(;;){const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); if(S.daily[k]){s++;d.setDate(d.getDate()-1);}else{ if(k===todayStr()){d.setDate(d.getDate()-1);continue;} break;}} return s; }
function isFav(id){ return S.fav.includes(id); }
function toggleFav(id){ const i=S.fav.indexOf(id); if(i<0)S.fav.push(id); else S.fav.splice(i,1); save();
  const b=document.getElementById('favBtn'); if(b)b.className='iconbtn'+(isFav(id)?' faved':''); }
function examCountdown(){ const dt=S.settings.examDate; if(!dt)return null; const n=dayDiff(todayStr(),dt); return n; }

/* ---------- nav ---------- */
function go(v){
  ['home','run','result','diagnose','wrong','fav','settings'].forEach(x=>$('#v-'+x).classList.toggle('hidden',x!==v));
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  $('#nav').classList.toggle('hidden', v==='run'||v==='result');
  if(v==='home')renderHome();
  if(v==='diagnose')renderDiagnose();
  if(v==='wrong')renderWrong();
  if(v==='fav')renderFav();
  if(v==='settings')renderSettings();
  window.scrollTo(0,0);
}

/* ---------- home ---------- */
function renderHome(){
  const done=Object.keys(S.rec).length;
  const corr=Object.values(S.rec).filter(x=>x.correct).length;
  const cd=examCountdown(); const st=streak(); const todayDone=!!S.daily[todayStr()];
  const cdBanner = cd!=null ? `<div class="cd ${cd<0?'past':''}" onclick="go('settings')">
     <div class="cdi">${cd<0?'🎓':'📅'}</div>
     <div><b>${cd>0?`距離考試還有 ${cd} 天`:cd===0?'今天就是考試日，加油！':`考試已過 ${-cd} 天`}</b>
     <small>${esc(S.settings.examDate)}${cd>0?'　每天練一點，穩紮穩打':''}</small></div></div>` : '';
  $('#v-home').innerHTML=`
   ${cdBanner}
   <div class="stats">
     <div class="stat"><b>${done}</b><span>已作答</span></div>
     <div class="stat"><b>${pct(corr,done)}%</b><span>答對率</span></div>
     <div class="stat"><b>${S.fav.length}</b><span>收藏題</span></div>
   </div>
   <button class="mode wide daily ${todayDone?'ok':''}" onclick="startDaily()">
     <div class="mi">${todayDone?'✅':'☀️'}</div>
     <div><div class="mt">每日一練　${st>0?`🔥 ${st} 天`:''}</div>
       <div class="md">${todayDone?'今天已完成，明天再來保持連勝！':'15 題精選（優先錯題與新題），養成每天練習'}</div></div></button>
   <div class="sect">📝 整卷模擬考（計時）</div>
   <div class="picker">
     ${YEARS.map(y=>`<button class="pbtn" onclick="startExam(${y})">${y} 年<small>閱讀 ${usableR.filter(q=>q.year===y).length} 題</small></button>`).join('')}
   </div>
   <div class="sect">🎯 題型專練</div>
   <div class="modes">
     ${TYPES.map(t=>`<button class="mode" onclick="startType('${t}')"><div class="mi">${TI(t)}</div><div class="mt">${t}</div><div class="md">${usableR.filter(q=>q.type===t).length} 題 · 即時對答</div></button>`).join('')}
     ${usableL.length?`<button class="mode" onclick="startListen()"><div class="mi">🎧</div><div class="mt">聽力</div><div class="md">${usableL.length} 題 · 官方音檔（${AUDIOYEARS.join('・')}）</div></button>`:''}
     <button class="mode" onclick="startWrongPractice()"><div class="mi">🔁</div><div class="mt">錯題複習</div><div class="md">${S.wrong.length} 題待清</div></button>
     <button class="mode" onclick="go('fav')"><div class="mi">⭐</div><div class="mt">我的收藏</div><div class="md">${S.fav.length} 題 · 重點再練</div></button>
   </div>
   <div class="sect">📊 診斷</div>
   <button class="mode wide" onclick="go('diagnose')"><div class="mi">📈</div><div><div class="mt">弱點診斷</div><div class="md">看各題型／各年答對率，一鍵補強最弱項</div></div></button>
   <p style="text-align:center;color:var(--sub);font-size:.7rem;margin-top:18px">${esc(QB.meta.source)} · 離線可用 · 進度存本機</p>`;
}

/* ---------- session engine ---------- */
let sess=null;  // {list, i, mode, picks:{}, timed, t0, timerId, title}
function startExam(y){
  const list=usableR.filter(q=>q.year===y).sort((a,b)=>a.no-b.no);
  sess={list,i:0,mode:'exam',picks:{},timed:true,t0:Date.now(),title:`${y} 年 · 整卷模擬`};
  startTimer(); go('run'); drawRun();
}
function startType(t){
  const raw=usableR.filter(q=>q.type===t);
  const hasP=raw.some(q=>q.pkey);
  let list, grouped=false;
  if(hasP){ // 閱讀題組：打散文章順序，但同篇題目留在一起、依題號排 → 整組作答再一次揭曉
    const byP={}, order=[];
    raw.forEach(q=>{const k=q.pkey||q.id; if(!byP[k]){byP[k]=[];order.push(k);} byP[k].push(q);});
    list=shuffle(order).reduce((a,k)=>a.concat(byP[k].slice().sort((x,y)=>(x.no||0)-(y.no||0))),[]);
    grouped=true;
  } else { list=shuffle(raw); }
  sess={list,i:0,mode:'practice',picks:{},timed:false,title:`題型專練 · ${t}`,grouped};
  go('run'); drawRun();
}
function startListen(){
  const list=shuffle(usableL);
  sess={list,i:0,mode:'listen',picks:{},timed:false,title:'聽力練習'};
  go('run'); drawRun();
}
function startWrongPractice(){
  if(!S.wrong.length){alert('目前沒有錯題，先去練習吧！');return;}
  const set=new Set(S.wrong);
  const list=shuffle([...usableR,...usableL].filter(q=>set.has(q.id)));
  sess={list,i:0,mode:'practice',picks:{},timed:false,title:'錯題複習'};
  go('run'); drawRun();
}
function startFav(){
  if(!S.fav.length){alert('還沒有收藏題目。作答時點右上角 ⭐ 就會收藏。');return;}
  const set=new Set(S.fav);
  const list=shuffle(ALLQ.filter(q=>set.has(q.id)));
  sess={list,i:0,mode:'practice',picks:{},timed:false,title:'我的收藏'};
  go('run'); drawRun();
}
const DAILY_N=15;
function startDaily(){
  const wrongSet=new Set(S.wrong);
  const wrong=usableR.filter(q=>wrongSet.has(q.id));
  const unseen=usableR.filter(q=>!S.rec[q.id]&&!wrongSet.has(q.id));
  const seen=usableR.filter(q=>S.rec[q.id]&&!wrongSet.has(q.id));
  const list=[...shuffle(wrong).slice(0,6),...shuffle(unseen),...shuffle(seen)].slice(0,DAILY_N);
  if(!list.length){alert('題目都練完了，太厲害了！');return;}
  sess={list:shuffle(list),i:0,mode:'practice',picks:{},timed:false,title:'每日一練',daily:true};
  go('run'); drawRun();
}
let timerId=null;
function startTimer(){ stopTimer(); timerId=setInterval(()=>{const el=$('#timer');if(el)el.textContent=fmtT(Date.now()-sess.t0)},1000); }
function stopTimer(){ if(timerId)clearInterval(timerId); timerId=null; }
function fmtT(ms){const s=Math.floor(ms/1000);return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

function groupRange(i){const pk=sess.list[i].pkey;if(!pk)return[i,i];let s=i,e=i;while(s>0&&sess.list[s-1].pkey===pk)s--;while(e<sess.list.length-1&&sess.list[e+1].pkey===pk)e++;return[s,e];}
function pickG(qid,k){ if(sess.revealed&&sess.revealed.has(byId[qid]&&byId[qid].pkey))return; sess.picks[qid]=k; drawRun(); }
function revealGroup(){ const[gs,ge]=groupRange(sess.i);const grp=sess.list.slice(gs,ge+1);const pk=grp[0].pkey; sess.revealed=sess.revealed||new Set(); if(sess.revealed.has(pk))return; sess.revealed.add(pk); grp.forEach(q=>{if(sess.picks[q.id]!=null)markAns(q,sess.picks[q.id]);}); drawRun(); }
function drawGroup(){
  let[gs,ge]=groupRange(sess.i); if(sess.i!==gs)sess.i=gs;
  const grp=sess.list.slice(gs,ge+1), p=passageOf(grp[0]);
  const rv=!!(sess.revealed&&sess.revealed.has(grp[0].pkey));
  const allAns=grp.every(q=>sess.picks[q.id]!=null);
  let qs='',correct=0;
  grp.forEach((q,gi)=>{
    const picked=sess.picks[q.id];
    const opts=Object.entries(q.options||{}).filter(([k,v])=>v!=null).map(([k,v])=>{
      let cls='opt';
      if(rv){ if(k===q.answer)cls+=' correct'; else if(k===picked)cls+=' wrong'; }
      else if(k===picked)cls+=' sel';
      return `<button class="${cls}" ${rv?'disabled':''} onclick="pickG('${q.id}','${k}')"><span class="k">${k}</span><span class="v">${esc(v)}</span></button>`;
    }).join('');
    let fb='';
    if(rv){ const ok=picked===q.answer; if(ok)correct++;
      fb=`<div class="fb ${ok?'ok':'no'}">${ok?'✅ 答對':(picked==null?'⬜ 未作答':'❌ 答錯')}．正解 ${q.answer}</div>${q.expl?`<div class="expl">💡 ${esc(q.expl)}</div>`:''}`; }
    qs+=`<div class="qcard" style="margin-bottom:10px"><div class="stem">${gi+1}. ${esc(q.stem||'')}</div><div class="opts">${opts}</div>${fb}</div>`;
  });
  const action = rv
    ? `<div class="fb ok" style="text-align:center">📖 本篇答對 ${correct}/${grp.length} 題</div>`
    : `<button class="btn" ${allAns?'':'disabled'} onclick="revealGroup()" style="width:100%">✅ 對答案（整篇 ${grp.length} 題）</button>`;
  $('#v-run').innerHTML=`
    <div style="display:flex;align-items:center">
      <button class="back" onclick="quitRun()" style="flex:1;text-align:left">‹ 結束</button>
    </div>
    <div class="qhead"><div class="prog"><i style="width:${(ge+1)/sess.list.length*100}%"></i></div><div class="cnt">${gs+1}-${ge+1}/${sess.list.length}</div></div>
    <div style="font-weight:800;font-size:.8rem;color:var(--sub);margin-bottom:8px">${esc(sess.title)}　📖 讀完整篇、整組答完再對答案</div>
    <div class="passage"><div class="pg">📄 ${esc(p.genre)}｜${esc(p.topic)}</div>${esc(p.text)}</div>
    ${qs}${action}
    <div class="foot"><div class="in">
      ${gs>0?'<button class="btn ghost" onclick="prevGroup()">‹ 上一篇</button>':''}
      <button class="btn" id="nextBtn" ${rv?'':'disabled'} onclick="nextGroup()">${ge+1<sess.list.length?'下一篇 ›':'看結果'}</button>
    </div></div>`;
}
function nextGroup(){ const[,ge]=groupRange(sess.i); if(ge+1<sess.list.length){sess.i=ge+1;drawRun();}else finish(); }
function prevGroup(){ const[gs]=groupRange(sess.i); if(gs>0){const[ps]=groupRange(gs-1);sess.i=ps;drawRun();} }
function drawRun(){
  const q=sess.list[sess.i]; if(!q){finish();return;}
  const isL=sess.mode==='listen'||q.id[0]==='L';
  const p=passageOf(q);
  if(sess.grouped && p && !isL){ return drawGroup(); }
  const picked=sess.picks[q.id];
  const answered=picked!=null;
  const immediate=sess.mode!=='exam';
  const audio = isL ? `<div class="audio"><button onclick="playAudio('${q.year}',${q.no})">▶</button><div class="lab">播放官方音檔<small>${q.year} 年 · 第 ${q.no} 題（${esc(q.part||'')}）</small></div></div>` : '';
  const passage = (p && !isL) ? `<div class="passage"><div class="pg">📄 ${esc(p.genre)}｜${esc(p.topic)}</div>${esc(p.text)}</div>` : '';
  const tag = isL ? `<span class="tag">🎧 聽力</span>` : `<span class="tag">${TYPEICON[q.type]||''} ${esc(q.type)}</span>`;
  const stem = q.stem ? `<div class="stem">${esc(q.stem)}</div>` : (isL?'<div class="stem" style="color:var(--sub)">請聽音檔作答</div>':'');
  const opts=Object.entries(q.options||{}).filter(([k,v])=>v!=null).map(([k,v])=>{
    let cls='opt';
    if(answered){
      if(k===q.answer)cls+=' correct';
      else if(k===picked)cls+=' wrong';
    } else if(k===picked) cls+=' sel';
    return `<button class="${cls}" ${answered?'disabled':''} onclick="pick('${k}')"><span class="k">${k}</span><span class="v">${esc(v)}</span></button>`;
  }).join('');
  let fb='';
  if(answered && immediate){
    const ok=picked===q.answer;
    fb=`<div class="fb ${ok?'ok':'no'}">${ok?'✅ 答對了！':'❌ 正解是 '+q.answer+'．'+esc(q.options[q.answer]||'')}</div>${q.expl?`<div class="expl">💡 <b>解析</b>：${esc(q.expl)}</div>`:''}`;
  }
  $('#v-run').innerHTML=`
    <div style="display:flex;align-items:center">
      <button class="back" onclick="quitRun()" style="flex:1;text-align:left">‹ 結束</button>
      <button class="iconbtn${isFav(q.id)?' faved':''}" id="favBtn" onclick="toggleFav('${q.id}')" title="收藏">★</button>
    </div>
    <div class="qhead">
      <div class="prog"><i style="width:${(sess.i+1)/sess.list.length*100}%"></i></div>
      <div class="cnt">${sess.i+1}/${sess.list.length}</div>
      ${sess.timed?`<div class="timer" id="timer">${fmtT(Date.now()-sess.t0)}</div>`:''}
    </div>
    <div style="font-weight:800;font-size:.8rem;color:var(--sub);margin-bottom:8px">${esc(sess.title)}</div>
    ${audio}${passage}
    <div>${tag}</div>${stem}
    <div class="opts">${opts}</div>
    ${fb}
    <div class="foot"><div class="in">
      ${sess.i>0?'<button class="btn ghost" onclick="prevQ()">‹ 上一題</button>':''}
      <button class="btn" id="nextBtn" ${(!answered&&sess.mode!=='exam')?'disabled':''} onclick="nextQ()">${sess.i+1<sess.list.length?(sess.mode==='exam'?'下一題 ›':'下一題 ›'):'交卷／看結果'}</button>
    </div></div>`;
}
function pick(k){
  const q=sess.list[sess.i];
  if(sess.picks[q.id]!=null && sess.mode!=='exam') return;
  sess.picks[q.id]=k;
  if(sess.mode!=='exam'){ markAns(q,k); }
  drawRun();
}
function nextQ(){ if(sess.i+1<sess.list.length){sess.i++;drawRun();}else finish(); }
function prevQ(){ if(sess.i>0){sess.i--;drawRun();} }
function quitRun(){ if(sess.mode==='exam'&&Object.keys(sess.picks).length&&!confirm('離開會結束這次模擬考，確定？'))return; stopTimer(); go('home'); }

function finish(){
  stopTimer();
  // exam mode: grade all now
  if(sess.mode==='exam'){ sess.list.forEach(q=>{ if(sess.picks[q.id]!=null) markAns(q,sess.picks[q.id]); }); }
  if(sess.daily && Object.keys(sess.picks).length){ S.daily[todayStr()]=true; save(); }
  const list=sess.list, picks=sess.picks;
  const done=list.filter(q=>picks[q.id]!=null);
  const corr=done.filter(q=>picks[q.id]===q.answer);
  // by type
  const byType={};
  list.forEach(q=>{const t=q.id[0]==='L'?'聽力':q.type;byType[t]=byType[t]||[0,0];if(picks[q.id]!=null){byType[t][1]++;if(picks[q.id]===q.answer)byType[t][0]++;}});
  const wrongList=list.filter(q=>picks[q.id]!=null&&picks[q.id]!==q.answer);
  const timeStr = sess.timed?`<div class="chip">⏱ ${fmtT(Date.now()-sess.t0)}</div>`:'';
  $('#v-result').innerHTML=`
    <div class="result">
     <div class="big card">
       <div style="font-size:.85rem;color:var(--sub);font-weight:700">${esc(sess.title)}</div>
       <div class="score">${pct(corr.length,done.length)}<span style="font-size:1.2rem">分</span></div>
       <div style="font-weight:700">答對 ${corr.length} / ${done.length} 題 ${timeStr}</div>
     </div>
     <div class="card">
       <div class="sect" style="margin-top:0">各題型表現</div>
       ${Object.entries(byType).map(([t,[c,n]])=>bar(t+' '+TI(t),c,n)).join('')||'<div class="empty">—</div>'}
     </div>
     ${wrongList.length?`<div class="card"><div class="sect" style="margin-top:0">錯題檢討（${wrongList.length}）</div>${wrongList.map(revItem).join('')}</div>`:'<div class="card" style="text-align:center;color:var(--good);font-weight:800">🎉 全部答對！</div>'}
    </div>
    <div class="foot"><div class="in">
      <button class="btn ghost" onclick="go('home')">回首頁</button>
      ${wrongList.length?'<button class="btn" onclick="startWrongPractice()">複習錯題</button>':''}
    </div></div>`;
  go('result');
}
function bar(label,c,n){
  const p=pct(c,n); const col=p>=80?'var(--good)':p>=60?'var(--gold)':'var(--bad)';
  return `<div class="bar"><div class="lb"><span>${esc(label)}</span><span>${c}/${n}（${p}%）</span></div><div class="track"><i style="width:${p}%;background:${col}"></i></div></div>`;
}
function revItem(q){
  const p=passageOf(q);
  return `<div class="rev-item"><div class="q"><span class="tag">${q.id[0]==='L'?'🎧聽力':esc(q.type)}</span>${esc(q.stem||('聽力 '+q.year+' 第'+q.no+'題'))}</div>
    <div class="a">你選 <s>${esc(sess.picks[q.id])}</s>　正解 <b>${esc(q.answer)}．${esc((q.options||{})[q.answer]||'')}</b></div>${q.expl?`<div class="expl">💡 ${esc(q.expl)}</div>`:''}</div>`;
}

/* ---------- audio ---------- */
let curAudio=null;
function playAudio(year,no){
  if(curAudio){curAudio.pause();curAudio=null;}
  const file=`audio/${year}/${String(no)}.mp3`;
  curAudio=new Audio(file);
  curAudio.play().catch(()=>alert('此音檔尚未內建（聽力音檔部署中）'));
}

/* ---------- diagnose ---------- */
function renderDiagnose(){
  const byType={}, byYear={};
  R.concat(L).forEach(q=>{const r=S.rec[q.id];if(!r)return;
    const t=q.id[0]==='L'?'聽力':q.type; byType[t]=byType[t]||[0,0]; byType[t][1]++; if(r.correct)byType[t][0]++;
    byYear[q.year]=byYear[q.year]||[0,0]; byYear[q.year][1]++; if(r.correct)byYear[q.year][0]++;});
  const has=Object.keys(byType).length;
  let weak=null,wp=101;
  Object.entries(byType).forEach(([t,[c,n]])=>{if(n>=3){const p=pct(c,n);if(p<wp){wp=p;weak=t}}});
  $('#v-diagnose').innerHTML=`
    <div class="sect" style="margin-top:6px">📊 弱點診斷</div>
    ${!has?'<div class="empty">還沒有作答紀錄。先去練幾題，這裡就會顯示你各題型／各年的答對率。</div>':`
    <div class="card"><div class="sect" style="margin-top:0">依題型</div>
      ${TYPES.concat('聽力').filter(t=>byType[t]).map(t=>bar(TI(t)+' '+t,byType[t][0],byType[t][1])).join('')}</div>
    <div class="card"><div class="sect" style="margin-top:0">依年度</div>

function openSelf(){
  var W=ownWrong(),V=ownWords();
  var h='<div class=\"rvc-tab\"><button class=\"on\" data-t=\"w\">📕 錯題 '+W.length+'</button><button data-t=\"v\">📘 生字 '+V.length+'</button></div><div id=\"rvcPane\"></div>';
  var o=ov('📝 我的複習',h);
  var pane=o.querySelector('#rvcPane');
  o.querySelectorAll('.rvc-tab button').forEach(function(b){b.addEventListener('click',function(){o.querySelectorAll('.rvc-tab button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');paint(b.dataset.t);});});
  function paint(t){if(t==='v')paintWords(pane,V,o);else paintWrong(pane,W,o);}
  paint('w');
}
function paintWrong(pane,W,o){
  if(!W.length){pane.innerHTML='<div class=\"rvc-empty\">目前沒有錯題 🎉<br>練習答錯的題目會自動收進這裡。</div>';return;}
  var d=due(W);
  var grp={};W.forEach(function(e){(grp[e.cat||'其他']=grp[e.cat||'其他']||[]).push(e);});
  var h='<button class=\"rvc-primary\" '+(d.length?'':'disabled style=opacity:.5')+' id=\"rvcQz\">▶ 重考待複習錯題（'+d.length+'）</button>';
  Object.keys(grp).forEach(function(g){h+='<div class=\"rvc-grp\">'+esc(g)+'（'+grp[g].length+'）</div>';
    grp[g].forEach(function(e){h+='<div class=\"rvc-item\"><div class=\"rvc-q\">'+esc(e.stem)+'</div><div class=\"rvc-exp\"><b>✅ 正解 '+L[e.ans]+'：</b>'+esc((e.options||[])[e.ans]||'')+'　'+esc(e.expl||'')+'</div></div>';});});
  pane.innerHTML=h;
  var qz=pane.querySelector('#rvcQz');if(qz&&d.length)qz.addEventListener('click',function(){startQuiz(d,o);});
}
function startQuiz(pool,parent){
  parent.remove();var i=0,right=0;var o=ov('📕 重考錯題（'+pool.length+'）','<div id=\"rvcQ\"></div>');
  function draw(){var box=o.querySelector('#rvcQ');if(i>=pool.length){box.innerHTML='<div class=\"rvc-empty\">複習完成！答對 '+right+'/'+pool.length+'<br>連對 2 次的題目會自動畢業 🎓</div><button class=\"rvc-primary\">完成</button>';box.querySelector('button').addEventListener('click',function(){o.remove();refreshFab();});return;}
    var e=pool[i];var h='<div class=\"rvc-item\"><div class=\"rvc-q\">'+(i+1)+'. '+esc(e.stem)+'</div>';
    (e.options||[]).forEach(function(op,oi){h+='<div class=\"rvc-opt\" data-i=\"'+oi+'\"><span class=\"lb\">'+L[oi]+'</span><span>'+esc(op)+'</span></div>';});
    h+='<div id=\"rvcFb\"></div></div>';box.innerHTML=h;
    box.querySelectorAll('.rvc-opt').forEach(function(el){el.addEventListener('click',function(){
      if(box.dataset.done)return;box.dataset.done='1';var pick=+el.dataset.i,ok=pick===e.ans;
      box.querySelectorAll('.rvc-opt').forEach(function(x){var xi=+x.dataset.i;if(xi===e.ans)x.classList.add('ok');else if(xi===pick)x.classList.add('no');});
      R.graded(e.id,ok);if(ok)right++;
      box.querySelector('#rvcFb').innerHTML='<div class=\"rvc-exp\"><b>'+(ok?'✅ 答對':'❌ 答錯')+'・正解 '+L[e.ans]+'：</b>'+esc(e.expl||'')+'</div><button class=\"rvc-primary\">下一題 ▶</button>';
      box.querySelector('#rvcFb button').addEventListener('click',function(){i++;delete box.dataset.done;draw();});
    });});}
  draw();
}
function paintWords(pane,V,o){
  if(!V.length){pane.innerHTML='<div class=\"rvc-empty\">還沒有生字 📖<br>閱讀或做題時點不會的單字，就會收進這裡。</div>';return;}
  var h='<button class=\"rvc-primary\" id=\"rvcFl\">🃏 翻卡複習（'+V.length+'）</button>';
  V.forEach(function(e,idx){h+='<div class=\"rvc-word\"><div><div class=\"w\">'+esc(e.word)+' <span style=\"font-size:11px;color:#9aa\">'+esc(e.pos||'')+'</span></div><div class=\"z\">'+esc(e.zh)+'</div></div><span class=\"src\">'+esc(e.cat||'')+'</span>'
    +'<button class=\"rvc-ic\" data-say=\"'+esc(e.word)+'\">🔊</button>'
    +((!e.zh||e.zh==='（待查）')?'<button class=\"rvc-ic\" data-fill=\"'+esc(e.word)+'\">✏️</button>':'')
    +'<button class=\"rvc-ic\" data-del=\"'+esc(e.word)+'\">🗑️</button></div>';});
  pane.innerHTML=h;
  pane.querySelector('#rvcFl').addEventListener('click',function(){startFlash(V,o);});
  pane.querySelectorAll('[data-say]').forEach(function(b){b.addEventListener('click',function(){speak(b.dataset.say);});});
  pane.querySelectorAll('[data-fill]').forEach(function(b){b.addEventListener('click',function(){var w=b.dataset.fill,zh=prompt('輸入「'+w+'」的中文意思：');if(zh&&zh.trim()){R.setWordZh(w,zh.trim());o.remove();openSelf();}});});
  pane.querySelectorAll('[data-del]').forEach(function(b){b.addEventListener('click',function(){if(confirm('移除生字「'+b.dataset.del+'」？')){R.removeWord(b.dataset.del);o.remove();openSelf();}});});
}
function startFlash(V,parent){
  parent.remove();var i=0;var o=ov('🃏 生字翻卡','<div id=\"rvcF\"></div>');
  function draw(){var box=o.querySelector('#rvcF');if(i>=V.length){box.innerHTML='<div class=\"rvc-empty\">複習完成！👏</div><button class=\"rvc-primary\">完成</button>';box.querySelector('button').addEventListener('click',function(){o.remove();refreshFab();});return;}
    var e=V[i];box.innerHTML='<div class=\"rvc-flash\" id=\"cf\"><div class=\"fw\">'+esc(e.word)+'</div><div style=\"font-size:12px;color:#9aa;margin-top:6px\">點卡片看中文・🔊</div></div>';
    var flip=false,cf=box.querySelector('#cf');
    cf.addEventListener('click',function(){if(!flip){flip=true;cf.innerHTML='<div class=\"fw\">'+esc(e.word)+'</div><div class=\"fz\">'+esc(e.zh)+'</div>';speak(e.word);
      var g=document.createElement('div');g.className='rvc-grade';g.innerHTML='<button class=\"rvc-bad\">還不熟</button><button class=\"rvc-good\">記得了</button>';box.appendChild(g);
      g.children[0].addEventListener('click',function(){R.wordGraded(e.word,false);i++;draw();});
      g.children[1].addEventListener('click',function(){R.wordGraded(e.word,true);i++;draw();});
    }else speak(e.word);});}
  draw();
}
function mountSelf(){var fab=document.createElement('button');fab.id='rvcFab';fab.className='rvc-fab';fab.addEventListener('click',openSelf);document.body.appendChild(fab);refreshFab();}

/* ===== Hub：只總覽 ===== */
function mountOverview(){
  var host=document.getElementById('dash');var card=document.createElement('div');card.className='rvc-card';card.id='rvcCard';
  if(host&&host.parentNode)host.parentNode.insertBefore(card,host.nextSibling);else document.body.insertBefore(card,document.body.firstChild);
  var w=R.wrong(),v=R.words();var per={};
  function acc(id,kind){if(!NSMAP[id])return;per[id]=per[id]||{w:0,v:0};per[id][kind]++;}
  for(var k in w){if(w[k].due<=NOW)acc(w[k].app,'w');}
  for(var k2 in v){if(v[k2].due<=NOW)acc(v[k2].app,'v');}
  var ids=Object.keys(per);
  var h='<h3>📝 我的複習</h3>';
  if(!ids.length){h+='<div class=\"rvc-none\">目前沒有待複習的錯題或生字 🎉<br>去各 App 練習，答錯的題目、閱讀點的生字，會分別留在<b>那支 App</b> 裡等你複習。</div>';}
  else{h+='<div class=\"rvc-sub\">點進該 App 複習自己的錯題與生字（各程度分開，不混在一起）</div>';
    ids.forEach(function(id){var m=NSMAP[id],p=per[id];h+='<a class=\"rvc-approw\" href=\"'+m.url+'\"><div><div class=\"an\">'+esc(m.name)+'</div><div class=\"am\">'+(p.w?'錯題 '+p.w+' 題':'')+(p.w&&p.v?'・':'')+(p.v?'生字 '+p.v+' 個':'')+'</div></div><span class=\"ag\">去複習 ▶</span></a>';});}
  card.innerHTML=h;
}

if(ISHUB){if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',mountOverview);else mountOverview();}
else{if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',mountSelf);else mountSelf();}
})();</script>
